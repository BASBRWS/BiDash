eschikbaar=cap[d]||0;\n    var dpr=window.devicePixelRatio||1;\n    var cW=Math.max(260,canvas.parentElement.clientWidth-8), cH=90;\n    var PADL=28,PADR=6,PADT=6,PADB=16;\n    canvas.width=cW*dpr;canvas.height=cH*dpr;canvas.style.width=cW+'px';canvas.style.height=cH+'px';\n    var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,cW,cH);\n    var maxV=Math.max(beschikbaar, 1); buckets.forEach(function(b){ maxV=Math.max(maxV,b[d]); }); maxV=maxV*1.15;\n    function X(t){ return PADL+((t-s.t0)/(s.t1-s.t0))*(cW-PADL-PADR); }\n    function Y(v){ return cH-PADB-(v/maxV)*(cH-PADT-PADB); }\n    // overschrijding als rood vlak\n    var peak=0;\n    for(var i=0;i<buckets.length-1;i++){\n      var x1=X(buckets[i].t),x2=X(buckets[i+1].t),v1=buckets[i][d],v2=buckets[i+1][d];\n      peak=Math.max(peak,v1);\n      var o1=Math.min(v1,beschikbaar),o2=Math.min(v2,beschikbaar);\n      ctx.fillStyle=IPL_DIENST_KLEUR[d]+'26'; ctx.beginPath();ctx.moveTo(x1,Y(0));ctx.lineTo(x1,Y(o1));ctx.lineTo(x2,Y(o2));ctx.lineTo(x2,Y(0));ctx.closePath();ctx.fill();\n      if(v1>beschikbaar||v2>beschikbaar){\n        ctx.fillStyle='rgba(192,18,31,0.32)';\n        ctx.beginPath();ctx.moveTo(x1,Y(Math.min(v1,beschikbaar)));ctx.lineTo(x1,Y(v1));ctx.lineTo(x2,Y(v2));ctx.lineTo(x2,Y(Math.min(v2,beschikbaar)));ctx.closePath();ctx.fill();\n      }\n    }\n    ctx.strokeStyle=IPL_DIENST_KLEUR[d]; ctx.lineWidth=1.4; ctx.beginPath();\n    for(var i2=0;i2<buckets.length;i2++){ var xx=X(buckets[i2].t),yy=Y(buckets[i2][d]); if(i2===0)ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy); }\n    ctx.stroke();\n    // beschikbaar-lijn\n    ctx.strokeStyle='#c0121f'; ctx.lineWidth=1.2; ctx.setLineDash([4,3]);\n    ctx.beginPath();ctx.moveTo(PADL,Y(beschikbaar));ctx.lineTo(cW-PADR,Y(beschikbaar));ctx.stroke(); ctx.setLineDash([]);\n    ctx.fillStyle='#6a7898'; ctx.font='8px Segoe UI,Arial'; ctx.textAlign='right';\n    ctx.fillText('0',PADL-3,Y(0)+3); ctx.fillText(beschikbaar.toFixed(0),PADL-3,Y(beschikbaar)+3);\n    var statusEl=document.getElementById('ipl-fmt-'+d+'-status');\n    if(statusEl){\n      if(peak>beschikbaar) statusEl.innerHTML='<span style=\"color:#c0121f;font-weight:700;\">▲ piek '+peak.toFixed(1)+' FTE — boven beschikbare '+beschikbaar+' FTE</span>';\n      else statusEl.innerHTML='<span style=\"color:#1a8a4a;\">● piek '+peak.toFixed(1)+' FTE — binnen beschikbare '+beschikbaar+' FTE</span>';\n    }\n  });\n}\n\n\n\n\n// ===== IPL DASHBOARDS =====\n\n// ══════════════════════════════════════════════════════════\n// IPL DASHBOARDS — per dienst / WBS-groep, per niveau\n// Operationeel = taken · Tactisch = groepen/capaciteit · Strategisch = mijlpalen/risico's\n// Alles gevoed door de geïmporteerde planning + huidige verschuivingen.\n// ══════════════════════════════════════════════════════════\n\nfunction ipl_dashSetMode(mode){ IPL_DASH_MODE=mode; renderIPLDash(); }\nfunction ipl_dashSetDienst(d){ IPL_DASH_DIENST=d; if(d!=='VWM') IPL_DASH_VC='ALLE'; renderIPLDash(); }\nfunction ipl_dashSetWbs(w){ IPL_DASH_WBS=w; renderIPLDash(); }\nfunction ipl_dashSetNiveau(n){ IPL_DASH_NIVEAU=n; renderIPLDash(); }\nfunction ipl_dashSetVC(vc){ IPL_DASH_VC=vc; renderIPLDash(); }\nfunction ipl_dashSetMapping(blokId,dienst){ IPL_WBS_DIENST[blokId]=dienst; renderIPLDash(); if(typeof renderIPL==='function' && document.getElementById('s16')?.classList.contains('active')) {} }\n\nfunction ipl_dashToggleMap(){\n  var on=document.getElementById('ipl-dash-showmap').checked;\n  var panel=document.getElementById('ipl-dash-mappanel');\n  if(panel) panel.style.display=on?'block':'none';\n  if(on) ipl_dashRenderMapRows();\n}\nfunction ipl_dashRenderMapRows(){\n  var el=document.getElementById('ipl-dash-maprows'); if(!el||!IPL_MODEL) return;\n  ipl_initDienstMapping();\n  el.innerHTML=IPL_MODEL.blokken.map(function(b){\n    var cur=IPL_WBS_DIENST[b.id]||'GPO';\n    var opts=IPL_DIENSTEN.map(function(d){return '<option value=\"'+d+'\"'+(d===cur?' selected':'')+'>'+d+'</option>';}).join('');\n    return '<div style=\"display:flex;align-items:center;gap:10px;\">'\n      +'<span style=\"display:inline-block;width:10px;height:10px;border-radius:2px;background:'+b.kleur+';\"></span>'\n      +'<span style=\"flex:1;font-size:11px;color:#3a4658;\">'+b.naam+'</span>'\n      +'<select onchange=\"ipl_dashSetMapping(\\''+b.id+'\\',this.value)\" style=\"padding:3px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;\">'+opts+'</select>'\n      +'</div>';\n  }).join('');\n}\n\n// welke regels horen bij de huidige selectie?\nfunction ipl_dashRegels(){\n  if(!IPL_MODEL) return [];\n  var basis;\n  if(IPL_DASH_MODE==='wbs'){\n    var w=IPL_DASH_WBS||IPL_MODEL.blokken[0].id;\n    basis=IPL_MODEL.regels.filter(function(r){ return r.blok===w; });\n  } else {\n    basis=IPL_MODEL.regels.filter(function(r){ return ipl_regelDienst(r)===IPL_DASH_DIENST; });\n    // VC-filter alleen actief binnen dienst VWM\n    if(IPL_DASH_DIENST==='VWM' && IPL_DASH_VC!=='ALLE'){\n      basis=basis.filter(function(r){ return ipl_regelVC(r)===IPL_DASH_VC; });\n    }\n  }\n  return basis;\n}\nfunction ipl_dashLabel(){\n  if(IPL_DASH_MODE==='wbs'){ var w=IPL_DASH_WBS||IPL_MODEL.blokken[0].id; var b=IPL_MODEL.blokken.filter(function(x){return x.id===w;})[0]; return b?b.naam:'—'; }\n  var lbl='Dienst '+IPL_DASH_DIENST;\n  if(IPL_DASH_DIENST==='VWM' && IPL_DASH_VC!=='ALLE') lbl+=' — '+IPL_DASH_VC;\n  return lbl;\n}\nfunction ipl_dashKleur(){\n  if(IPL_DASH_MODE==='wbs'){ var w=IPL_DASH_WBS||IPL_MODEL.blokken[0].id; var b=IPL_MODEL.blokken.filter(function(x){return x.id===w;})[0]; return b?b.kleur:'#003082'; }\n  return IPL_DIENST_KLEUR[IPL_DASH_DIENST]||'#003082';\n}\n\nfunction renderIPLDash(){\n  var el=document.getElementById('ipl-dash-content'); if(!el) return;\n  if(!IPL_MODEL){ el.innerHTML='<div style=\"padding:40px;text-align:center;color:#6a7898;font-size:13px;\">Laad eerst een planning via <strong>Planning importeren</strong> om de dashboards te vullen.</div>'; return; }\n  ipl_initDienstMapping();\n  ipl_computeCascade();\n\n  // selector-balken bijwerken\n  ipl_dashRenderSelectors();\n\n  var regels=ipl_dashRegels();\n  var kleur=ipl_dashKleur();\n  var label=ipl_dashLabel();\n\n  var html='';\n  if(IPL_DASH_NIVEAU==='operationeel') html=ipl_dashOperationeel(regels,kleur,label);\n  else if(IPL_DASH_NIVEAU==='tactisch') html=ipl_dashTactisch(regels,kleur,label);\n  else html=ipl_dashStrategisch(regels,kleur,label);\n  el.innerHTML=html;\n\n  // capaciteitsgrafiek (tactisch) tekenen na DOM-update\n  if(IPL_DASH_NIVEAU==='tactisch') setTimeout(function(){ ipl_dashDrawCap(regels,kleur); },10);\n}\n\nfunction ipl_dashRenderSelectors(){\n  // dienst/wbs knoppen\n  var modeWrap=document.getElementById('ipl-dash-mode'); \n  var selWrap=document.getElementById('ipl-dash-select');\n  if(selWrap){\n    var html='';\n    if(IPL_DASH_MODE==='dienst'){\n      IPL_DIENSTEN.forEach(function(d){\n        var act=d===IPL_DASH_DIENST;\n        html+='<button onclick=\"ipl_dashSetDienst(\\''+d+'\\')\" style=\"padding:5px 14px;border:1px solid '+IPL_DIENST_KLEUR[d]+';background:'+(act?IPL_DIENST_KLEUR[d]:'#fff')+';color:'+(act?'#fff':IPL_DIENST_KLEUR[d])+';border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;\">'+d+'</button>';\n      });\n    } else {\n      IPL_MODEL.blokken.forEach(function(b){\n        var act=(IPL_DASH_WBS||IPL_MODEL.blokken[0].id)===b.id;\n        var nm=b.naam.length>26?b.naam.substring(0,26)+'…':b.naam;\n        html+='<button onclick=\"ipl_dashSetWbs(\\''+b.id+'\\')\" style=\"padding:5px 12px;border:1px solid '+b.kleur+';background:'+(act?b.kleur:'#fff')+';color:'+(act?'#fff':b.kleur)+';border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;\">'+nm+'</button>';\n      });\n    }\n    selWrap.innerHTML=html;\n  }\n  // VC-filter: alleen tonen als dienst-modus + VWM geselecteerd\n  var vcWrap=document.getElementById('ipl-dash-vcfilter');\n  if(vcWrap){\n    if(IPL_DASH_MODE==='dienst' && IPL_DASH_DIENST==='VWM'){\n      var vcs=ipl_detecteerVCs();\n      if(vcs.length){\n        var vhtml='<span style=\"font-size:11px;font-weight:700;color:var(--text-sub);margin-right:4px;\">Verkeerscentrale:</span>';\n        vhtml+='<button onclick=\"ipl_dashSetVC(\\'ALLE\\')\" style=\"padding:4px 12px;border:1px solid #00823c;background:'+(IPL_DASH_VC==='ALLE'?'#00823c':'#fff')+';color:'+(IPL_DASH_VC==='ALLE'?'#fff':'#00823c')+';border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">Alle</button>';\n        vcs.forEach(function(vc){\n          var act=IPL_DASH_VC===vc.naam;\n          vhtml+='<button onclick=\"ipl_dashSetVC(\\''+vc.naam+'\\')\" style=\"padding:4px 12px;border:1px solid #00823c;background:'+(act?'#00823c':'#fff')+';color:'+(act?'#fff':'#00823c')+';border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">'+vc.naam+'</button>';\n        });\n        vcWrap.innerHTML=vhtml; vcWrap.style.display='flex';\n      } else { vcWrap.innerHTML=''; vcWrap.style.display='none'; }\n    } else { vcWrap.innerHTML=''; vcWrap.style.display='none'; IPL_DASH_VC='ALLE'; }\n  }\n  // niveau-knoppen\n  var nivWrap=document.getElementById('ipl-dash-niveau');\n  if(nivWrap){\n    var nivs=[['operationeel','Operationeel — taken'],['tactisch','Tactisch — capaciteit'],['strategisch','Strategisch — mijlpalen & risico']];\n    nivWrap.innerHTML=nivs.map(function(n){\n      var act=n[0]===IPL_DASH_NIVEAU;\n      return '<button onclick=\"ipl_dashSetNiveau(\\''+n[0]+'\\')\" style=\"padding:6px 14px;border:1px solid #003082;background:'+(act?'#003082':'#fff')+';color:'+(act?'#fff':'#003082')+';border-radius:4px;font-size:12px;font-weight:'+(act?'700':'600')+';cursor:pointer;\">'+n[1]+'</button>';\n    }).join('');\n  }\n  // mode-toggle\n  var mt=document.getElementById('ipl-dash-modetoggle');\n  if(mt){\n    mt.innerHTML='<button onclick=\"ipl_dashSetMode(\\'dienst\\')\" style=\"padding:4px 12px;border:1px solid #003082;background:'+(IPL_DASH_MODE==='dienst'?'#003082':'#fff')+';color:'+(IPL_DASH_MODE==='dienst'?'#fff':'#003082')+';border-radius:4px 0 0 4px;font-size:11px;font-weight:700;cursor:pointer;\">Per dienst</button>'\n      +'<button onclick=\"ipl_dashSetMode(\\'wbs\\')\" style=\"padding:4px 12px;border:1px solid #003082;border-left:none;background:'+(IPL_DASH_MODE==='wbs'?'#003082':'#fff')+';color:'+(IPL_DASH_MODE==='wbs'?'#fff':'#003082')+';border-radius:0 4px 4px 0;font-size:11px;font-weight:700;cursor:pointer;\">Per WBS-groep</button>';\n  }\n}\n\nfunction ipl_kpi(col,val,lbl){ return '<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid '+col+';border-radius:6px;padding:12px 14px;text-align:center;\"><div style=\"font-size:24px;font-weight:800;color:'+col+';\">'+val+'</div><div style=\"font-size:10px;color:#6a7898;margin-top:2px;\">'+lbl+'</div></div>'; }\nfunction ipl_card(titel,inhoud){ return '<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;padding:14px 16px;margin-bottom:12px;\"><div style=\"font-size:13px;font-weight:700;color:#003082;margin-bottom:10px;\">'+titel+'</div>'+inhoud+'</div>'; }\n\n// ── OPERATIONEEL: taken/activiteiten ──\nfunction ipl_dashOperationeel(regels,kleur,label){\n  var taken=regels.filter(function(r){return r.kind!=='mile';});\n  var verschoven=regels.filter(function(r){return Math.abs(IPL_CASCADE[r.id]||0)>0.001;});\n  var nu=2026.0; // referentie 'nu' — eerste jaar; loopt mee met data\n  if(IPL_MODEL) nu=IPL_MODEL.t0+1.5;\n  var lopend=taken.filter(function(r){var e=ipl_eff(r);return e.t0<=nu&&e.t1>=nu;});\n  var komend=taken.filter(function(r){var e=ipl_eff(r);return e.t0>nu;});\n\n  var kpis='<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;\">'\n    +ipl_kpi(kleur,taken.length,'Taken')\n    +ipl_kpi('#1a8a4a',lopend.length,'Lopend (indicatief)')\n    +ipl_kpi('#6a7898',komend.length,'Nog te starten')\n    +ipl_kpi(verschoven.length?'#c0121f':'#1a8a4a',verschoven.length,'Verschoven')\n    +'</div>';\n\n  // takenlijst gesorteerd op project, dan (verschoven) startdatum\n  var sorted=taken.slice().sort(function(a,b){\n    var pa=ipl_regelProjectNaam(a), pb=ipl_regelProjectNaam(b);\n    if(pa!==pb) return pa<pb?-1:1;\n    return ipl_eff(a).t0-ipl_eff(b).t0;\n  });\n  var rows=sorted.slice(0,60).map(function(r){\n    var e=ipl_eff(r); var sh=IPL_CASCADE[r.id]||0;\n    var shBadge=Math.abs(sh)>0.001?'<span style=\"color:'+(sh>0?'#c0121f':'#0a6ec0')+';font-weight:700;font-size:10px;\"> '+(sh>0?'+':'')+Math.round(sh*12)+'m</span>':'';\n    return '<tr><td style=\"padding:5px 10px;font-size:10px;color:#5a2d82;font-weight:700;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;\">'+ipl_regelProjectNaam(r)+'</td>'\n      +'<td style=\"padding:5px 10px;font-size:11px;\">'+r.naam+shBadge+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:10px;color:#6a7898;white-space:nowrap;\">'+ipl_fToDate(e.t0)+' → '+ipl_fToDate(e.t1)+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:10px;color:#6a7898;text-align:center;\">'+(IPL_MODEL.relaties.filter(function(x){return x.from===r.id||x.to===r.id;}).length)+'</td></tr>';\n  }).join('');\n  var tabel=ipl_card('Taken in '+label+(sorted.length>60?' (eerste 60 van '+sorted.length+')':''),\n    '<div style=\"max-height:420px;overflow-y:auto;\"><table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#f4f6fb;position:sticky;top:0;\">'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Project</th>'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Taak</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Periode</th>'\n    +'<th style=\"padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;color:#6a7898;\">Rel.</th>'\n    +'</tr></thead><tbody>'+rows+'</tbody></table></div>');\n\n  return kpis+tabel;\n}\n\n// ── TACTISCH: groepen / capaciteit (boeggolf) ──\n// ── Kleurpalet voor rollen/functies in BI-grafieken ──\nvar IPL_ROL_PALET = ['#003082','#5a2d82','#00823c','#c05000','#0a6ec0','#8a6d00','#c0121f','#00698a','#7a3a9e','#4a7a2a','#a04070','#3a5a8a'];\nfunction ipl_rolKleur(rol,idx){ return IPL_ROL_PALET[idx%IPL_ROL_PALET.length]; }\nvar IPL_DASH_GRAN = 'maand';   // 'maand' | 'kwartaal'\nvar IPL_DASH_EENHEID = 'fte';  // 'fte' | 'uren'\nvar IPL_UUR_PER_FTE_MAAND = 1600/12; // obv 1.600 uur/jaar — indicatief, aan te passen aan eigen CAO-norm\nfunction ipl_dashSetGran(g){ IPL_DASH_GRAN=g; renderIPLDash(); }\nfunction ipl_dashSetEenheid(e){ IPL_DASH_EENHEID=e; renderIPLDash(); }\nfunction ipl_fmtKwartaal(t){ var y=Math.floor(t); var q=Math.floor(((t-y)+0.0001)*4)+1; return 'Q'+q+' '+y; }\n\n// zorg dat FTE-configuratie bestaat voor alle projecten in deze regelset\nfunction ipl_dashEnsureFte(regels){\n  var seen={};\n  regels.forEach(function(r){ if(r.project && !seen[r.project]){ seen[r.project]=1; ipl_cfgInit(r.project); } });\n}\n// FTE-toewijzing van een taak (uitsluitend wat expliciet is geconfigureerd —\n// geen stille standaardrol meer; een taak zonder toewijzing telt als 0 FTE)\nfunction ipl_dashTaakFteRollen(r){\n  return IPL_CONFIG.fte[r.id] || [];\n}\n\nfunction ipl_dashTactisch(regels,kleur,label){\n  ipl_dashEnsureFte(regels);\n  var taken=regels.filter(function(r){return r.kind!=='mile';});\n  var gkeys=(function(){ var g={}; regels.forEach(function(r){ var gid=r.wbsPath.length>1?r.wbsPath[r.wbsPath.length-1]:r.blok; g[gid]=1; }); return Object.keys(g); })();\n\n  // piek gelijktijdige taken én piek FTE\n  var t0=IPL_MODEL.t0,t1=IPL_MODEL.t1;\n  var peakTaken=0, peakFte=0, totFteMaanden=0;\n  taken.forEach(function(r){\n    var e=ipl_eff(r); var dur=Math.max(e.t1-e.t0,0)*12;\n    var som=0; ipl_dashTaakFteRollen(r).forEach(function(a){som+=parseFloat(a.fte)||0;});\n    totFteMaanden+=som*dur;\n  });\n  for(var t=t0;t<=t1;t+=1/12){\n    var c=0, f=0;\n    taken.forEach(function(r){ var e=ipl_eff(r); if(t>=e.t0&&t<e.t1){ c++; ipl_dashTaakFteRollen(r).forEach(function(a){f+=parseFloat(a.fte)||0;}); } });\n    peakTaken=Math.max(peakTaken,c); peakFte=Math.max(peakFte,f);\n  }\n  var eenh=IPL_DASH_EENHEID;\n  var totWeergave = eenh==='uren' ? Math.round(totFteMaanden*IPL_UUR_PER_FTE_MAAND).toLocaleString('nl-NL') : totFteMaanden.toFixed(0);\n\n  var kpis='<div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;\">'\n    +ipl_kpi(kleur,gkeys.length,'Werkpakketten')\n    +ipl_kpi(kleur,taken.length,'Taken')\n    +ipl_kpi('#e06b00',peakTaken,'Piek gelijktijdig')\n    +ipl_kpi('#c0121f',peakFte.toFixed(1),'Piek FTE')\n    +ipl_kpi('#0a6ec0',totWeergave+(eenh==='uren'?' u':' fm'),'Cumulatieve inzet')\n    +'</div>';\n\n  // ── controls: granulariteit + eenheid ──\n  var controls='<div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:10px;background:#fff;border:1px solid #d8dce4;border-radius:8px;padding:10px 16px;\">'\n    +'<div style=\"font-size:11px;font-weight:700;color:#4a5568;\">Periode:</div>'\n    +'<div style=\"display:flex;border-radius:5px;overflow:hidden;border:1px solid '+kleur+';\">'\n    +'<button onclick=\"ipl_dashSetGran(\\'maand\\')\" style=\"padding:5px 14px;border:none;background:'+(IPL_DASH_GRAN==='maand'?kleur:'#fff')+';color:'+(IPL_DASH_GRAN==='maand'?'#fff':kleur)+';font-size:11px;font-weight:700;cursor:pointer;\">Maand</button>'\n    +'<button onclick=\"ipl_dashSetGran(\\'kwartaal\\')\" style=\"padding:5px 14px;border:none;border-left:1px solid '+kleur+';background:'+(IPL_DASH_GRAN==='kwartaal'?kleur:'#fff')+';color:'+(IPL_DASH_GRAN==='kwartaal'?'#fff':kleur)+';font-size:11px;font-weight:700;cursor:pointer;\">Kwartaal</button>'\n    +'</div>'\n    +'<div style=\"font-size:11px;font-weight:700;color:#4a5568;margin-left:8px;\">Eenheid:</div>'\n    +'<div style=\"display:flex;border-radius:5px;overflow:hidden;border:1px solid '+kleur+';\">'\n    +'<button onclick=\"ipl_dashSetEenheid(\\'fte\\')\" style=\"padding:5px 14px;border:none;background:'+(eenh==='fte'?kleur:'#fff')+';color:'+(eenh==='fte'?'#fff':kleur)+';font-size:11px;font-weight:700;cursor:pointer;\">FTE</button>'\n    +'<button onclick=\"ipl_dashSetEenheid(\\'uren\\')\" style=\"padding:5px 14px;border:none;border-left:1px solid '+kleur+';background:'+(eenh==='uren'?kleur:'#fff')+';color:'+(eenh==='uren'?'#fff':kleur)+';font-size:11px;font-weight:700;cursor:pointer;\">Uren</button>'\n    +'</div>'\n    +'<div style=\"margin-left:auto;font-size:10px;color:#9aa3b5;\">1 FTE-maand ≈ '+Math.round(IPL_UUR_PER_FTE_MAAND)+' uur (obv 1.600 uur/jr)</div>'\n    +'</div>';\n\n  var capCard='<div style=\"background:#fff;border:1px solid #d8dce4;border-radius:8px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,30,60,0.06);\">'\n    +'<div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px;\"><div style=\"font-size:13px;font-weight:700;color:#1a2236;\">FTE-capaciteitsbelasting per functie</div><div style=\"font-size:10px;color:#9aa3b5;\">'+label+'</div></div>'\n    +'<div style=\"font-size:11px;color:#6a7898;margin-bottom:10px;\">Gestapelde inzet per functie/rol over de tijd ('+(IPL_DASH_GRAN==='kwartaal'?'per kwartaal':'per maand')+'). Verschuift live mee met scenario-aanpassingen.</div>'\n    +'<canvas id=\"ipl-dash-ftechart\" style=\"display:block;width:100%;\"></canvas>'\n    +'<div id=\"ipl-dash-ftelegend\" style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:10px;\"></div>'\n    +'</div>';\n\n  // ── pivot: uren/FTE per functie per project ──\n  var pivot=ipl_dashFtePivot(regels);\n  var pivotCard=ipl_dashRenderPivot(pivot,kleur,label);\n\n  // werkpakkettentabel (compacter, als aanvulling)\n  var groepen={};\n  regels.forEach(function(r){\n    var gid=r.wbsPath.length>1?r.wbsPath[r.wbsPath.length-1]:r.blok;\n    if(!groepen[gid]) groepen[gid]={naam:(IPL_MODEL.wbs[gid]?IPL_MODEL.wbs[gid].naam:label),taken:0,miles:0,t0:99,t1:0};\n    if(r.kind==='mile') groepen[gid].miles++; else groepen[gid].taken++;\n    var e=ipl_eff(r); groepen[gid].t0=Math.min(groepen[gid].t0,e.t0); groepen[gid].t1=Math.max(groepen[gid].t1,e.t1);\n  });\n  var grows=Object.keys(groepen).sort(function(a,b){return groepen[a].t0-groepen[b].t0;}).map(function(gid){\n    var g=groepen[gid];\n    return '<tr><td style=\"padding:5px 10px;font-size:11px;font-weight:600;\">'+g.naam+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:11px;text-align:center;\">'+g.taken+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:11px;text-align:center;\">'+g.miles+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:10px;color:#6a7898;white-space:nowrap;\">'+(g.t1>g.t0?ipl_fToDate(g.t0)+' → '+ipl_fToDate(g.t1):'—')+'</td></tr>';\n  }).join('');\n  var gtabel=ipl_card('Werkpakketten in '+label,\n    '<div style=\"max-height:280px;overflow-y:auto;\"><table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#f4f6fb;position:sticky;top:0;\">'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Werkpakket (WBS)</th>'\n    +'<th style=\"padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;color:#6a7898;\">Taken</th>'\n    +'<th style=\"padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;color:#6a7898;\">Mijlp.</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Periode</th>'\n    +'</tr></thead><tbody>'+grows+'</tbody></table></div>');\n\n  return kpis+controls+capCard+pivotCard+gtabel;\n}\n\n// ── FTE-tijdreeks per rol (voor gestapelde grafiek) ──\nfunction ipl_dashFteSeries(regels){\n  var taken=regels.filter(function(r){return r.kind!=='mile';});\n  var t0=IPL_MODEL.t0, t1=IPL_MODEL.t1;\n  var step = IPL_DASH_GRAN==='kwartaal' ? 0.25 : (1/12);\n  var buckets=[]; for(var t=t0;t<=t1+0.001;t+=step) buckets.push({t:t, rollen:{}, totaal:0});\n  var rolTotaal={};\n  taken.forEach(function(r){\n    var e=ipl_eff(r);\n    var assign=ipl_dashTaakFteRollen(r);\n    for(var bi=0;bi<buckets.length;bi++){\n      var bt=buckets[bi].t;\n      if(bt>=e.t0-0.001 && bt<e.t1-0.001){\n        assign.forEach(function(a){\n          var f=parseFloat(a.fte)||0;\n          buckets[bi].rollen[a.rol]=(buckets[bi].rollen[a.rol]||0)+f;\n          buckets[bi].totaal+=f;\n          rolTotaal[a.rol]=(rolTotaal[a.rol]||0)+f;\n        });\n      }\n    }\n  });\n  // top-rollen bepalen (max 6, rest → Overig)\n  var rollenSorted=Object.keys(rolTotaal).sort(function(a,b){return rolTotaal[b]-rolTotaal[a];});\n  var topRollen=rollenSorted.slice(0,6);\n  var heeftOverig=rollenSorted.length>6;\n  if(heeftOverig){\n    buckets.forEach(function(b){\n      var overig=0;\n      Object.keys(b.rollen).forEach(function(rl){ if(topRollen.indexOf(rl)<0) overig+=b.rollen[rl]; });\n      if(overig>0) b.rollen['Overig']=overig;\n    });\n  }\n  var legRollen=topRollen.concat(heeftOverig?['Overig']:[]);\n  return {buckets:buckets, rollen:legRollen, step:step};\n}\n\nfunction ipl_dashDrawFteChart(regels,kleur){\n  var canvas=document.getElementById('ipl-dash-ftechart'); if(!canvas||!IPL_MODEL) return;\n  var s=ipl_dashFteSeries(regels);\n  var buckets=s.buckets, rollen=s.rollen;\n  var eenh=IPL_DASH_EENHEID;\n  var conv=function(v){ return eenh==='uren'? v*IPL_UUR_PER_FTE_MAAND : v; };\n\n  var dpr=window.devicePixelRatio||1, cW=Math.max(700,canvas.parentElement.clientWidth-32), cH=260;\n  var PADL=54,PADR=14,PADT=12,PADB=32;\n  canvas.width=cW*dpr;canvas.height=cH*dpr;canvas.style.width=cW+'px';canvas.style.height=cH+'px';\n  var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,cW,cH);\n  if(!buckets.length){ ctx.fillStyle='#9aa3b5'; ctx.font='11px Segoe UI,Arial'; ctx.fillText('Geen data in deze selectie.',PADL,40); return; }\n\n  var t0=buckets[0].t, t1=buckets[buckets.length-1].t+s.step;\n  var maxV=0; buckets.forEach(function(b){ maxV=Math.max(maxV,conv(b.totaal)); }); maxV=Math.max(maxV,1)*1.15;\n  function X(t){ return PADL+((t-t0)/(t1-t0))*(cW-PADL-PADR); }\n  function Y(v){ return cH-PADB-(v/maxV)*(cH-PADT-PADB); }\n\n  // gridlijnen + y-as\n  ctx.strokeStyle='#eef0f5'; ctx.fillStyle='#8a93a8'; ctx.font='9px Segoe UI,Arial';\n  var ySteps=5;\n  for(var i=0;i<=ySteps;i++){ var v=maxV*i/ySteps; var yy=Y(v); ctx.beginPath();ctx.moveTo(PADL,yy);ctx.lineTo(cW-PADR,yy);ctx.stroke();\n    ctx.textAlign='right'; ctx.fillText(eenh==='uren'?Math.round(v).toLocaleString('nl-NL'):v.toFixed(1),PADL-6,yy+3); }\n  ctx.textAlign='left'; ctx.fillStyle='#4a5568'; ctx.font='bold 9px Segoe UI,Arial';\n  ctx.save(); ctx.translate(14,cH/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center';\n  ctx.fillText(eenh==='uren'?'Uren / periode':'FTE (gelijktijdig)',0,0); ctx.restore();\n\n  // x-as labels\n  ctx.font='9px Segoe UI,Arial'; ctx.fillStyle='#6a7898'; ctx.textAlign='center';\n  var labelStep = IPL_DASH_GRAN==='kwartaal' ? 1 : Math.max(1,Math.round(buckets.length/14));\n  for(var bi=0;bi<buckets.length;bi+=labelStep){\n    var xx=X(buckets[bi].t)+ (X(buckets[bi].t+s.step)-X(buckets[bi].t))/2;\n    ctx.fillText(IPL_DASH_GRAN==='kwartaal'?ipl_fmtKwartaal(buckets[bi].t):Math.floor(buckets[bi].t),xx,cH-PADB+14);\n  }\n\n  // gestapelde balken per periode\n  var barW=(cW-PADL-PADR)/buckets.length*0.72;\n  buckets.forEach(function(b){\n    var xC=X(b.t)+(X(b.t+s.step)-X(b.t))/2;\n    var yCum=Y(0);\n    rollen.forEach(function(rl,ri){\n      var v=conv(b.rollen[rl]||0); if(v<=0) return;\n      var yTop=Y(conv((function(){ var acc=0; for(var k=0;k<=ri;k++) acc+=(b.rollen[rollen[k]]||0); return acc; })()));\n      ctx.fillStyle=ipl_rolKleur(rl,ri);\n      ctx.fillRect(xC-barW/2,yTop,barW,yCum-yTop);\n      yCum=yTop;\n    });\n  });\n\n  // as-lijnen\n  ctx.strokeStyle='#c7ccd6'; ctx.lineWidth=1;\n  ctx.beginPath(); ctx.moveTo(PADL,PADT); ctx.lineTo(PADL,cH-PADB); ctx.lineTo(cW-PADR,cH-PADB); ctx.stroke();\n\n  // legenda onder de grafiek\n  var legEl=document.getElementById('ipl-dash-ftelegend');\n  if(legEl){\n    legEl.innerHTML=rollen.map(function(rl,ri){\n      return '<span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"display:inline-block;width:11px;height:11px;border-radius:2px;background:'+ipl_rolKleur(rl,ri)+';\"></span><span style=\"color:#3a4658;\">'+rl+'</span></span>';\n    }).join('');\n  }\n}\n\n// ── pivot: FTE/uren-inzet per functie × per project ──\nfunction ipl_dashFtePivot(regels){\n  var data={}, projTotals={}, rolTotals={}, grand=0;\n  regels.filter(function(r){return r.kind!=='mile';}).forEach(function(r){\n    if(!r.project) return;\n    var e=ipl_eff(r); var dur=Math.max(e.t1-e.t0,0)*12;\n    ipl_dashTaakFteRollen(r).forEach(function(a){\n      var fm=(parseFloat(a.fte)||0)*dur;\n      if(!data[a.rol]) data[a.rol]={};\n      data[a.rol][r.project]=(data[a.rol][r.project]||0)+fm;\n      projTotals[r.project]=(projTotals[r.project]||0)+fm;\n      rolTotals[a.rol]=(rolTotals[a.rol]||0)+fm;\n      grand+=fm;\n    });\n  });\n  return {data:data, projTotals:projTotals, rolTotals:rolTotals, grand:grand};\n}\nfunction ipl_dashRenderPivot(p,kleur,label){\n  var eenh=IPL_DASH_EENHEID;\n  var conv=function(v){ return eenh==='uren'? v*IPL_UUR_PER_FTE_MAAND : v; };\n  var fmt=function(v){ v=conv(v); return eenh==='uren'?Math.round(v).toLocaleString('nl-NL'):v.toFixed(1); };\n\n  var rollen=Object.keys(p.rolTotals).sort(function(a,b){return p.rolTotals[b]-p.rolTotals[a];});\n  var projecten=Object.keys(p.projTotals).sort(function(a,b){return p.projTotals[b]-p.projTotals[a];});\n  var maxCols=10;\n  var projShow=projecten.slice(0,maxCols);\n  var projRest=projecten.slice(maxCols);\n\n  if(!rollen.length){\n    return ipl_card('Uren/FTE-inzet per functie per project — '+label,'<div style=\"padding:16px;font-size:12px;color:#9aa3b5;\">Geen FTE-toewijzingen gevonden in deze selectie. Stel FTE per taak in via <strong>Project &amp; budget</strong>.</div>');\n  }\n\n  var head='<th style=\"padding:7px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;position:sticky;left:0;background:#f4f6fb;z-index:2;\">Functie</th>'\n    +projShow.map(function(pid){ var nm=(IPL_MODEL.wbs[pid]&&IPL_MODEL.wbs[pid].naam)||pid; nm=nm.length>16?nm.substring(0,16)+'…':nm;\n      return '<th title=\"'+((IPL_MODEL.wbs[pid]&&IPL_MODEL.wbs[pid].naam)||pid)+'\" style=\"padding:7px 8px;text-align:right;font-size:9px;text-transform:uppercase;color:#6a7898;white-space:nowrap;\">'+nm+'</th>'; }).join('')\n    +(projRest.length?'<th style=\"padding:7px 8px;text-align:right;font-size:9px;text-transform:uppercase;color:#6a7898;\">+'+projRest.length+' overig</th>':'')\n    +'<th style=\"padding:7px 10px;text-align:right;font-size:9px;text-transform:uppercase;color:#fff;background:'+kleur+';\">Totaal</th>';\n\n  var rows=rollen.map(function(rl,ri){\n    var cells=projShow.map(function(pid){ var v=(p.data[rl]&&p.data[rl][pid])||0;\n      return '<td style=\"padding:6px 8px;text-align:right;font-size:11px;color:'+(v>0?'#2a3445':'#c7ccd6')+';\">'+(v>0?fmt(v):'·')+'</td>'; }).join('');\n    var restV=projRest.reduce(function(s,pid){return s+((p.data[rl]&&p.data[rl][pid])||0);},0);\n    var restCell=projRest.length?'<td style=\"padding:6px 8px;text-align:right;font-size:11px;color:'+(restV>0?'#2a3445':'#c7ccd6')+';\">'+(restV>0?fmt(restV):'·')+'</td>':'';\n    return '<tr>'\n      +'<td style=\"padding:6px 10px;font-size:11px;font-weight:600;position:sticky;left:0;background:#fff;display:flex;align-items:center;gap:6px;\"><span style=\"display:inline-block;width:9px;height:9px;border-radius:2px;background:'+ipl_rolKleur(rl,ri)+';flex-shrink:0;\"></span>'+rl+'</td>'\n      +cells+restCell\n      +'<td style=\"padding:6px 10px;text-align:right;font-size:11px;font-weight:800;color:'+kleur+';background:#f8f9fc;\">'+fmt(p.rolTotals[rl])+'</td></tr>';\n  }).join('');\n\n  var footCells=projShow.map(function(pid){ return '<td style=\"padding:6px 8px;text-align:right;font-size:10px;font-weight:700;color:#4a5568;\">'+fmt(p.projTotals[pid])+'</td>'; }).join('');\n  var footRest=projRest.length?'<td style=\"padding:6px 8px;text-align:right;font-size:10px;font-weight:700;color:#4a5568;\">'+fmt(projRest.reduce(function(s,pid){return s+p.projTotals[pid];},0))+'</td>':'';\n\n  var tabel='<div style=\"overflow-x:auto;\"><table style=\"width:100%;border-collapse:collapse;min-width:640px;\"><thead><tr style=\"background:#f4f6fb;\">'+head+'</tr></thead>'\n    +'<tbody>'+rows+'</tbody>'\n    +'<tfoot><tr style=\"border-top:2px solid '+kleur+';background:#f8f9fc;\"><td style=\"padding:6px 10px;font-size:10px;font-weight:800;color:'+kleur+';position:sticky;left:0;background:#f8f9fc;\">Totaal</td>'+footCells+footRest+'<td style=\"padding:6px 10px;text-align:right;font-size:11px;font-weight:800;color:'+kleur+';\">'+fmt(p.grand)+'</td></tr></tfoot></table></div>';\n\n  var eenhLbl=eenh==='uren'?'uren':'FTE-maanden (cumulatieve inzet)';\n  return ipl_card('Uren/FTE-inzet per functie per project — '+label+' <span style=\"font-weight:400;font-size:10px;color:#9aa3b5;\">('+eenhLbl+')</span>', tabel);\n}\nfunction ipl_dashDrawCap(regels,kleur){\n  ipl_dashDrawFteChart(regels,kleur);\n}\n\n// ── STRATEGISCH: mijlpalen / openstellingen / risico's ──\nfunction ipl_dashStrategisch(regels,kleur,label){\n  var miles=regels.filter(function(r){return r.kind==='mile';});\n  var verschovenMiles=miles.filter(function(r){return Math.abs(IPL_CASCADE[r.id]||0)>0.001;});\n  // 'openstellingen' = mijlpalen met relevante naam\n  var openst=miles.filter(function(r){return /openstelling|opening|gereed|beschikbaar|live|in gebruik/i.test(r.naam);});\n  var openstHit=openst.filter(function(r){return Math.abs(IPL_CASCADE[r.id]||0)>0.001;});\n\n  var kpis='<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;\">'\n    +ipl_kpi(kleur,miles.length,'Mijlpalen')\n    +ipl_kpi('#0a4ea0',openst.length,'Opleveringen/openstellingen')\n    +ipl_kpi(verschovenMiles.length?'#c0121f':'#1a8a4a',verschovenMiles.length,'Mijlpalen verschoven')\n    +ipl_kpi(openstHit.length?'#c0121f':'#1a8a4a',openstHit.length,'Opleveringen geraakt')\n    +'</div>';\n\n  // risico-banner\n  var risico='';\n  if(verschovenMiles.length){\n    risico='<div style=\"background:#fde8ea;border:1px solid #c0121f;border-left:4px solid #c0121f;border-radius:4px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#7a1020;\">'\n      +'<strong>⚠ '+verschovenMiles.length+' mijlpaal/-palen verschoven door het huidige scenario.</strong> '\n      +(openstHit.length?'Waarvan '+openstHit.length+' oplevering(en)/openstelling(en) — directe impact op einddatum.':'Nog geen oplevering geraakt.')\n      +'</div>';\n  }\n\n  // mijlpalentabel (verschoven eerst)\n  var sorted=miles.slice().sort(function(a,b){ var sa=Math.abs(IPL_CASCADE[a.id]||0)>0.001?0:1, sb=Math.abs(IPL_CASCADE[b.id]||0)>0.001?0:1; if(sa!==sb)return sa-sb; return ipl_eff(a).t0-ipl_eff(b).t0; });\n  var rows=sorted.slice(0,60).map(function(r){\n    var e=ipl_eff(r); var sh=IPL_CASCADE[r.id]||0;\n    var isOpen=/openstelling|opening|gereed|beschikbaar|live|in gebruik/i.test(r.naam);\n    return '<tr'+(Math.abs(sh)>0.001?' style=\"background:#fff6f6;\"':'')+'><td style=\"padding:5px 10px;font-size:10px;color:#5a2d82;font-weight:700;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;\">'+ipl_regelProjectNaam(r)+'</td>'\n      +'<td style=\"padding:5px 10px;font-size:11px;\">'+(isOpen?'<span style=\"color:#0a4ea0;font-weight:700;\">◆ </span>':'◇ ')+r.naam+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:10px;color:#6a7898;\">'+ipl_fToDate(r.t0)+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:11px;color:'+(Math.abs(sh)>0.001?'#c0121f':'#3a4658')+';font-weight:'+(Math.abs(sh)>0.001?'700':'400')+';\">'+ipl_fToDate(e.t0)+'</td>'\n      +'<td style=\"padding:5px 8px;text-align:center;font-size:11px;font-weight:700;color:'+(sh>0?'#c0121f':(sh<0?'#0a6ec0':'#9aa'))+';\">'+(Math.abs(sh)>0.001?(sh>0?'+':'')+Math.round(sh*12)+'m':'—')+'</td></tr>';\n  }).join('');\n  var tabel=ipl_card('Mijlpalen & opleveringen in '+label+(sorted.length>60?' (eerste 60 van '+sorted.length+')':''),\n    '<div style=\"max-height:380px;overflow-y:auto;\"><table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#f4f6fb;position:sticky;top:0;\">'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Project</th>'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Mijlpaal</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Origineel</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Nieuw</th>'\n    +'<th style=\"padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;color:#6a7898;\">Δ</th>'\n    +'</tr></thead><tbody>'+rows+'</tbody></table></div>');\n\n  return kpis+risico+tabel;\n}\n\n\n\n// ===== IPL PROJECT CONFIG =====\n\n// ══════════════════════════════════════════════════════════\n// IPL PROJECT-CONFIGURATIE — budget + FTE per geïmporteerd project\n// ══════════════════════════════════════════════════════════\nvar IPL_CONFIG = { budget:{}, verdeel:{}, fte:{} }; // per projectId\nvar IPL_CFG_SEL = null; // geselecteerd projectId\nvar IPL_DEFAULT_FTE = 1.5;\n\n// regels van een project (alle activiteiten in de tak)\nfunction ipl_projRegels(projId){\n  if(!IPL_MODEL) return [];\n  return IPL_MODEL.regels.filter(function(r){ return r.wbsPath && r.wbsPath.indexOf(projId)>=0; });\n}\nfunction ipl_cfgTaakFte(r){\n  var c=IPL_CONFIG.fte[r.id];\n  var s=0; if(c) for(var i=0;i<c.length;i++) s+=(parseFloat(c[i].fte)||0);\n  return s;\n}\nfunction ipl_cfgInit(projId){\n  if(!IPL_CONFIG.budget[projId]) IPL_CONFIG.budget[projId]=0;\n  if(!IPL_CONFIG.verdeel[projId]){ IPL_CONFIG.verdeel[projId]={}; ipl_projRegels(projId).forEach(function(r){ if(r.kind!=='mile') IPL_CONFIG.verdeel[projId][r.id]=1; }); }\n  ipl_projRegels(projId).forEach(function(r){\n    if(r.kind==='mile') return;\n    if(!IPL_CONFIG.fte[r.id]) IPL_CONFIG.fte[r.id]=[]; // geen automatische standaardrol meer\n  });\n}\nfunction ipl_cfgBudgetVerdeling(projId){\n  var regels=ipl_projRegels(projId).filter(function(r){return r.kind!=='mile';});\n  var totaal=IPL_CONFIG.budget[projId]||0; var sleutel=IPL_CONFIG.verdeel[projId]||{};\n  var som=0; regels.forEach(function(r){ som+=(parseFloat(sleutel[r.id])||0); }); if(som<=0)som=regels.length||1;\n  var perRegel={},perJaar={},perRegelJaar={};\n  regels.forEach(function(r){\n    var gew=parseFloat(sleutel[r.id]); if(!(gew>0))gew=(som===regels.length?1:0);\n    var bedrag=totaal*(gew/som); perRegel[r.id]=bedrag;\n    var e=ipl_eff(r); var dur=Math.max(e.t1-e.t0,0.01); perRegelJaar[r.id]={};\n    for(var y=Math.floor(IPL_MODEL.t0);y<=Math.ceil(IPL_MODEL.t1);y++){ var ov=Math.max(0,Math.min(e.t1,y+1)-Math.max(e.t0,y)); if(ov>0){ var deel=bedrag*(ov/dur); perRegelJaar[r.id][y]=deel; perJaar[y]=(perJaar[y]||0)+deel; } }\n  });\n  return {totaal:totaal,perRegel:perRegel,perJaar:perJaar,perRegelJaar:perRegelJaar};\n}\nfunction ipl_fmtEur(k){ if(k>=1000)return '€ '+(k/1000).toFixed(k%1000===0?0:1)+' mln'; return '€ '+Math.round(k)+'k'; }\n\nfunction ipl_cfgFillSelect(){\n  var sel=document.getElementById('ipl-cfg-select'); if(!sel||!IPL_MODEL) return;\n  var byBlok={}; IPL_MODEL.projecten.forEach(function(p){ if(!byBlok[p.blok])byBlok[p.blok]=[]; byBlok[p.blok].push(p); });\n  var html='';\n  IPL_MODEL.blokken.forEach(function(b){ if(!byBlok[b.id])return; html+='<optgroup label=\"'+b.naam+'\">';\n    byBlok[b.id].forEach(function(p){ html+='<option value=\"'+p.id+'\">'+(p.niveau>=3?'   ':'')+p.naam+' ('+p.aantal+' act)</option>'; }); html+='</optgroup>'; });\n  sel.innerHTML=html;\n  if(!IPL_CFG_SEL) IPL_CFG_SEL=sel.value;\n  else sel.value=IPL_CFG_SEL;\n}\nfunction ipl_cfgSelChanged(){ var sel=document.getElementById('ipl-cfg-select'); IPL_CFG_SEL=sel.value; renderIPLConfig(); }\n\nfunction renderIPLConfig(){\n  var el=document.getElementById('ipl-cfg-content'); if(!el) return;\n  if(!IPL_MODEL){ el.innerHTML='<div style=\"padding:40px;text-align:center;color:#6a7898;font-size:13px;\">Laad eerst een planning via <strong>Planning importeren</strong> om projecten te configureren.</div>'; return; }\n  ipl_cfgFillSelect();\n  var projId=IPL_CFG_SEL||(IPL_MODEL.projecten[0]&&IPL_MODEL.projecten[0].id); if(!projId){ el.innerHTML='<div style=\"padding:20px;color:#6a7898;\">Geen projecten gedetecteerd in deze planning.</div>'; return; }\n  ipl_cfgInit(projId);\n  ipl_computeCascade();\n  var pnaam=IPL_MODEL.wbs[projId]?IPL_MODEL.wbs[projId].naam:projId;\n  var kleur=IPL_DIENST_KLEUR[ (IPL_WBS_DIENST[ (IPL_MODEL.regels.filter(function(r){return r.project===projId;})[0]||{}).blok ]) ]||'#003082';\n  var bv=ipl_cfgBudgetVerdeling(projId);\n  var regels=ipl_projRegels(projId);\n\n  // budget\n  var budgetBlok='<div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:14px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+kleur+';margin-bottom:10px;\">Totaalbudget — '+pnaam+'</div>'\n    +'<div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">'\n    +'<label style=\"font-size:12px;color:var(--text-sub);\">Totaalbudget (k€):</label>'\n    +'<input type=\"number\" value=\"'+(IPL_CONFIG.budget[projId]||0)+'\" step=\"500\" min=\"0\" onchange=\"ipl_cfgSetBudget(\\''+projId+'\\',this.value)\" style=\"padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-size:14px;font-weight:700;width:140px;color:'+kleur+';\">'\n    +'<span style=\"font-size:16px;font-weight:800;color:'+kleur+';\">'+ipl_fmtEur(IPL_CONFIG.budget[projId]||0)+'</span></div></div>';\n\n  // verdeelsleutel + jaren\n  var jaren=[]; for(var y in bv.perJaar) jaren.push(parseInt(y)); jaren.sort();\n  var taken=regels.filter(function(r){return r.kind!=='mile';});\n  var rows=taken.map(function(r){\n    var gew=IPL_CONFIG.verdeel[projId][r.id]!==undefined?IPL_CONFIG.verdeel[projId][r.id]:1;\n    var jc=jaren.map(function(y){ var v=(bv.perRegelJaar[r.id]&&bv.perRegelJaar[r.id][y])||0; return '<td style=\"padding:4px 8px;text-align:right;font-size:10px;color:'+(v>0?'#3a4658':'#c0c6d0')+';\">'+(v>0?Math.round(v):'·')+'</td>'; }).join('');\n    return '<tr><td style=\"padding:5px 10px;font-size:11px;\">'+r.naam+'</td>'\n      +'<td style=\"padding:5px 8px;text-align:center;\"><input type=\"number\" value=\"'+gew+'\" step=\"0.5\" min=\"0\" onchange=\"ipl_cfgSetVerdeel(\\''+projId+'\\',\\''+r.id+'\\',this.value)\" style=\"width:54px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:center;\"></td>'\n      +'<td style=\"padding:5px 8px;text-align:right;font-size:11px;font-weight:700;color:'+kleur+';\">'+Math.round(bv.perRegel[r.id]||0)+'k</td>'+jc+'</tr>';\n  }).join('');\n  var jhead=jaren.map(function(y){return '<th style=\"padding:6px 8px;text-align:right;font-size:9px;color:#6a7898;\">'+y+'</th>';}).join('');\n  var jfoot=jaren.map(function(y){return '<td style=\"padding:5px 8px;text-align:right;font-size:10px;font-weight:700;color:'+kleur+';\">'+Math.round(bv.perJaar[y]||0)+'k</td>';}).join('');\n  var verdeelBlok = taken.length?('<div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:14px;overflow-x:auto;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+kleur+';margin-bottom:6px;\">Verdeelsleutel — budget per taak &amp; jaar (k€)</div>'\n    +'<div style=\"font-size:11px;color:var(--text-sub);margin-bottom:10px;\">Pas het gewicht per taak aan; het budget wordt naar rato verdeeld en over de jaren gespreid op basis van de (eventueel verschoven) looptijd.</div>'\n    +'<table style=\"width:100%;border-collapse:collapse;min-width:600px;\"><thead><tr style=\"background:#f4f6fb;\">'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Taak</th>'\n    +'<th style=\"padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;color:#6a7898;\">Gewicht</th>'\n    +'<th style=\"padding:6px 8px;text-align:right;font-size:9px;text-transform:uppercase;color:#6a7898;\">Budget</th>'+jhead+'</tr></thead><tbody>'+rows+'</tbody>'\n    +'<tfoot><tr style=\"background:#f0f2f5;border-top:2px solid '+kleur+';\"><td colspan=\"2\" style=\"padding:6px 10px;font-size:11px;font-weight:700;\">Totaal per jaar</td>'\n    +'<td style=\"padding:6px 8px;text-align:right;font-size:11px;font-weight:800;color:'+kleur+';\">'+Math.round(bv.totaal)+'k</td>'+jfoot+'</tr></tfoot></table></div>'):'';\n\n  // FTE per taak\n  var fteRows=taken.map(function(r){\n    var toew=IPL_CONFIG.fte[r.id]||[]; var assign='';\n    toew.forEach(function(a,ai){\n      var rollen=NT_ROLLEN[a.dienst]||NT_ROLLEN.GPO;\n      var ro=rollen.map(function(x){return '<option value=\"'+x+'\"'+(x===a.rol?' selected':'')+'>'+x+'</option>';}).join('');\n      var dop=['GPO','CIV','VWM','PPO','Regio'].map(function(d){return '<option value=\"'+d+'\"'+(d===a.dienst?' selected':'')+'>'+d+'</option>';}).join('');\n      assign+='<div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px;\">'\n        +'<select onchange=\"ipl_cfgSetFteDienst(\\''+r.id+'\\','+ai+',this.value)\" style=\"padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:10px;width:62px;\">'+dop+'</select>'\n        +'<select onchange=\"ipl_cfgSetFteRol(\\''+r.id+'\\','+ai+',this.value)\" style=\"padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:10px;flex:1;min-width:150px;\">'+ro+'</select>'\n        +'<input type=\"number\" value=\"'+a.fte+'\" step=\"0.25\" min=\"0\" onchange=\"ipl_cfgSetFteVal(\\''+r.id+'\\','+ai+',this.value)\" style=\"width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;text-align:center;\">'\n        +'<span style=\"font-size:9px;color:#6a7898;\">FTE</span>'\n        +'<button onclick=\"ipl_cfgDelFte(\\''+r.id+'\\','+ai+')\" style=\"border:none;background:#fde8ea;color:#c0121f;border-radius:3px;width:20px;height:20px;cursor:pointer;font-size:11px;\">×</button></div>';\n    });\n    var d0=ipl_regelDienst(r);\n    return '<div style=\"border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin-bottom:8px;background:'+(r.crit?'#fffbe6':'#fff')+';\">'\n      +'<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;\"><div style=\"font-size:12px;font-weight:700;color:#2a3445;\">'+r.naam+'</div>'\n      +'<div style=\"font-size:11px;font-weight:800;color:'+(toew.length?kleur:'#9aa3b5')+';\">'+ipl_cfgTaakFte(r).toFixed(2)+' FTE</div></div>'\n      +(toew.length?assign:'<div style=\"font-size:10px;color:#9aa3b5;font-style:italic;margin-bottom:4px;\">Nog geen rol toegewezen — telt mee als 0 FTE.</div>')\n      +'<button onclick=\"ipl_cfgAddFte(\\''+r.id+'\\',\\''+d0+'\\')\" style=\"margin-top:4px;border:1px dashed var(--border);background:#f4f6fb;color:#003082;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:10px;font-weight:600;\">+ rol toevoegen</button></div>';\n  }).join('');\n  var fteBlok = taken.length?('<div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:16px 18px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+kleur+';margin-bottom:12px;\">FTE-bezetting per taak</div>'+fteRows+'</div>'):'<div style=\"padding:20px;color:#6a7898;font-size:12px;\">Dit project heeft alleen mijlpalen, geen taken om te budgetteren.</div>';\n\n  el.innerHTML=budgetBlok+verdeelBlok+ipl_fteTplRenderPanel(projId,kleur)+fteBlok;\n}\nfunction ipl_cfgSetBudget(p,v){ IPL_CONFIG.budget[p]=parseFloat(v)||0; renderIPLConfig(); if(typeof app_autosave==='function')app_autosave('Budget gewijzigd'); }\nfunction ipl_cfgSetVerdeel(p,rid,v){ IPL_CONFIG.verdeel[p][rid]=parseFloat(v)||0; renderIPLConfig(); if(typeof app_autosave==='function')app_autosave('Verdeelsleutel gewijzigd'); }\nfunction ipl_cfgSetFteDienst(rid,i,v){ IPL_CONFIG.fte[rid][i].dienst=v; if(NT_ROLLEN[v].indexOf(IPL_CONFIG.fte[rid][i].rol)<0)IPL_CONFIG.fte[rid][i].rol=NT_ROLLEN[v][0]; renderIPLConfig(); if(typeof app_autosave==='function')app_autosave('FTE-rol gewijzigd'); }\nfunction ipl_cfgSetFteRol(rid,i,v){ IPL_CONFIG.fte[rid][i].rol=v; if(typeof app_autosave==='function')app_autosave('FTE-rol gewijzigd'); }\nfunction ipl_cfgSetFteVal(rid,i,v){ IPL_CONFIG.fte[rid][i].fte=parseFloat(v)||0; renderIPLConfig(); if(typeof app_autosave==='function')app_autosave('FTE-waarde gewijzigd'); }\nfunction ipl_cfgAddFte(rid,d){ IPL_CONFIG.fte[rid].push({rol:(NT_ROLLEN[d]?NT_ROLLEN[d][0]:'Projectmanager'),dienst:d,fte:0.5}); renderIPLConfig(); if(typeof app_autosave==='function')app_autosave('FTE-rol toegevoegd'); }\nfunction ipl_cfgDelFte(rid,i){ IPL_CONFIG.fte[rid].splice(i,1); renderIPLConfig(); if(typeof app_autosave==='function')app_autosave('FTE-rol verwijderd'); }\n\n// ══════════════════════════════════════════════════════════\n// FTE-SJABLONEN — herbruikbare formatie-profielen PER FASE (bv. \"Tunnel FTE\"\n// met een eigen bezetting voor Engineering, Uitvoering, Onderhoud, …).\n// Fase wordt bepaald via ActivityCode \"[VWM] Fase\" indien toegewezen,\n// anders via de genormaliseerde taaknaam (ruis als \"(N.T.B.)\"/\"(temp)\"\n// wordt genegeerd, echte verschillen blijven intact).\n// ══════════════════════════════════════════════════════════\nvar IPL_FTE_TEMPLATES = [];\nvar IPL_FTE_TPL_SEL = null;\n\n// fase-sleutel van een taak: ActivityCode eerst, anders genormaliseerde naam\nfunction ipl_taakFaseSleutel(r){\n  if(typeof ipl_codeWaarde==='function'){\n    var cw=ipl_codeWaarde(r,'[VWM] Fase');\n    if(cw) return (cw.omschrijving||cw.code).trim();\n  }\n  var n=r.naam||'';\n  n=n.replace(/\\s*\\(\\s*N\\.?\\s*T\\.?\\s*B\\.?\\s*\\)\\s*/gi,' ');\n  n=n.replace(/\\s*\\(\\s*temp\\s*\\)\\s*/gi,' ');\n  n=n.replace(/\\s+/g,' ').trim();\n  return n||r.naam.trim();\n}\n\nfunction ipl_fteTplNieuw(){\n  var naam=(document.getElementById('ipl-fte-tpl-naam')||{}).value;\n  naam=(naam||'').trim();\n  if(!naam){ alert('Geef het sjabloon eerst een naam.'); return; }\n  var tpl={ id:'tpl-'+Date.now(), naam:naam, fasen:{} };\n  IPL_FTE_TEMPLATES.push(tpl);\n  IPL_FTE_TPL_SEL=tpl.id;\n  if(typeof app_autosave==='function') app_autosave('FTE-sjabloon aangemaakt: '+naam);\n  renderIPLConfig();\n}\nfunction ipl_fteTplOpslaanVanuitProject(projId){\n  var naam=(document.getElementById('ipl-fte-tpl-naam')||{}).value;\n  naam=(naam||'').trim();\n  if(!naam){ alert('Geef het sjabloon eerst een naam (bv. \"Tunnel FTE\").'); return; }\n  var regels=ipl_projRegels(projId).filter(function(r){return r.kind!=='mile';});\n  var fasen={};\n  regels.forEach(function(r){\n    var faseKey=ipl_taakFaseSleutel(r);\n    if(!fasen[faseKey]) fasen[faseKey]=[];\n    var gezien={}; fasen[faseKey].forEach(function(a){gezien[a.rol+'|'+a.dienst+'|'+a.fte]=1;});\n    (IPL_CONFIG.fte[r.id]||[]).forEach(function(a){\n      var key=a.rol+'|'+a.dienst+'|'+a.fte;\n      if(!gezien[key]){ gezien[key]=1; fasen[faseKey].push({rol:a.rol, dienst:a.dienst, fte:a.fte}); }\n    });\n  });\n  var tpl={ id:'tpl-'+Date.now(), naam:naam, fasen:fasen };\n  IPL_FTE_TEMPLATES.push(tpl);\n  IPL_FTE_TPL_SEL=tpl.id;\n  if(typeof app_autosave==='function') app_autosave('FTE-sjabloon opgeslagen vanuit project: '+naam);\n  renderIPLConfig();\n}\nfunction ipl_fteTplToepassen(tplId,projId){\n  var tpl=IPL_FTE_TEMPLATES.filter(function(t){return t.id===tplId;})[0]; if(!tpl) return;\n  if(!Object.keys(tpl.fasen).length){ alert('Dit sjabloon heeft nog geen fasen met rollen — voeg er eerst toe.'); return; }\n  var regels=ipl_projRegels(projId).filter(function(r){return r.kind!=='mile';});\n  var toegepast=0, nietGematcht=[];\n  regels.forEach(function(r){\n    var faseKey=ipl_taakFaseSleutel(r);\n    var roster=tpl.fasen[faseKey];\n    if(roster && roster.length){\n      IPL_CONFIG.fte[r.id]=roster.map(function(a){return {rol:a.rol,dienst:a.dienst,fte:a.fte};});\n      toegepast++;\n    } else {\n      nietGematcht.push(r.naam+' (fase: \"'+faseKey+'\")');\n    }\n  });\n  var msg='Sjabloon \"'+tpl.naam+'\" toegepast op '+toegepast+' van '+regels.length+' taken (op basis van fase-match).';\n  if(nietGematcht.length) msg+='\\n\\nGeen fase-match voor:\\n'+nietGematcht.join('\\n')+'\\n\\nDeze taken zijn niet gewijzigd — voeg de ontbrekende fase(n) toe aan het sjabloon om ze ook te dekken.';\n  alert(msg);\n  if(typeof app_autosave==='function') app_autosave('FTE-sjabloon \"'+tpl.naam+'\" toegepast op project');\n  renderIPLConfig();\n}\nfunction ipl_fteTplVerwijder(id){\n  IPL_FTE_TEMPLATES=IPL_FTE_TEMPLATES.filter(function(t){return t.id!==id;});\n  if(IPL_FTE_TPL_SEL===id) IPL_FTE_TPL_SEL=null;\n  if(typeof app_autosave==='function') app_autosave('FTE-sjabloon verwijderd');\n  renderIPLConfig();\n}\nfunction ipl_fteTplSelChanged(id){ IPL_FTE_TPL_SEL=id; renderIPLConfig(); }\n\nfunction ipl_fteTplFaseAdd(tplId){\n  var tpl=IPL_FTE_TEMPLATES.filter(function(t){return t.id===tplId;})[0]; if(!tpl) return;\n  var naam=(document.getElementById('ipl-fte-tpl-newfase-'+tplId)||{}).value;\n  naam=(naam||'').trim();\n  if(!naam){ alert('Geef de nieuwe fase een naam (bv. \"Engineering\").'); return; }\n  if(!tpl.fasen[naam]) tpl.fasen[naam]=[];\n  renderIPLConfig();\n}\nfunction ipl_fteTplFaseDel(tplId,faseKey){\n  var tpl=IPL_FTE_TEMPLATES.filter(function(t){return t.id===tplId;})[0]; if(!tpl) return;\n  delete tpl.fasen[faseKey];\n  renderIPLConfig();\n}\nfunction ipl_fteTplRolAdd(tplId,faseKey,dienst){\n  var tpl=IPL_FTE_TEMPLATES.filter(function(t){return t.id===tplId;})[0]; if(!tpl) return;\n  if(!tpl.fasen[faseKey]) tpl.fasen[faseKey]=[];\n  tpl.fasen[faseKey].push({rol:(NT_ROLLEN[dienst]?NT_ROLLEN[dienst][0]:'Projectmanager'), dienst:dienst, fte:0.5});\n  renderIPLConfig();\n}\nfunction ipl_fteTplRolUpdate(tplId,faseKey,i,veld,waarde){\n  var tpl=IPL_FTE_TEMPLATES.filter(function(t){return t.id===tplId;})[0]; if(!tpl||!tpl.fasen[faseKey]) return;\n  var rij=tpl.fasen[faseKey][i]; if(!rij) return;\n  if(veld==='fte') rij.fte=parseFloat(waarde)||0;\n  else if(veld==='dienst'){ rij.dienst=waarde; if(NT_ROLLEN[waarde].indexOf(rij.rol)<0) rij.rol=NT_ROLLEN[waarde][0]; }\n  else rij[veld]=waarde;\n  renderIPLConfig();\n  if(typeof app_autosave==='function')app_autosave('Sjabloon-rol gewijzigd');\n}\nfunction ipl_fteTplRolDel(tplId,faseKey,i){\n  var tpl=IPL_FTE_TEMPLATES.filter(function(t){return t.id===tplId;})[0]; if(!tpl||!tpl.fasen[faseKey]) return;\n  tpl.fasen[faseKey].splice(i,1); renderIPLConfig();\n}\n\nfunction ipl_fteTplRenderPanel(projId,kleur){\n  var opts='<option value=\"\">— kies een sjabloon —</option>'\n    +IPL_FTE_TEMPLATES.map(function(t){return '<option value=\"'+t.id+'\"'+(t.id===IPL_FTE_TPL_SEL?' selected':'')+'>'+t.naam+' ('+Object.keys(t.fasen).length+' fasen)</option>';}).join('');\n  var actieveTpl=IPL_FTE_TEMPLATES.filter(function(t){return t.id===IPL_FTE_TPL_SEL;})[0];\n\n  var tplDetail='';\n  if(actieveTpl){\n    var faseKeys=Object.keys(actieveTpl.fasen);\n    var faseBlokken=faseKeys.map(function(faseKey){\n      var rollen=actieveTpl.fasen[faseKey];\n      var rolRows=rollen.map(function(a,ai){\n        var rolOpties=NT_ROLLEN[a.dienst]||NT_ROLLEN.GPO;\n        var ro=rolOpties.map(function(x){return '<option value=\"'+x+'\"'+(x===a.rol?' selected':'')+'>'+x+'</option>';}).join('');\n        var dop=['GPO','CIV','VWM','PPO','Regio'].map(function(d){return '<option value=\"'+d+'\"'+(d===a.dienst?' selected':'')+'>'+d+'</option>';}).join('');\n        return '<div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px;\">'\n          +'<select onchange=\"ipl_fteTplRolUpdate(\\''+actieveTpl.id+'\\',\\''+faseKey.replace(/'/g,\"\\\\'\")+'\\','+ai+',\\'dienst\\',this.value)\" style=\"padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:10px;width:62px;\">'+dop+'</select>'\n          +'<select onchange=\"ipl_fteTplRolUpdate(\\''+actieveTpl.id+'\\',\\''+faseKey.replace(/'/g,\"\\\\'\")+'\\','+ai+',\\'rol\\',this.value)\" style=\"padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:10px;flex:1;min-width:150px;\">'+ro+'</select>'\n          +'<input type=\"number\" value=\"'+a.fte+'\" step=\"0.25\" min=\"0\" onchange=\"ipl_fteTplRolUpdate(\\''+actieveTpl.id+'\\',\\''+faseKey.replace(/'/g,\"\\\\'\")+'\\','+ai+',\\'fte\\',this.value)\" style=\"width:52px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;text-align:center;\">'\n          +'<span style=\"font-size:9px;color:#6a7898;\">FTE</span>'\n          +'<button onclick=\"ipl_fteTplRolDel(\\''+actieveTpl.id+'\\',\\''+faseKey.replace(/'/g,\"\\\\'\")+'\\','+ai+')\" style=\"border:none;background:#fde8ea;color:#c0121f;border-radius:3px;width:20px;height:20px;cursor:pointer;font-size:11px;\">×</button></div>';\n      }).join('');\n      var totFte=rollen.reduce(function(s,a){return s+(parseFloat(a.fte)||0);},0);\n      return '<div style=\"border:1px solid #d8dce4;border-radius:5px;padding:8px 10px;margin-bottom:8px;background:#fff;\">'\n        +'<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;\">'\n        +'<strong style=\"font-size:11px;color:'+kleur+';\">Fase: '+faseKey+'</strong>'\n        +'<span style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font-size:10px;font-weight:700;color:'+kleur+';\">'+totFte.toFixed(2)+' FTE</span>'\n        +'<button onclick=\"ipl_fteTplFaseDel(\\''+actieveTpl.id+'\\',\\''+faseKey.replace(/'/g,\"\\\\'\")+'\\')\" style=\"border:none;background:#fde8ea;color:#c0121f;border-radius:3px;width:18px;height:18px;cursor:pointer;font-size:10px;\">×</button></span></div>'\n        +(rolRows||'<div style=\"font-size:10px;color:#9aa3b5;margin-bottom:4px;\">Nog geen rollen in deze fase.</div>')\n        +'<button onclick=\"ipl_fteTplRolAdd(\\''+actieveTpl.id+'\\',\\''+faseKey.replace(/'/g,\"\\\\'\")+'\\',\\'GPO\\')\" style=\"border:1px dashed var(--border);background:#f4f6fb;color:#003082;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:9px;font-weight:600;\">+ rol</button>'\n        +'</div>';\n    }).join('');\n\n    tplDetail='<div style=\"border:1px solid '+kleur+';border-radius:6px;padding:10px 12px;margin-top:10px;background:#fafbfd;\">'\n      +'<div style=\"font-size:12px;font-weight:700;color:'+kleur+';margin-bottom:8px;\">'+actieveTpl.naam+' — bezetting per fase</div>'\n      +(faseBlokken||'<div style=\"font-size:10px;color:#9aa3b5;margin-bottom:8px;\">Nog geen fasen — voeg er hieronder een toe, of sla een geconfigureerd project op om fasen automatisch te herkennen.</div>')\n      +'<div style=\"display:flex;gap:6px;align-items:center;margin-top:8px;margin-bottom:10px;\">'\n      +'<input type=\"text\" id=\"ipl-fte-tpl-newfase-'+actieveTpl.id+'\" placeholder=\"Nieuwe fase, bv. Engineering\" style=\"flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;\">'\n      +'<button onclick=\"ipl_fteTplFaseAdd(\\''+actieveTpl.id+'\\')\" style=\"border:1px dashed var(--border);background:#f4f6fb;color:#003082;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:10px;font-weight:600;\">+ fase toevoegen</button></div>'\n      +'<div style=\"display:flex;gap:8px;flex-wrap:wrap;\">'\n      +'<button onclick=\"ipl_fteTplToepassen(\\''+actieveTpl.id+'\\',\\''+projId+'\\')\" style=\"background:'+kleur+';color:#fff;border:none;border-radius:4px;padding:6px 16px;cursor:pointer;font-size:11px;font-weight:700;\">↳ Toepassen op dit project (per fase)</button>'\n      +'<button onclick=\"ipl_fteTplVerwijder(\\''+actieveTpl.id+'\\')\" style=\"border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:4px;padding:6px 12px;cursor:pointer;font-size:10px;\">Sjabloon verwijderen</button>'\n      +'</div></div>';\n  }\n\n  return '<div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:14px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+kleur+';margin-bottom:4px;\">FTE-sjablonen — formatie herbruiken per fase</div>'\n    +'<div style=\"font-size:11px;color:var(--text-sub);margin-bottom:10px;\">Sla een standaard team-bezetting <strong>per fase</strong> op (bv. \"Tunnel FTE\" met een eigen team voor Engineering, Uitvoering, Onderhoud, …) en pas die met één klik toe op elk project. Fase wordt herkend via de taaknaam (ruis als \"(N.T.B.)\" wordt genegeerd).</div>'\n    +'<div style=\"display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;\">'\n    +'<select onchange=\"ipl_fteTplSelChanged(this.value)\" style=\"padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-size:12px;min-width:220px;\">'+opts+'</select>'\n    +'<input type=\"text\" id=\"ipl-fte-tpl-naam\" placeholder=\"Naam nieuw sjabloon, bv. Tunnel FTE\" style=\"padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-size:12px;flex:1;min-width:180px;\">'\n    +'<button onclick=\"ipl_fteTplNieuw()\" style=\"padding:6px 14px;border:1px solid '+kleur+';background:#fff;color:'+kleur+';border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;\">+ Nieuw leeg sjabloon</button>'\n    +'<button onclick=\"ipl_fteTplOpslaanVanuitProject(\\''+projId+'\\')\" style=\"padding:6px 14px;background:'+kleur+';color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;\">↑ Opslaan vanuit dit project (per fase)</button>'\n    +'</div>'\n    +tplDetail\n    +'</div>';\n}\n\n\n\n// ===== METRIEK-ENGINE =====\n\n// ══════════════════════════════════════════════════════════\n// METRIEK-ENGINE — gesloten, per-dienst lijst (zie ontwerpdocument §1a/§4).\n// Elke metriek is een pure berekening over een gefilterde regelset uit\n// IPL_MODEL. Geen vrije formules — dat voorkomt foute KPI's per ontwerp.\n// Metrieken zonder databron in dit bestand (PPO, Regio zonder toewijzing)\n// geven eerlijk {waarde:null, reden:'...'} terug, nooit een verzonnen getal.\n// ══════════════════════════════════════════════════════════\n\n// filter regels op een generieke filterContext {dienst, niveau, regio, wbsGroep}\nfunction ipl_metriekRegels(fc){\n  if(!IPL_MODEL) return [];\n  fc=fc||{};\n  var regels=IPL_MODEL.regels;\n  if(fc.dienst && fc.dienst!=='ALLE'){\n    regels=regels.filter(function(r){ return ipl_regelDienst(r)===fc.dienst; });\n  }\n  if(fc.regio && fc.regio!=='ALLE'){\n    // VC-diensten (VWM/CIV) gebruiken VC-herkenning; Regio-dienst gebruikt regio-herkenning\n    if(fc.dienst==='Regio'){\n      regels=regels.filter(function(r){ return ipl_regelRegio(r)===fc.regio; });\n    } else {\n      regels=regels.filter(function(r){ return ipl_regelVC(r)===fc.regio; });\n    }\n  }\n  if(fc.wbsGroep){\n    regels=regels.filter(function(r){ return r.blok===fc.wbsGroep || (r.wbsPath && r.wbsPath.indexOf(fc.wbsGroep)>=0); });\n  }\n  return regels;\n}\n\nvar IPL_OPENSTELLING_RE=/openstelling|opengesteld|in\\s*gebruik(\\s*name)?|verkeer\\s*vrijgegeven/i;\n\n// centrale metriek-registry: naam -> {label, diensten:[...], bereken:function(fc)->{waarde, detail, reden}}\nvar IPL_METRIEKEN = {\n\n  // ── generiek, alle diensten ──\n  aantalTaken: { label:'Aantal taken', diensten:['ALLE','GPO','CIV','VWM','PPO','Regio'],\n    bereken:function(fc){\n      var r=ipl_metriekRegels(fc).filter(function(x){return x.kind!=='mile';});\n      return {waarde:r.length, detailRegels:ipl_drillTaken(r)};\n    } },\n  aantalMijlpalen: { label:'Aantal mijlpalen', diensten:['ALLE','GPO','CIV','VWM','PPO','Regio'],\n    bereken:function(fc){\n      var r=ipl_metriekRegels(fc).filter(function(x){return x.kind==='mile';});\n      return {waarde:r.length, detailRegels:ipl_drillTaken(r)};\n    } },\n  aantalVerschoven: { label:'Aantal verschoven activiteiten', diensten:['ALLE','GPO','CIV','VWM','PPO','Regio'],\n    bereken:function(fc){\n      var r=ipl_metriekRegels(fc).filter(function(x){return Math.abs(IPL_CASCADE[x.id]||0)>0.001;});\n      return {waarde:r.length, detailRegels:ipl_drillTaken(r,true)};\n    } },\n  aantalCrossDienst: { label:'Aantal cross-dienst afhankelijkheden', diensten:['ALLE','GPO','CIV','VWM','PPO','Regio'],\n    bereken:function(fc){\n      if(!IPL_MODEL) return {waarde:0, detailRegels:[]};\n      var regelIds={}; ipl_metriekRegels(fc).forEach(function(r){regelIds[r.id]=1;});\n      var lijst=[];\n      IPL_MODEL.relaties.forEach(function(rel){\n        if(!(regelIds[rel.from]||regelIds[rel.to])) return;\n        var a=ipl_regelById(rel.from), b=ipl_regelById(rel.to);\n        if(a&&b&&ipl_regelDienst(a)!==ipl_regelDienst(b)){\n          lijst.push({naam:a.naam+' → '+b.naam, periode:'', status:ipl_regelDienst(a)+' → '+ipl_regelDienst(b), project:ipl_regelProjectNaam(a)||ipl_regelProjectNaam(b)});\n        }\n      });\n      return {waarde:lijst.length, detailRegels:lijst};\n    } },\n\n  // ── GPO ──\n  faseVoortgang: { label:'Fasevoortgang (% per fase)', diensten:['GPO'],\n    bereken:function(fc){\n      var typeNaam='[VWM] Fase';\n      if(!IPL_MODEL || IPL_MODEL.codeAssignCount<=0) return {waarde:null, reden:'Geen ActivityCode-toewijzingen aan taken in dit bestand — fase-indeling kan niet automatisch bepaald worden.', detailRegels:[]};\n      var regels=ipl_metriekRegels(fc).filter(function(r){return r.kind!=='mile';});\n      var per={}; var totaal=0; var lijst=[];\n      regels.forEach(function(r){ var cw=ipl_codeWaarde(r,typeNaam); if(cw){ var f=cw.omschrijving||cw.code; per[f]=(per[f]||0)+1; totaal++;\n        lijst.push({naam:r.naam, periode:ipl_drillPeriode(r), status:f, project:ipl_regelProjectNaam(r)}); } });\n      if(!totaal) return {waarde:null, reden:'Geen taken met een Fase-toewijzing in deze selectie.', detailRegels:[]};\n      return {waarde:totaal, detail:per, detailRegels:lijst};\n    } },\n  mijlpaalStatusOpenstelling: { label:'Openstellingsmijlpalen op schema / verschoven', diensten:['GPO'],\n    bereken:function(fc){\n      var r=ipl_metriekRegels(fc).filter(function(x){return x.kind==='mile' && IPL_OPENSTELLING_RE.test(x.naam);});\n      var verschoven=r.filter(function(x){return Math.abs(IPL_CASCADE[x.id]||0)>0.001;});\n      return {waarde:r.length, detail:{opSchema:r.length-verschoven.length, verschoven:verschoven.length}, detailRegels:ipl_drillTaken(r,true)};\n    } },\n  aantalProjectenRisicoOpenstelling: { label:'Projecten met risico op openstellingsvertraging', diensten:['GPO'],\n    bereken:function(fc){\n      var r=ipl_metriekRegels(fc).filter(function(x){return x.kind==='mile' && IPL_OPENSTELLING_RE.test(x.naam) && Math.abs(IPL_CASCADE[x.id]||0)>0.001;});\n      var projecten={}; r.forEach(function(x){ if(x.project) projecten[x.project]=1; });\n      return {waarde:Object.keys(projecten).length, detailRegels:ipl_drillTaken(r,true)};\n    } },\n\n  // ── CIV ──\n  bouwblokGereedheid: { label:'Bouwblokken gereed vóór afnamemoment', diensten:['CIV'],\n    bereken:function(fc){\n      if(!IPL_MODEL) return {waarde:null, detailRegels:[]};\n      var regelIds={}; ipl_metriekRegels(fc).forEach(function(r){regelIds[r.id]=1;});\n      var gereed=0, risico=0, lijst=[];\n      IPL_MODEL.relaties.forEach(function(rel){\n        if(!regelIds[rel.from]) return;\n        var a=ipl_regelById(rel.from), b=ipl_regelById(rel.to);\n        if(!a||!b) return;\n        if(ipl_regelDienst(a)!=='CIV' || ipl_regelDienst(b)==='CIV') return;\n        var ea=ipl_eff(a), eb=ipl_eff(b);\n        var ok=ea.t1<=eb.t0+0.01;\n        if(ok) gereed++; else risico++;\n        lijst.push({naam:a.naam+' → '+b.naam, periode:ipl_fToDate(ea.t1)+' vs. '+ipl_fToDate(eb.t0), status:ok?'gereed':'risico', project:ipl_regelProjectNaam(a)||ipl_regelProjectNaam(b)});\n      });\n      if(gereed+risico===0) return {waarde:null, reden:'Geen cross-dienst afhankelijkheden gevonden vanuit CIV-activiteiten in deze selectie.', detailRegels:[]};\n      return {waarde:gereed+risico, detail:{gereed:gereed, risico:risico}, detailRegels:lijst};\n    } },\n  piekFte: { label:'Piek FTE-inzet', diensten:['CIV','VWM'],\n    bereken:function(fc){\n      var regels=ipl_metriekRegels(fc).filter(function(r){return r.kind!=='mile';});\n      if(!regels.length) return {waarde:null, reden:'Geen taken in deze selectie.', detailRegels:[]};\n      if(typeof ipl_dashEnsureFte==='function') ipl_dashEnsureFte(regels);\n      var t0=IPL_MODEL.t0,t1=IPL_MODEL.t1,peak=0,peakT=t0;\n      for(var t=t0;t<=t1;t+=1/12){ var f=0;\n        regels.forEach(function(r){ var e=ipl_eff(r); if(t>=e.t0&&t<e.t1 && typeof ipl_dashTaakFteRollen==='function'){ ipl_dashTaakFteRollen(r).forEach(function(a){f+=parseFloat(a.fte)||0;}); } });\n        if(f>peak){ peak=f; peakT=t; }\n      }\n      var actiefOpPiek=regels.filter(function(r){ var e=ipl_eff(r); return peakT>=e.t0&&peakT<e.t1; });\n      var lijst=actiefOpPiek.map(function(r){\n        var fte=0; if(typeof ipl_dashTaakFteRollen==='function') ipl_dashTaakFteRollen(r).forEach(function(a){fte+=parseFloat(a.fte)||0;});\n        return {naam:r.naam, periode:ipl_drillPeriode(r), status:fte.toFixed(2)+' FTE', project:ipl_regelProjectNaam(r)};\n      });\n      return {waarde:Math.round(peak*10)/10, detail:{piekMoment:ipl_fToDate(peakT)}, detailRegels:lijst};\n    } },\n  uitrolStatusPerVC: { label:'Uitroltaken per verkeerscentrale', diensten:['CIV'],\n    bereken:function(fc){\n      var regels=ipl_metriekRegels(fc).filter(function(r){return r.kind!=='mile';});\n      var perVC={}; var zonderVC=0; var lijst=[];\n      regels.forEach(function(r){ var vc=ipl_regelVC(r); if(vc){ perVC[vc]=(perVC[vc]||0)+1; lijst.push({naam:r.naam, periode:ipl_drillPeriode(r), status:vc, project:ipl_regelProjectNaam(r)}); } else zonderVC++; });\n      if(!Object.keys(perVC).length) return {waarde:null, reden:'Geen taken met verkeerscentrale-herkenning in deze selectie.', detailRegels:[]};\n      return {waarde:regels.length-zonderVC, detail:perVC, detailRegels:lijst};\n    } },\n\n  // ── VWM ──\n  cumulatieveInzet: { label:'Cumulatieve inzet (FTE-maanden)', diensten:['VWM','CIV'],\n    bereken:function(fc){\n      var regels=ipl_metriekRegels(fc).filter(function(r){return r.kind!=='mile';});\n      if(!regels.length) return {waarde:null, reden:'Geen taken in deze selectie.', detailRegels:[]};\n      if(typeof ipl_dashEnsureFte==='function') ipl_dashEnsureFte(regels);\n      var tot=0; var lijst=[];\n      regels.forEach(function(r){ var e=ipl_eff(r); var dur=Math.max(e.t1-e.t0,0)*12; var bijdrage=0;\n        if(typeof ipl_dashTaakFteRollen==='function') ipl_dashTaakFteRollen(r).forEach(function(a){ var fm=(parseFloat(a.fte)||0)*dur; tot+=fm; bijdrage+=fm; });\n        lijst.push({naam:r.naam, periode:ipl_drillPeriode(r), status:bijdrage.toFixed(1)+' fte-mnd', project:ipl_regelProjectNaam(r)});\n      });\n      lijst.sort(function(a,b){return parseFloat(b.status)-parseFloat(a.status);});\n      return {waarde:Math.round(tot), detailRegels:lijst};\n    } },\n  opleidingGereedheidVoorOpenstelling: { label:'Opleiding gereed vóór openstelling', diensten:['VWM'],\n    bereken:function(fc){\n      var regels=ipl_metriekRegels(fc).filter(function(r){\n        if(r.kind==='mile') return false;\n        if(/opleiding/i.test(r.naam)) return true;\n        return r.wbsPath && r.wbsPath.some(function(wid){ return IPL_MODEL.wbs[wid] && /opleiding/i.test(IPL_MODEL.wbs[wid].naam); });\n      });\n      if(!regels.length) return {waarde:null, reden:'Geen opleidingsgerelateerde taken (naam of WBS-groep bevat \"opleiding\") in deze selectie.', detailRegels:[]};\n      var regelIds={}; regels.forEach(function(r){regelIds[r.id]=1;});\n      var gereed=0, risico=0, lijst=[];\n      IPL_MODEL.relaties.forEach(function(rel){\n        if(!regelIds[rel.from]) return;\n        var a=ipl_regelById(rel.from), b=ipl_regelById(rel.to);\n        if(!a||!b||b.kind!=='mile'||!IPL_OPENSTELLING_RE.test(b.naam)) return;\n        var ea=ipl_eff(a), eb=ipl_eff(b);\n        var ok=ea.t1<=eb.t0+0.01;\n        if(ok) gereed++; else risico++;\n        lijst.push({naam:a.naam+' → '+b.naam, periode:ipl_fToDate(ea.t1)+' vs. '+ipl_fToDate(eb.t0), status:ok?'gereed':'risico', project:ipl_regelProjectNaam(a)||ipl_regelProjectNaam(b)});\n      });\n      if(gereed+risico===0) return {waarde:null, reden:'Geen opleidingstaken met directe relatie naar een openstellingsmijlpaal gevonden.', detailRegels:[]};\n      return {waarde:gereed+risico, detail:{gereed:gereed, risico:risico}, detailRegels:lijst};\n    } },\n  lcmConflictRisico: { label:'LCM-taken geraakt door verschuiving', diensten:['VWM'],\n    bereken:function(fc){\n      var regels=ipl_metriekRegels(fc).filter(function(r){\n        if(/lcm/i.test(r.naam)) return true;\n        return r.wbsPath && r.wbsPath.some(function(wid){ return IPL_MODEL.wbs[wid] && /^lcm$/i.test((IPL_MODEL.wbs[wid].naam||'').trim()); });\n      });\n      if(!regels.length) return {waarde:null, reden:'Geen LCM-gerelateerde taken (naam of WBS-groep \"LCM\") in deze selectie.', detailRegels:[]};\n      var geraakt=regels.filter(function(r){return Math.abs(IPL_CASCADE[r.id]||0)>0.001;});\n      return {waarde:geraakt.length, detail:{totaal:regels.length}, detailRegels:ipl_drillTaken(regels,true)};\n    } },\n\n  // ── PPO — geen databron in dit bestand ──\n  contractstatus: { label:'Contractstatus', diensten:['PPO'],\n    bereken:function(){ return {waarde:null, reden:'Geen contractgegevens in de Primavera-export. Koppel een aparte contract-/areaalbron om deze metriek te vullen.', detailRegels:[]}; } },\n  inBeheernameGereedheid: { label:'In-beheername gereedheid', diensten:['PPO'],\n    bereken:function(){ return {waarde:null, reden:'Geen in-beheername-gegevens in de Primavera-export.', detailRegels:[]}; } },\n  portfolioBudgetRestant: { label:'Portfolio-budgetrestant', diensten:['PPO'],\n    bereken:function(){ return {waarde:null, reden:'Geen budgetgegevens gekoppeld — zie het aparte Project & budget-scherm voor projectbudgetten, dit is geen portfoliobron.', detailRegels:[]}; } },\n\n  // ── Regio — alleen via ActivityCode, afhankelijk van gekozen schema ──\n  aantalProjectenPerRegio: { label:'Aantal projecten per regio', diensten:['Regio'],\n    bereken:function(fc){\n      if(!IPL_DASHCONFIG.regioHerkenning.activityCodeTypeNaam) return {waarde:null, reden:'Nog geen regioschema gekozen (SB of MPTW) — stel dit in bij Dashboard configureren.', detailRegels:[]};\n      if(!IPL_MODEL || IPL_MODEL.codeAssignCount<=0) return {waarde:null, reden:'Geen ActivityCode-toewijzingen in dit bestand — regio-indeling kan niet bepaald worden.', detailRegels:[]};\n      var regels=ipl_metriekRegels(fc);\n      var perRegio={}; var lijst=[];\n      regels.forEach(function(r){ var rg=ipl_regelRegio(r); if(rg&&r.project){ (perRegio[rg]=perRegio[rg]||{})[r.project]=1; lijst.push({naam:r.naam, periode:ipl_drillPeriode(r), status:rg, project:ipl_regelProjectNaam(r)}); } });\n      var totaal=0; Object.keys(perRegio).forEach(function(k){totaal+=Object.keys(perRegio[k]).length;});\n      if(!totaal) return {waarde:null, reden:'Geen projecten met regio-toewijzing gevonden.', detailRegels:[]};\n      return {waarde:totaal, detail:perRegio, detailRegels:lijst};\n    } },\n  gebiedsRisicoOpstapeling: { label:'Gebieden met meerdere projecten tegelijk in uitvoering', diensten:['Regio'],\n    bereken:function(fc){\n      if(!IPL_DASHCONFIG.regioHerkenning.activityCodeTypeNaam || !IPL_MODEL || IPL_MODEL.codeAssignCount<=0){\n        return {waarde:null, reden:'Regio-schema niet ingesteld of geen ActivityCode-toewijzingen aanwezig.', detailRegels:[]};\n      }\n      return {waarde:null, reden:'Nog niet berekenbaar zonder regio-toewijzingen in de brondata.', detailRegels:[]};\n    } },\n};\n\n// ── helpers voor drill-down-weergave ──\nfunction ipl_drillPeriode(r){\n  var e=ipl_eff(r);\n  return r.kind==='mile' ? ipl_fToDate(e.t0) : (ipl_fToDate(e.t0)+' → '+ipl_fToDate(e.t1));\n}\nfunction ipl_drillTaken(regels, toonShift){\n  return regels.map(function(r){\n    var sh=IPL_CASCADE[r.id]||0;\n    var status = toonShift ? (Math.abs(sh)>0.001 ? (sh>0?'+':'')+Math.round(sh*12)+'m' : 'ongewijzigd') : '';\n    return {naam:r.naam, periode:ipl_drillPeriode(r), status:status, project:ipl_regelProjectNaam(r)};\n  });\n}\n\nfunction ipl_metriekenVoorDienst(dienst){\n  var out=[];\n  for(var k in IPL_METRIEKEN){ if(IPL_METRIEKEN[k].diensten.indexOf(dienst)>=0 || IPL_METRIEKEN[k].diensten.indexOf('ALLE')>=0) out.push(k); }\n  return out;\n}\nfunction ipl_metriekBereken(metriekNaam, filterContext){\n  var m=IPL_METRIEKEN[metriekNaam];\n  if(!m) return {waarde:null, reden:'Onbekende metriek.'};\n  try{ return m.bereken(filterContext||{}); }\n  catch(e){ return {waarde:null, reden:'Berekening mislukt: '+e.message}; }\n}\n\n\n\n// ===== DASHBOARDS CRUD + RENDER =====\n\n// ══════════════════════════════════════════════════════════\n// DASHBOARDS — meerdere, opgeslagen dashboard-configuraties\n// (ontwerpdocument §4/§12/§13). Elk dashboard = filters + KPI's +\n// visualisaties, gebonden aan één dienst.\n// ══════════════════════════════════════════════════════════\n\nvar IPL_DASHBOARDS = [];\nvar IPL_DASHBOARD_EDIT_ID = null;\n\nfunction ipl_dashboardNieuw(dienst){\n  var db={\n    id:'dash-'+Date.now()+'-'+Math.floor(Math.random()*1000),\n    naam:'Nieuw dashboard', omschrijving:'', dienst:dienst||'VWM', eigenaar:'',\n    status:'concept',\n    filters:{ niveau:'operationeel', regio:'ALLE', periode:'scenario' },\n    kpis:[], visualisaties:[],\n    aangemaakt:new Date().toISOString(), gewijzigd:new Date().toISOString(),\n  };\n  IPL_DASHBOARDS.push(db);\n  IPL_DASHBOARD_EDIT_ID=db.id;\n  return db;\n}\nfunction ipl_dashboardById(id){ return IPL_DASHBOARDS.filter(function(d){return d.id===id;})[0]||null; }\nfunction ipl_dashboardDupliceer(id){\n  var src=ipl_dashboardById(id); if(!src) return;\n  var kopie=JSON.parse(JSON.stringify(src));\n  kopie.id='dash-'+Date.now()+'-'+Math.floor(Math.random()*1000);\n  kopie.naam=src.naam+' (kopie)'; kopie.status='concept';\n  kopie.aangemaakt=new Date().toISOString(); kopie.gewijzigd=kopie.aangemaakt;\n  IPL_DASHBOARDS.push(kopie);\n  if(typeof app_autosave==='function') app_autosave('Dashboard gedupliceerd: '+kopie.naam);\n  return kopie;\n}\nfunction ipl_dashboardVerwijder(id){\n  IPL_DASHBOARDS=IPL_DASHBOARDS.filter(function(d){return d.id!==id;});\n  if(IPL_DASHBOARD_EDIT_ID===id) IPL_DASHBOARD_EDIT_ID=null;\n  if(typeof app_autosave==='function') app_autosave('Dashboard verwijderd');\n}\nfunction ipl_dashboardRaakt(){\n  var d=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(d) d.gewijzigd=new Date().toISOString();\n  if(typeof app_autosave==='function') app_autosave('Dashboard gewijzigd');\n}\n\n// ── validatie (ontwerpdocument §9, subset) ──\nfunction ipl_dashboardValideer(db){\n  var fouten=[], waarschuwingen=[];\n  if(!db.naam || !db.naam.trim()) fouten.push({tekst:'Dit dashboard heeft geen naam.', blokkerend:true});\n  if(!db.omschrijving || !db.omschrijving.trim()) waarschuwingen.push({tekst:'Geef kort aan waar dit dashboard voor dient.', blokkerend:false});\n  if(!db.eigenaar || !db.eigenaar.trim()) fouten.push({tekst:'Dit dashboard heeft geen eigenaar — wijs er één toe vóór publicatie.', blokkerend:true});\n  if(!db.kpis.length) waarschuwingen.push({tekst:'Dit dashboard heeft nog geen KPI\\'s.', blokkerend:false});\n  var namen={};\n  db.kpis.forEach(function(k){\n    if(!k.metriek) fouten.push({tekst:'KPI \"'+(k.naam||'(naamloos)')+'\" heeft nog geen meetwaarde gekozen.', blokkerend:true});\n    if(namen[k.naam]) fouten.push({tekst:'Er bestaat al een KPI met de naam \"'+k.naam+'\" in dit dashboard.', blokkerend:true});\n    namen[k.naam]=1;\n    var r=ipl_metriekBereken(k.metriek, ipl_dashboardFilterContext(db,k));\n    if(r.waarde===0 || r.waarde===null) waarschuwingen.push({tekst:'KPI \"'+k.naam+'\" levert geen resultaat op in de huidige selectie'+(r.reden?' — '+r.reden:'')+'.', blokkerend:false});\n  });\n  db.visualisaties.forEach(function(v,i){\n    if((v.type==='projectStatusTabel'||v.type==='besluitpuntenMatrix')) return; // werken direct op projecten, geen KPI nodig\n    if(!v.kpiRefs || !v.kpiRefs.length){ fouten.push({tekst:'Grafiek/tabel #'+(i+1)+' toont nog niets — koppel een KPI.', blokkerend:true}); }\n  });\n  return {fouten:fouten, waarschuwingen:waarschuwingen, publiceerbaar:fouten.length===0};\n}\nfunction ipl_dashboardFilterContext(db,kpiOverride){\n  var fc={ dienst:db.dienst, niveau:db.filters.niveau, regio:db.filters.regio };\n  if(kpiOverride && kpiOverride.filterContext) for(var k in kpiOverride.filterContext){ if(kpiOverride.filterContext[k]) fc[k]=kpiOverride.filterContext[k]; }\n  return fc;\n}\n\n// ── drill-down: toon de onderliggende taken/relaties van een KPI ──\nfunction ipl_kpiDrilldownShow(dbId,kpiIndex){\n  var db=ipl_dashboardById(dbId); if(!db) return;\n  var k=db.kpis[kpiIndex]; if(!k) return;\n  var r=ipl_metriekBereken(k.metriek, ipl_dashboardFilterContext(db,k));\n  var el=document.getElementById('ipl-dbdrill-'+dbId); if(!el) return;\n  var regels=r.detailRegels||[];\n  var narratief = (typeof ipl_kpiNarratief==='function') ? ipl_kpiNarratief(db,k,r) : '';\n  if(!regels.length && !narratief){ el.innerHTML=''; return; }\n  var rows=regels.slice(0,100).map(function(d){\n    return '<tr><td style=\"padding:5px 10px;font-size:11px;\">'+d.naam+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:10px;color:#5a2d82;font-weight:600;white-space:nowrap;\">'+(d.project||'—')+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:10px;color:#6a7898;white-space:nowrap;\">'+(d.periode||'—')+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:10px
