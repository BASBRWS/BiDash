;text-align:right;white-space:nowrap;\">'+(d.status||'')+'</td></tr>';\n  }).join('');\n  el.innerHTML='<div style=\"background:#fff;border:1px solid #d8dce4;border-radius:8px;overflow:hidden;\">'\n    +'<div style=\"background:#1a2236;color:#fff;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;\">'\n    +'<span style=\"font-size:12px;font-weight:700;\">'+k.naam+(regels.length?' — '+regels.length+' onderliggende taken'+(regels.length>100?' (eerste 100 getoond)':''):'')+'</span>'\n    +'<span onclick=\"document.getElementById(\\'ipl-dbdrill-'+dbId+'\\').innerHTML=\\'\\'\" style=\"cursor:pointer;color:#F9B000;font-weight:700;\">× sluiten</span></div>'\n    +'<div style=\"padding:'+(narratief?'12px 14px 0':'0')+';\">'+narratief+'</div>'\n    +(regels.length?('<div style=\"max-height:320px;overflow-y:auto;\"><table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#f4f6fb;position:sticky;top:0;\">'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Taak</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Project</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Periode</th>'\n    +'<th style=\"padding:6px 8px;text-align:right;font-size:9px;text-transform:uppercase;color:#6a7898;\">Status</th>'\n    +'</tr></thead><tbody>'+rows+'</tbody></table></div>'):'<div style=\"padding:0 14px 12px;\"></div>')\n    +'</div>';\n}\n\n// ── generieke render: KPI-kaarten + visualisaties uit een dashboard-config ──\nfunction ipl_dashboardRenderPreview(db){\n  if(!IPL_MODEL) return '<div style=\"padding:40px;text-align:center;color:#6a7898;font-size:13px;\">Laad eerst een planning via <strong>Planning importeren</strong>.</div>';\n  ipl_computeCascade();\n  var kleur=IPL_DIENST_KLEUR[db.dienst]||'#003082';\n\n  // KPI-kaarten — klikbaar voor drill-down naar de onderliggende taken\n  var kpiHtml='';\n  if(db.kpis.length){\n    kpiHtml='<div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:8px;\">'\n      +db.kpis.map(function(k,ki){\n        var r=ipl_metriekBereken(k.metriek, ipl_dashboardFilterContext(db,k));\n        var col=kleur;\n        if(k.drempels && r.waarde!==null){\n          if(k.drempels.rood!==undefined && r.waarde>=k.drempels.rood) col='#c0121f';\n          else if(k.drempels.oranje!==undefined && r.waarde>=k.drempels.oranje) col='#e06b00';\n          else if(k.drempels.groen!==undefined) col='#1a8a4a';\n        }\n        var waardeTxt = r.waarde===null ? '—' : r.waarde;\n        var kaart=ipl_kpi(col, waardeTxt, k.naam);\n        if(r.waarde===null && r.reden) kaart=kaart.replace('</div></div>','</div><div style=\"font-size:8px;color:#c05000;padding:0 4px 4px;\">'+r.reden+'</div></div>');\n        var heeftDetail=(r.detailRegels && r.detailRegels.length>0) || (typeof IPL_RISICO_BOUWSTENEN!=='undefined' && IPL_RISICO_BOUWSTENEN[k.metriek]);\n        return '<div'+(heeftDetail?' onclick=\"ipl_kpiDrilldownShow(\\''+db.id+'\\','+ki+')\" style=\"cursor:pointer;\"':' style=\"opacity:0.85;\"')+' title=\"'+(heeftDetail?'Klik voor de onderliggende taken':'Geen taken om te tonen')+'\">'+kaart+'</div>';\n      }).join('')+'</div>'\n      +'<div id=\"ipl-dbdrill-'+db.id+'\" style=\"margin-bottom:14px;\"></div>';\n  }\n\n  // visualisaties (vereenvoudigd: elke visualisatie toont zijn gekoppelde KPI's als kaart-groep,\n  // of — voor tijdreeks-achtige KPI's (piekFte/cumulatieveInzet) — hergebruikt de bestaande\n  // FTE-grafiek/pivot-engine wanneer van toepassing)\n  var visHtml=db.visualisaties.map(function(v,vi){\n    var kpiNamen=(v.kpiRefs||[]).join(', ')||'(geen KPI gekoppeld)';\n    if(v.type==='projectStatusTabel'){\n      return ipl_card('Projectstatus — fase, openstelling, risico', ipl_renderProjectStatusTabel(db));\n    }\n    if(v.type==='besluitpuntenMatrix'){\n      return ipl_card('Besluitpunten per project', ipl_renderBesluitpuntenMatrix(db));\n    }\n    if(v.type==='staafGestapeld' || v.type==='pivotTabel'){\n      var regels=ipl_metriekRegels(ipl_dashboardFilterContext(db));\n      if(v.type==='pivotTabel' && typeof ipl_dashFtePivot==='function'){\n        var oldE=IPL_DASH_EENHEID; IPL_DASH_EENHEID=v.eenheid||'fte';\n        var piv=ipl_dashFtePivot(regels);\n        var html=ipl_dashRenderPivot(piv,kleur,db.naam);\n        IPL_DASH_EENHEID=oldE;\n        return html;\n      }\n      if(v.type==='staafGestapeld'){\n        var cid='ipl-dbchart-'+db.id+'-'+vi;\n        setTimeout(function(){\n          var oldG=IPL_DASH_GRAN, oldE2=IPL_DASH_EENHEID;\n          IPL_DASH_GRAN=v.granulariteit||'maand'; IPL_DASH_EENHEID=v.eenheid||'fte';\n          var canvas=document.getElementById(cid);\n          if(canvas && typeof ipl_dashDrawFteChart==='function'){\n            var origGetById=document.getElementById.bind(document);\n            document.getElementById=function(id){ if(id==='ipl-dash-ftechart') return canvas; if(id==='ipl-dash-ftelegend') return origGetById('ipl-dbleg-'+db.id+'-'+vi)||{innerHTML:''}; return origGetById(id); };\n            ipl_dashDrawFteChart(regels,kleur);\n            document.getElementById=origGetById;\n          }\n          IPL_DASH_GRAN=oldG; IPL_DASH_EENHEID=oldE2;\n        },20);\n        return ipl_card('FTE-inzet over tijd — '+kpiNamen,\n          '<canvas id=\"'+cid+'\" style=\"display:block;width:100%;\"></canvas><div id=\"ipl-dbleg-'+db.id+'-'+vi+'\" style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:10px;\"></div>');\n      }\n    }\n    // fallback: eenvoudige kaart met de metriekwaarden + detail\n    var rows=(v.kpiRefs||[]).map(function(kn){\n      var kdef=db.kpis.filter(function(k){return k.naam===kn;})[0];\n      if(!kdef) return '';\n      var r=ipl_metriekBereken(kdef.metriek, ipl_dashboardFilterContext(db,kdef));\n      var detailTxt = r.detail ? ' — '+JSON.stringify(r.detail) : (r.reden?' — '+r.reden:'');\n      return '<div style=\"padding:6px 10px;font-size:12px;border-bottom:1px solid #eef0f5;\"><strong>'+kn+':</strong> '+(r.waarde===null?'geen data':r.waarde)+'<span style=\"color:#9aa3b5;font-size:10px;\">'+detailTxt+'</span></div>';\n    }).join('');\n    return ipl_card((v.type||'overzicht')+' — '+kpiNamen, rows||'<div style=\"padding:10px;color:#9aa3b5;font-size:11px;\">Geen KPI gekoppeld.</div>');\n  }).join('');\n\n  return kpiHtml+visHtml;\n}\n\n\n\n// ===== SCHERM 19/20 — DASHBOARDS OVERZICHT + EDITOR =====\n\n// ══════════════════════════════════════════════════════════\n// SCHERM 19 — DASHBOARDS OVERZICHT\n// SCHERM 20 — DASHBOARD BEWERKEN (KPI-builder + visualisatie-builder + preview)\n// ══════════════════════════════════════════════════════════\n\nfunction ipl_dashboardVerwijderBevestig(id){\n  var db=ipl_dashboardById(id);\n  var naam=db?db.naam:'dit dashboard';\n  if(confirm('Dashboard \"'+naam+'\" verwijderen? Dit kan niet ongedaan gemaakt worden.')){\n    ipl_dashboardVerwijder(id);\n    renderDashboardsOverzicht();\n  }\n}\n\nfunction renderDashboardsOverzicht(){\n  var el=document.getElementById('ipl-dbov-content'); if(!el) return;\n  if(typeof ipl_renderPortfolioTriggers==='function') ipl_renderPortfolioTriggers();\n  var html='<div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;\">'\n    +IPL_DIENSTEN.map(function(d){\n      return '<button onclick=\"ipl_dashboardNieuw(\\''+d+'\\');showScreen(\\'s20\\',document.querySelector(\\'#sidenav a[onclick*=s20]\\'))\" style=\"padding:8px 16px;border:1px solid '+(IPL_DIENST_KLEUR[d]||'#003082')+';background:#fff;color:'+(IPL_DIENST_KLEUR[d]||'#003082')+';border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;\">+ Nieuw '+d+'-dashboard</button>';\n    }).join('')+'</div>';\n\n  if(!IPL_DASHBOARDS.length){\n    html+='<div style=\"padding:40px;text-align:center;color:#6a7898;font-size:13px;background:#fff;border:1px dashed var(--border);border-radius:8px;\">Nog geen dashboards — maak er één met de knoppen hierboven.</div>';\n  } else {\n    html+='<div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;\">'\n      +IPL_DASHBOARDS.map(function(db){\n        var kleur=IPL_DIENST_KLEUR[db.dienst]||'#003082';\n        var val=ipl_dashboardValideer(db);\n        var statusBadge = db.status==='gepubliceerd'\n          ? '<span style=\"background:#e6f5ed;color:#1a8a4a;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;\">Gepubliceerd</span>'\n          : '<span style=\"background:#fff3cd;color:#7a5a00;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;\">Concept</span>';\n        return '<div style=\"background:#fff;border:1px solid var(--border);border-top:4px solid '+kleur+';border-radius:8px;padding:16px;\">'\n          +'<div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;\"><div style=\"font-size:14px;font-weight:700;color:#1a2236;\">'+db.naam+'</div>'+statusBadge+'</div>'\n          +'<div style=\"font-size:11px;color:#6a7898;margin-bottom:8px;min-height:30px;\">'+(db.omschrijving||'<em>Geen omschrijving</em>')+'</div>'\n          +'<div style=\"font-size:10px;color:#9aa3b5;margin-bottom:10px;\">'+db.dienst+' · '+db.filters.niveau+(db.filters.regio!=='ALLE'?' · '+db.filters.regio:'')+' · '+db.kpis.length+' KPI\\'s · '+db.visualisaties.length+' grafieken</div>'\n          +(val.fouten.length?'<div style=\"font-size:10px;color:#c0121f;margin-bottom:8px;\">⚠ '+val.fouten.length+' blokkerende fout(en)</div>':'')\n          +'<div style=\"display:flex;gap:6px;flex-wrap:wrap;\">'\n          +'<button onclick=\"IPL_DASHBOARD_EDIT_ID=\\''+db.id+'\\';showScreen(\\'s20\\',document.querySelector(\\'#sidenav a[onclick*=s20]\\'))\" style=\"padding:5px 12px;border:1px solid '+kleur+';background:'+kleur+';color:#fff;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">Openen</button>'\n          +'<button onclick=\"ipl_dashboardDupliceer(\\''+db.id+'\\');renderDashboardsOverzicht();\" style=\"padding:5px 12px;border:1px solid var(--border);background:#fff;border-radius:4px;font-size:11px;cursor:pointer;\">Dupliceren</button>'\n          +'<button onclick=\"ipl_dashboardVerwijderBevestig(\\''+db.id+'\\')\" style=\"padding:5px 12px;border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:4px;font-size:11px;cursor:pointer;\">Verwijderen</button>'\n          +'</div></div>';\n      }).join('')+'</div>';\n  }\n  el.innerHTML=html;\n}\n\nfunction ipl_dbedFilterChanged(veld,waarde){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  if(veld==='dienst') db.dienst=waarde; else db.filters[veld]=waarde;\n  ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedMetaChanged(veld,waarde){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  db[veld]=waarde; ipl_dashboardRaakt();\n}\nfunction ipl_dbedKpiAdd(){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  var beschikbaar=ipl_metriekenVoorDienst(db.dienst);\n  db.kpis.push({ naam:'Nieuwe KPI '+(db.kpis.length+1), metriek:beschikbaar[0]||'', aggregatie:'count',\n    filterContext:{}, drempels:{}, periode:'scenario' });\n  ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedKpiUpdate(i,veld,waarde){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  if(veld==='drempelGroen') db.kpis[i].drempels.groen=waarde===''?undefined:parseFloat(waarde);\n  else if(veld==='drempelOranje') db.kpis[i].drempels.oranje=waarde===''?undefined:parseFloat(waarde);\n  else if(veld==='drempelRood') db.kpis[i].drempels.rood=waarde===''?undefined:parseFloat(waarde);\n  else db.kpis[i][veld]=waarde;\n  ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedKpiDel(i){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  var naam=db.kpis[i].naam;\n  db.kpis.splice(i,1);\n  db.visualisaties.forEach(function(v){ v.kpiRefs=(v.kpiRefs||[]).filter(function(n){return n!==naam;}); });\n  ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedVisAdd(){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  db.visualisaties.push({ type:'kpiKaart', kpiRefs:db.kpis.length?[db.kpis[0].naam]:[], granulariteit:'maand', eenheid:'fte' });\n  ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedVisUpdate(i,veld,waarde){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  db.visualisaties[i][veld]=waarde; ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedVisToggleKpi(i,kpiNaam,aan){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  var v=db.visualisaties[i]; v.kpiRefs=v.kpiRefs||[];\n  if(aan){ if(v.kpiRefs.indexOf(kpiNaam)<0) v.kpiRefs.push(kpiNaam); }\n  else { v.kpiRefs=v.kpiRefs.filter(function(n){return n!==kpiNaam;}); }\n  ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedVisDel(i){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  db.visualisaties.splice(i,1); ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedPubliceer(){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  var val=ipl_dashboardValideer(db);\n  if(!val.publiceerbaar){ alert('Dit dashboard heeft nog blokkerende fouten en kan niet gepubliceerd worden. Zie het validatierapport.'); return; }\n  db.status='gepubliceerd'; ipl_dashboardRaakt(); renderDashboardEditor();\n}\nfunction ipl_dbedIntrekken(){\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID); if(!db) return;\n  db.status='concept'; ipl_dashboardRaakt(); renderDashboardEditor();\n}\n\nfunction renderDashboardEditor(){\n  var el=document.getElementById('ipl-dbed-content'); if(!el) return;\n  var db=ipl_dashboardById(IPL_DASHBOARD_EDIT_ID);\n  if(!db){ el.innerHTML='<div style=\"padding:40px;text-align:center;color:#6a7898;font-size:13px;\">Geen dashboard geselecteerd — ga naar <strong>Dashboards</strong> en open of maak er één.</div>'; return; }\n  var kleur=IPL_DIENST_KLEUR[db.dienst]||'#003082';\n  var val=ipl_dashboardValideer(db);\n  var vc=(typeof ipl_detecteerVCs==='function')?ipl_detecteerVCs():[];\n\n  // ── metadata + filters ──\n  var metaCard='<div style=\"background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px;\">'\n    +'<div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px;\">'\n    +'<div><label style=\"font-size:10px;color:#6a7898;\">Naam</label><input type=\"text\" value=\"'+db.naam.replace(/\"/g,'&quot;')+'\" onchange=\"ipl_dbedMetaChanged(\\'naam\\',this.value)\" style=\"width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;box-sizing:border-box;\"></div>'\n    +'<div><label style=\"font-size:10px;color:#6a7898;\">Dienst</label><select onchange=\"ipl_dbedFilterChanged(\\'dienst\\',this.value)\" style=\"width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;\">'+IPL_DIENSTEN.map(function(d){return '<option value=\"'+d+'\"'+(d===db.dienst?' selected':'')+'>'+d+'</option>';}).join('')+'</select></div>'\n    +'<div><label style=\"font-size:10px;color:#6a7898;\">Niveau</label><select onchange=\"ipl_dbedFilterChanged(\\'niveau\\',this.value)\" style=\"width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;\">'+['operationeel','tactisch','strategisch'].map(function(n){return '<option value=\"'+n+'\"'+(n===db.filters.niveau?' selected':'')+'>'+n+'</option>';}).join('')+'</select></div>'\n    +'<div><label style=\"font-size:10px;color:#6a7898;\">Eigenaar</label><input type=\"text\" value=\"'+(db.eigenaar||'').replace(/\"/g,'&quot;')+'\" placeholder=\"bv. Netwerkdiensten WVM\" onchange=\"ipl_dbedMetaChanged(\\'eigenaar\\',this.value)\" style=\"width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;box-sizing:border-box;\"></div>'\n    +'</div>'\n    +'<textarea placeholder=\"Omschrijving — waar dient dit dashboard voor?\" onchange=\"ipl_dbedMetaChanged(\\'omschrijving\\',this.value)\" style=\"width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;box-sizing:border-box;min-height:40px;\">'+(db.omschrijving||'')+'</textarea>'\n    +(db.dienst==='VWM' && vc.length ? '<div style=\"margin-top:10px;\"><label style=\"font-size:10px;color:#6a7898;\">Regio/VC-filter</label><select onchange=\"ipl_dbedFilterChanged(\\'regio\\',this.value)\" style=\"padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;\"><option value=\"ALLE\">Alle</option>'+vc.map(function(v){return '<option value=\"'+v.naam+'\"'+(v.naam===db.filters.regio?' selected':'')+'>'+v.naam+'</option>';}).join('')+'</select></div>' : '')\n    +'</div>';\n\n  // ── validatierapport ──\n  var valCard='';\n  if(val.fouten.length||val.waarschuwingen.length){\n    valCard='<div style=\"background:'+(val.fouten.length?'#fde8ea':'#fff8e6')+';border:1px solid '+(val.fouten.length?'#f0b0b8':'#f0d060')+';border-radius:8px;padding:12px 16px;margin-bottom:14px;\">'\n      +'<div style=\"font-size:12px;font-weight:700;color:'+(val.fouten.length?'#c0121f':'#7a5a00')+';margin-bottom:6px;\">Validatierapport</div>'\n      +val.fouten.map(function(f){return '<div style=\"font-size:11px;color:#7a1020;\">✗ '+f.tekst+'</div>';}).join('')\n      +val.waarschuwingen.map(function(f){return '<div style=\"font-size:11px;color:#7a5a00;\">⚠ '+f.tekst+'</div>';}).join('')\n      +'</div>';\n  } else {\n    valCard='<div style=\"background:#e6f5ed;border:1px solid #b0ddc0;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:11px;color:#1a8a4a;font-weight:700;\">✓ Geen problemen gevonden — klaar om te publiceren.</div>';\n  }\n\n  // ── KPI-builder ──\n  var beschikbaar=ipl_metriekenVoorDienst(db.dienst);\n  var kpiRows=db.kpis.map(function(k,i){\n    var r=ipl_metriekBereken(k.metriek, ipl_dashboardFilterContext(db,k));\n    var opts=beschikbaar.map(function(m){return '<option value=\"'+m+'\"'+(m===k.metriek?' selected':'')+'>'+(IPL_METRIEKEN[m]?IPL_METRIEKEN[m].label:m)+'</option>';}).join('');\n    return '<div style=\"border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;background:#fafbfd;\">'\n      +'<div style=\"display:grid;grid-template-columns:1.5fr 2fr auto auto auto auto;gap:8px;align-items:center;\">'\n      +'<input type=\"text\" value=\"'+k.naam.replace(/\"/g,'&quot;')+'\" onchange=\"ipl_dbedKpiUpdate('+i+',\\'naam\\',this.value)\" style=\"padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:700;\">'\n      +'<select onchange=\"ipl_dbedKpiUpdate('+i+',\\'metriek\\',this.value)\" style=\"padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;\">'+opts+'</select>'\n      +'<input type=\"number\" placeholder=\"groen\" value=\"'+(k.drempels.groen!==undefined?k.drempels.groen:'')+'\" onchange=\"ipl_dbedKpiUpdate('+i+',\\'drempelGroen\\',this.value)\" style=\"width:60px;padding:5px;border:1px solid #1a8a4a;border-radius:4px;font-size:10px;\">'\n      +'<input type=\"number\" placeholder=\"oranje\" value=\"'+(k.drempels.oranje!==undefined?k.drempels.oranje:'')+'\" onchange=\"ipl_dbedKpiUpdate('+i+',\\'drempelOranje\\',this.value)\" style=\"width:60px;padding:5px;border:1px solid #e06b00;border-radius:4px;font-size:10px;\">'\n      +'<input type=\"number\" placeholder=\"rood\" value=\"'+(k.drempels.rood!==undefined?k.drempels.rood:'')+'\" onchange=\"ipl_dbedKpiUpdate('+i+',\\'drempelRood\\',this.value)\" style=\"width:60px;padding:5px;border:1px solid #c0121f;border-radius:4px;font-size:10px;\">'\n      +'<button onclick=\"ipl_dbedKpiDel('+i+')\" style=\"border:none;background:#fde8ea;color:#c0121f;border-radius:4px;width:26px;height:26px;cursor:pointer;\">×</button>'\n      +'</div>'\n      +'<div style=\"margin-top:6px;font-size:11px;color:#3a4658;\">Live waarde: <strong style=\"color:'+kleur+';\">'+(r.waarde===null?'geen data':r.waarde)+'</strong>'+(r.reden?' <span style=\"color:#c05000;\">— '+r.reden+'</span>':'')+'</div>'\n      +'</div>';\n  }).join('');\n  var kpiCard='<div style=\"background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+kleur+';margin-bottom:4px;\">KPI\\'s</div>'\n    +'<div style=\"font-size:11px;color:#6a7898;margin-bottom:10px;\">Beschikbare metrieken zijn beperkt tot wat zinvol is voor dienst '+db.dienst+' (zie ontwerpdocument §1a). Live waarde toont het resultaat direct uit de geladen planning.</div>'\n    +kpiRows\n    +'<button onclick=\"ipl_dbedKpiAdd()\" style=\"border:1px dashed var(--border);background:#f4f6fb;color:#003082;border-radius:4px;padding:6px 14px;cursor:pointer;font-size:11px;font-weight:600;\">+ KPI toevoegen</button></div>';\n\n  // ── visualisatie-builder ──\n  var visRows=db.visualisaties.map(function(v,i){\n    var typeOpts=['kpiKaart','staafGestapeld','pivotTabel','projectStatusTabel','besluitpuntenMatrix'].map(function(t){return '<option value=\"'+t+'\"'+(t===v.type?' selected':'')+'>'+t+'</option>';}).join('');\n    var kpiChecks=db.kpis.map(function(k){\n      var aan=(v.kpiRefs||[]).indexOf(k.naam)>=0;\n      return '<label style=\"display:flex;align-items:center;gap:4px;font-size:10px;margin-right:10px;\"><input type=\"checkbox\"'+(aan?' checked':'')+' onchange=\"ipl_dbedVisToggleKpi('+i+',\\''+k.naam.replace(/'/g,\"\\\\'\")+'\\',this.checked)\"> '+k.naam+'</label>';\n    }).join('');\n    return '<div style=\"border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;background:#fafbfd;\">'\n      +'<div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px;\">'\n      +'<select onchange=\"ipl_dbedVisUpdate('+i+',\\'type\\',this.value)\" style=\"padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;\">'+typeOpts+'</select>'\n      +(v.type==='staafGestapeld'?('<select onchange=\"ipl_dbedVisUpdate('+i+',\\'granulariteit\\',this.value)\" style=\"padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;\"><option value=\"maand\"'+(v.granulariteit==='maand'?' selected':'')+'>Maand</option><option value=\"kwartaal\"'+(v.granulariteit==='kwartaal'?' selected':'')+'>Kwartaal</option></select>'):'')\n      +((v.type==='staafGestapeld'||v.type==='pivotTabel')?('<select onchange=\"ipl_dbedVisUpdate('+i+',\\'eenheid\\',this.value)\" style=\"padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;\"><option value=\"fte\"'+(v.eenheid==='fte'?' selected':'')+'>FTE</option><option value=\"uren\"'+(v.eenheid==='uren'?' selected':'')+'>Uren</option></select>'):'')\n      +'<button onclick=\"ipl_dbedVisDel('+i+')\" style=\"margin-left:auto;border:none;background:#fde8ea;color:#c0121f;border-radius:4px;width:26px;height:26px;cursor:pointer;\">×</button>'\n      +'</div><div style=\"display:flex;flex-wrap:wrap;\">'+((v.type==='projectStatusTabel'||v.type==='besluitpuntenMatrix')?'<span style=\"font-size:10px;color:#9aa3b5;\">Werkt direct op de projecten binnen dit dashboard — geen KPI-koppeling nodig.</span>':(kpiChecks||'<span style=\"font-size:10px;color:#9aa3b5;\">Geen KPI\\'s beschikbaar — voeg er eerst één toe.</span>'))+'</div></div>';\n  }).join('');\n  var visCard='<div style=\"background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+kleur+';margin-bottom:10px;\">Grafieken &amp; tabellen</div>'\n    +visRows\n    +'<button onclick=\"ipl_dbedVisAdd()\" style=\"border:1px dashed var(--border);background:#f4f6fb;color:#003082;border-radius:4px;padding:6px 14px;cursor:pointer;font-size:11px;font-weight:600;\">+ grafiek/tabel toevoegen</button></div>';\n\n  // ── publicatie ──\n  var pubCard='<div style=\"background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;\">'\n    +'<div style=\"font-size:12px;color:#6a7898;\">Status: <strong style=\"color:'+(db.status==='gepubliceerd'?'#1a8a4a':'#7a5a00')+';\">'+db.status+'</strong></div>'\n    +(db.status==='gepubliceerd'\n      ? '<button onclick=\"ipl_dbedIntrekken()\" style=\"padding:8px 18px;border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;\">Intrekken</button>'\n      : '<button onclick=\"ipl_dbedPubliceer()\" style=\"padding:8px 18px;background:'+(val.publiceerbaar?kleur:'#c7ccd6')+';color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:'+(val.publiceerbaar?'pointer':'not-allowed')+';\" '+(val.publiceerbaar?'':'disabled')+'>Publiceren</button>')\n    +'</div>';\n\n  // ── live preview ──\n  var previewCard='<div style=\"background:#f4f6fb;border:2px solid '+kleur+';border-radius:8px;padding:16px 18px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+kleur+';margin-bottom:10px;\">Live preview</div>'\n    +ipl_dashboardRenderPreview(db)\n    +'</div>';\n\n  el.innerHTML=metaCard+valCard+kpiCard+visCard+pubCard+previewCard;\n  setTimeout(function(){ if(typeof ipl_drawAllSparklines==='function') ipl_drawAllSparklines(el); },20);\n}\n\n\n\n// ===== KPI-NARRATIEF (risico & gevolg toelichting) =====\n\n// ══════════════════════════════════════════════════════════\n// KPI-NARRATIEF — risico- en gevolgentoelichting per KPI, opgebouwd\n// volgens dezelfde werkwijze als de bedrijfswaarden-tool: ernst-\n// classificatie → tekstbouwstenen per (metriek × ernst) →\n// deterministische maar gevarieerde selectie (hash) → sjabloon-\n// invulling → samengestelde memo (aanleiding · gevolg · advies).\n// ══════════════════════════════════════════════════════════\n\n// deterministische, gevarieerde tekstkeuze — zelfde principe als kiesTekst()\nfunction ipl_kiesTekst(opties, sleutel){\n  if(!Array.isArray(opties) || !opties.length) return '';\n  var h=0; sleutel=String(sleutel||'');\n  for(var i=0;i<sleutel.length;i++) h=(h*31+sleutel.charCodeAt(i))>>>0;\n  return opties[h%opties.length];\n}\n// sjabloon-invulling {veld} -> waarde\nfunction ipl_vul(tmpl, vars){\n  return (tmpl||'').replace(/\\{(\\w+)\\}/g, function(_,k){ return (vars[k]!==undefined&&vars[k]!==null&&vars[k]!=='') ? vars[k] : '['+k+']'; });\n}\n\n// ── ernst-classificatie van een KPI-resultaat ──\n// Volgorde: (1) door de gebruiker ingestelde drempels op de KPI zelf,\n// (2) risico-/verschoven-fractie uit het detail-object van de metriek,\n// (3) eenvoudige aan/uit op basis van de waarde.\nfunction ipl_kpiErnst(k,r){\n  if(r.waarde===null) return 'onbekend';\n  if(k && k.drempels && (k.drempels.groen!==undefined||k.drempels.oranje!==undefined||k.drempels.rood!==undefined)){\n    if(k.drempels.rood!==undefined && r.waarde>=k.drempels.rood) return 'kritiek';\n    if(k.drempels.oranje!==undefined && r.waarde>=k.drempels.oranje) return 'hoog';\n    if(k.drempels.groen!==undefined && r.waarde>=k.drempels.groen) return 'midden';\n    return 'laag';\n  }\n  if(r.detail){\n    if(r.detail.risico!==undefined){\n      var tot=(r.detail.gereed||0)+(r.detail.risico||0); var frac=tot?r.detail.risico/tot:0;\n      if(frac>=0.5) return 'kritiek'; if(frac>0.2) return 'hoog'; if(frac>0) return 'midden'; return 'laag';\n    }\n    if(r.detail.verschoven!==undefined){\n      var tot2=(r.detail.opSchema||0)+(r.detail.verschoven||0); var frac2=tot2?r.detail.verschoven/tot2:0;\n      if(frac2>=0.5) return 'kritiek'; if(frac2>0.2) return 'hoog'; if(frac2>0) return 'midden'; return 'laag';\n    }\n  }\n  return r.waarde>0 ? 'midden' : 'laag';\n}\n\n// ── tekstbouwstenen per metriek: aanleiding (algemeen), gevolg (per ernst), advies (per ernst) ──\nvar IPL_RISICO_BOUWSTENEN = {\n\n  aantalTaken: {\n    aanleiding: ['Dit aantal telt alle taken binnen de gekozen selectie op {niveau}-niveau.'],\n    gevolg: { laag:['Puur informatief — geen risico-inschatting van toepassing op een aantal.'], midden:['Puur informatief — geen risico-inschatting van toepassing op een aantal.'], hoog:['Puur informatief — geen risico-inschatting van toepassing op een aantal.'], kritiek:['Puur informatief — geen risico-inschatting van toepassing op een aantal.'] },\n    advies: {} },\n  aantalMijlpalen: {\n    aanleiding: ['Dit aantal telt alle mijlpalen binnen de selectie.'],\n    gevolg: { laag:['Puur informatief.'], midden:['Puur informatief.'], hoog:['Puur informatief.'], kritiek:['Puur informatief.'] },\n    advies: {} },\n  aantalVerschoven: {\n    aanleiding: [\n      'Deze taken zijn geraakt door de huidige scenario-verschuiving die in de planning is toegepast.',\n      'De weergegeven activiteiten wijken af van hun oorspronkelijke datum door een verschuiving in het scenario.',\n    ],\n    gevolg: {\n      laag:['Een klein deel van de taken is geraakt — de verschuiving heeft naar verwachting weinig doorwerking op de rest van de keten.'],\n      midden:['Een substantieel deel van de taken is geraakt. Controleer of de doorwerking naar afhankelijke taken en diensten aanvaardbaar is.'],\n      hoog:['Het merendeel van de taken in deze selectie is geraakt. De kans op doorwerking naar andere diensten en mijlpalen is groot.',\n            'Een groot deel van de activiteiten schuift mee — dit wijst op een structurele verschuiving in plaats van een geïsoleerde vertraging.'],\n      kritiek:['Vrijwel alle taken in deze selectie zijn geraakt. Dit duidt op een fundamentele verschuiving van het hele werkpakket, met waarschijnlijke gevolgen voor mijlpalen en andere diensten.'],\n    },\n    advies: {\n      hoog:['Beoordeel per project of de verschuiving wordt geaccepteerd, en breng de gevolgen voor gekoppelde diensten in kaart via de dashboards van GPO/CIV/VWM.'],\n      kritiek:['Escaleer naar de proceseigenaar: bij een verschuiving van deze omvang is bestuurlijke afstemming over de nieuwe planning en de financiële gevolgen (desinvestering, meerkosten) op zijn plaats.'],\n    } },\n  aantalCrossDienst: {\n    aanleiding: [\n      'Deze afhankelijkheden lopen over dienstgrenzen heen — de ene dienst is voor zijn planning afhankelijk van de andere.',\n      'Cross-dienst afhankelijkheden ontstaan waar het werk van de ene dienst een voorwaarde is voor het werk van een andere.',\n    ],\n    gevolg: {\n      laag:['Weinig cross-dienst koppelingen in deze selectie — verschuivingen blijven grotendeels binnen de eigen dienst.'],\n      midden:['Een aantal taken heeft een directe afhankelijkheid naar een andere dienst. Een verschuiving hier kan bij die andere dienst doorwerken.'],\n      hoog:['Veel taken zijn afhankelijk van een andere dienst. Coördinatie tussen diensten is nodig om verschuivingen op elkaar af te stemmen.'],\n      kritiek:['Het aantal cross-dienst afhankelijkheden is zeer hoog — een verschuiving in deze selectie werkt vrijwel zeker door naar meerdere andere diensten.'],\n    },\n    advies: {\n      hoog:['Stem verschuivingen in deze selectie vooraf af met de gekoppelde diensten, in plaats van achteraf te herstellen.'],\n      kritiek:['Behandel dit als een integrale planningswijziging, niet als een lokale aanpassing — betrek alle geraakte diensten voordat de verschuiving wordt vastgesteld.'],\n    } },\n\n  // ── GPO ──\n  mijlpaalStatusOpenstelling: {\n    aanleiding: [\n      'Openstellingsmijlpalen markeren het moment waarop een tunnel of project daadwerkelijk in gebruik wordt genomen.',\n      'Deze mijlpalen zijn de bestuurlijk en publicitair meest zichtbare data in de planning: de openstelling van een tunnel of weg.',\n    ],\n    gevolg: {\n      laag:['De openstellingen in deze selectie liggen op schema.'],\n      midden:['Een deel van de openstellingen is verschoven. Dit is nog beperkt, maar verdient aandacht bij de eerstvolgende voortgangsrapportage.'],\n      hoog:['Meerdere openstellingen zijn verschoven. Dit heeft naar verwachting gevolgen voor de bestuurlijke planning en mogelijk voor externe communicatie richting weggebruikers en omgeving.'],\n      kritiek:['Het merendeel van de openstellingen in deze selectie is verschoven. Dit is een situatie die om bestuurlijke besluitvorming vraagt, niet om een operationele bijstelling.'],\n    },\n    advies: {\n      hoog:['Informeer de portfoliomanager en bereid een toelichting voor op de gevolgen voor de bestuurlijke planning.'],\n      kritiek:['Escaleer naar de proceseigenaar GPO en stem de externe communicatie af — een verschoven openstelling raakt naar verwachting media- en omgevingsbelangen.'],\n    } },\n  aantalProjectenRisicoOpenstelling: {\n    aanleiding: ['Dit telt het aantal projecten waarvan de openstellingsmijlpaal door de huidige verschuiving is geraakt.'],\n    gevolg: {\n      laag:['Geen of nauwelijks projecten met risico op de openstellingsdatum.'],\n      midden:['Enkele projecten hebben risico op een verschoven openstelling. Volg deze projecten actief in de eerstvolgende periode.'],\n      hoog:['Meerdere projecten tegelijk hebben risico op een verschoven openstelling — dit vergroot de kans op gestapelde bestuurlijke en publicitaire aandacht.'],\n      kritiek:['Een groot aantal projecten heeft tegelijk risico op de openstellingsdatum. Dit wijst op een structureel probleem in de planning, niet op incidentele vertraging.'],\n    },\n    advies: {\n      midden:['Prioriteer deze projecten in de eerstvolgende portfolio-afstemming.'],\n      hoog:['Breng per project de kritieke keten naar de openstelling in kaart en bepaal welke maatregelen de vertraging kunnen beperken.'],\n      kritiek:['Agendeer dit voor bestuurlijk overleg — de gestapelde risico\\'s overstijgen het niveau van individuele projectsturing.'],\n    } },\n\n  // ── CIV ──\n  bouwblokGereedheid: {\n    aanleiding: [\n      'CIV levert bouwblokken die vóór het afnamemoment van het GPO-project (doorgaans de ISTSI-fase) gereed moeten zijn.',\n      'De gereedheid van een bouwblok is een keten-afhankelijkheid: het project kan pas verder als CIV op tijd oplevert.',\n    ],\n    gevolg: {\n      laag:['De bouwblokken in deze selectie zijn op tijd gereed voor hun afnamemoment.'],\n      midden:['Een deel van de bouwblokken loopt risico om niet op tijd gereed te zijn. Dit is nog te herstellen met gerichte sturing.'],\n      hoog:['Een substantieel deel van de bouwblokken dreigt niet op tijd gereed te zijn. Dit kan de betreffende projecten dwingen hun afnamefase te starten zonder werkend bouwblok.'],\n      kritiek:['Het merendeel van de bouwblokken is niet op tijd gereed. Projecten die hierop wachten kunnen hun kritieke fase niet volgens planning starten.'],\n    },\n    advies: {\n      hoog:['Overleg tussen CIV en de betrokken GPO-projecten over herprioritering van de uitrolcapaciteit.'],\n      kritiek:['Escaleer naar de portfoliomanagers van CIV én GPO — zonder ingrijpen loopt de openstelling van de afhankelijke projecten direct risico.'],\n    } },\n  piekFte: {\n    aanleiding: [\n      'Deze piek is de hoogste gelijktijdige FTE-vraag over de scenario-looptijd, berekend uit de FTE-toewijzing per taak.',\n      'De piekwaarde ontstaat op het moment waarop de meeste taken in deze selectie tegelijk lopen.',\n    ],\n    gevolg: {\n      laag:['De piekbelasting past ruim binnen de beschikbare capaciteit.'],\n      midden:['De piekbelasting nadert de grens van wat het team kan dragen. Bij verdere verschuivingen kan dit een knelpunt worden.'],\n      hoog:['De piekbelasting overschrijdt naar verwachting de beschikbare capaciteit. Meerdere taken of projecten vragen tegelijk om hetzelfde team.'],\n      kritiek:['De piekbelasting is aanzienlijk hoger dan realistisch haalbaar is met de beschikbare formatie. Dit is een structureel capaciteitsconflict, geen tijdelijke drukte.'],\n    },\n    advies: {\n      hoog:['Overweeg de taken die tot de piek bijdragen in de tijd te spreiden, of vraag tijdelijke capaciteit aan.'],\n      kritiek:['Herzie de FTE-toewijzing en de planning gezamenlijk — een piek van deze omvang is niet op te lossen met kleine bijsturing.'],\n    } },\n  uitrolStatusPerVC: {\n    aanleiding: ['Dit toont hoe de uitroltaken verdeeld zijn over de verkeerscentrales — een indicatie van waar de uitvoeringsdruk ligt.'],\n    gevolg: { laag:['Puur informatief — geen escalatie van toepassing op een verdeling.'], midden:['Puur informatief — geen escalatie van toepassing op een verdeling.'], hoog:['Puur informatief — geen escalatie van toepassing op een verdeling.'], kritiek:['Puur informatief — geen escalatie van toepassing op een verdeling.'] },\n    advies: {} },\n\n  // ── VWM ──\n  cumulatieveInzet: {\n    aanleiding: [\n      'Dit getal is de opgetelde FTE-inzet over alle taken en de hele scenario-looptijd (FTE-maanden).',\n      'De cumulatieve inzet geeft een totaalbeeld van de personele belasting die deze selectie vraagt.',\n    ],\n    gevolg: {\n      laag:['De inzet is beperkt — geen bijzondere aandacht nodig.'],\n      midden:['De inzet is aanzienlijk. Controleer of dit aansluit bij de verwachte formatie voor deze periode.'],\n      hoog:['De inzet is hoog ten opzichte van vergelijkbare selecties. Dit kan wijzen op een onderschatting van de FTE per taak, of op een daadwerkelijk zware periode.'],\n      kritiek:['De inzet is zeer hoog. Valideer of de onderliggende FTE-aannames realistisch zijn voordat hierop gestuurd wordt.'],\n    },\n    advies: {\n      hoog:['Vergelijk de FTE-aannames per taak met de daadwerkelijke teamgrootte via het Project &amp; budget-scherm.'],\n      kritiek:['Laat de FTE-configuratie van de onderliggende taken controleren — een uitschieter van deze omvang is vaak een configuratiefout in plaats van een echte piek.'],\n    } },\n  opleidingGereedheidVoorOpenstelling: {\n    aanleiding: [\n      'Opleiding van VC-personeel moet gereed zijn vóórdat een tunnel of weg wordt opengesteld — dit is een directe voorwaarde voor veilige bediening.',\n      'De relatie tussen opleidingstaken en de openstellingsmijlpaal bepaalt of er op tijd voldoende opgeleid personeel beschikbaar is.',\n    ],\n    gevolg: {\n      laag:['De opleiding is op schema ten opzichte van de openstelling.'],\n      midden:['Een deel van de opleidingstrajecten loopt risico om niet op tijd gereed te zijn.'],\n      hoog:['Een substantieel deel van de opleiding dreigt niet gereed te zijn vóór openstelling. Dit is een operationeel én veiligheidsrisico: bediening zonder voldoende opgeleid personeel.'],\n      kritiek:['Het merendeel van de opleiding is niet op tijd gereed. Openstelling zonder aanvullende maatregelen brengt de bedienbaarheid van de verkeerscentrale in gevaar.'],\n    },\n    advies: {\n      hoog:['Vervroeg de start van de opleiding, of heroverweeg de openstellingsdatum in overleg met GPO.'],\n      kritiek:['Escaleer naar de proceseigenaar VWM: openstelling zonder opgeleid personeel is niet acceptabel vanuit veiligheidsoogpunt.'],\n    } },\n  lcmConflictRisico: {\n    aanleiding: [\n      'LCM-vervangingen volgen een eigen ritme. Een project dat afwijkt van dat ritme kan een geplande LCM-investering doorkruisen.',\n      'Deze taken zijn gekoppeld aan het Life Cycle Management-programma, dat conflicteert zodra een project eerder of anders levert dan gepland.',\n    ],\n    gevolg: {\n      laag:['Geen of nauwelijks LCM-taken geraakt door de huidige verschuiving.'],\n      midden:['Enkele LCM-taken zijn geraakt. Dit kan wijzen op een beginnend planningsconflict met het vervangingsprogramma.'],\n      hoog:['Meerdere LCM-taken zijn geraakt. Dit vergroot de kans op desinvestering: een geplande vervanging die niet (volledig) benut kan worden.'],\n      kritiek:['Een groot deel van de LCM-taken is geraakt. Dit wijst op een structureel conflict tussen de projectplanning en het vervangingsprogramma, met een reële kans op desinvestering.'],\n    },\n    advies: {\n      hoog:['Beoordeel conform de VWM-1004-systematiek of dit een afwijking van de baseline is en wie de meerkosten draagt.'],\n      kritiek:['Agendeer dit voor gezamenlijke beoordeling door VWM en CIV — bij een conflict van deze omvang moet expliciet worden vastgesteld of de afwijking wordt geaccepteerd en wie de desinvestering draagt.'],\n    } },\n\n  // ── PPO / Regio zonder databron ──\n  contractstatus: { aanleiding:['Er is geen contractdata in deze Primavera-export beschikbaar.'], gevolg:{onbekend:['Geen risico-inschatting mogelijk zonder brondata.']}, advies:{} },\n  inBeheernameGereedheid: { aanleiding:['Er zijn geen in-beheername-gegevens in deze Primavera-export beschikbaar.'], gevolg:{onbekend:['Geen risico-inschatting mogelijk zonder brondata.']}, advies:{} },\n  portfolioBudgetRestant: { aanleiding:['Er zijn geen portfolio-brede budgetgegevens gekoppeld aan deze planning.'], gevolg:{onbekend:['Geen risico-inschatting mogelijk zonder brondata.']}, advies:{} },\n  aantalProjectenPerRegio: { aanleiding:['Regio-indeling is alleen beschikbaar via een gekozen ActivityCode-schema met daadwerkelijke toewijzingen.'], gevolg:{onbekend:['Geen risico-inschatting mogelijk zonder regio-toewijzingen in de brondata.']}, advies:{} },\n  gebiedsRisicoOpstapeling: { aanleiding:['Regio-indeling is alleen beschikbaar via een gekozen ActivityCode-schema met daadwerkelijke toewijzingen.'], gevolg:{onbekend:['Geen risico-inschatting mogelijk zonder regio-toewijzingen in de brondata.']}, advies:{} },\n  faseVoortgang: { aanleiding:['Fase-indeling is alleen beschikbaar via ActivityCode-toewijzingen in Primavera.'], gevolg:{onbekend:['Geen risico-inschatting mogelijk zonder fase-toewijzingen in de brondata.']}, advies:{} },\n};\n\nvar IPL_ERNST_LABEL = {laag:'Laag',midden:'Middel',hoog:'Hoog',kritiek:'Kritiek',onbekend:'Onbekend'};\nvar IPL_ERNST_KLEUR = {laag:'#1a8a4a',midden:'#e0a000',hoog:'#e06b00',kritiek:'#c0121f',onbekend:'#9aa3b5'};\n\n// ── bouwt het narratief (aanleiding · gevolg · advies) voor één KPI-resultaat ──\nfunction ipl_kpiNarratief(db,k,r){\n  var bouwstenen=IPL_RISICO_BOUWSTENEN[k.metriek];\n  if(!bouwstenen) return '';\n  var ernst=ipl_kpiErnst(k,r);\n  var vars={ niveau:(db.filters&&db.filters.niveau)||'', dienst:db.dienst, regio:(db.filters&&db.filters.regio!=='ALLE')?db.filters.regio:'', waarde:r.waarde };\n  var sleutel=db.dienst+'|'+k.metriek+'|'+ernst+'|'+(r.waarde!==null?r.waarde:'x');\n\n  var aanleiding=ipl_vul(ipl_kiesTekst(bouwstenen.aanleiding,sleutel+'|a'), vars);\n  var gevolgPool=bouwstenen.gevolg[ernst]||bouwstenen.gevolg['midden']||[];\n  var gevolg=ipl_vul(ipl_kiesTekst(gevolgPool,sleutel+'|g'), vars);\n  var adviesPool=bouwstenen.advies[ernst];\n  var advies=adviesPool&&adviesPool.length ? ipl_vul(ipl_kiesTekst(adviesPool,sleutel+'|d'), vars) : '';\n\n  var kleur=IPL_ERNST_KLEUR[ernst];\n  var html='<div style=\"background:#fafbfd;border:1px solid #e0e4ec;border-left:3px solid '+kleur+';border-radius:6px;padding:10px 14px;margin-bottom:12px;\">'\n    +'<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\"><span style=\"background:'+kleur+';color:#fff;border-radius:3px;padding:1px 8px;font-size:9px;font-weight:800;text-transform:uppercase;\">'+IPL_ERNST_LABEL[ernst]+'</span><span style=\"font-size:11px;font-weight:700;color:#1a2236;\">Toelichting</span></div>'\n    +(aanleiding?'<div style=\"font-size:11px;color:#3a4658;margin-bottom:4px;\">'+aanleiding+'</div>':'')\n    +(gevolg?'<div style=\"font-size:11px;color:#3a4658;margin-bottom:'+(advies?'4px':'0')+';\"><strong>Gevolg: </strong>'+gevolg+'</div>':'')\n    +(advies?'<div style=\"font-size:11px;color:'+kleur+';font-weight:600;\"><strong>Advies: </strong>'+advies+'</div>':'')\n    +'</div>';\n  return html;\n}\n\n\n\n// ===== RIJKE CONFLICT- EN GEVOLGEN-PANELEN =====\n\n// ══════════════════════════════════════════════════════════\n// CONFLICT-DETECTIE & RIJKE GEVOLGEN-PANELEN — zelfde stijl als de\n// vroege \"Zonder integraal\"-demo (kaarten met icoon/kleur/wat/impact/\n// dienst-badges/timing), nu gevoed door de echte geïmporteerde planning\n// in plaats van het fictieve A27-scenario.\n// ══════════════════════════════════════════════════════════\n\nvar IPL_CONFLICT_TEKST = {\n  openstelling: {\n    wat: [\n      'De openstellingsmijlpaal \"{naamB}\" schuift mee doordat de voorliggende keten is vertraagd.',\n      'Doordat \"{naamA}\" is verschoven, verschuift de openstelling \"{naamB}\" evenredig mee.',\n    ],\n    impact: [\n      'Dit raakt de bestuurlijke planning en mogelijk de externe communicatie richting weggebruikers en omgeving.',\n      'Een verschoven openstelling is doorgaans zichtbaar voor bestuur en pers — verdient tijdige signalering.',\n    ],\n  },\n  crossMijlpaal: {\n    wat: [\n      'De mijlpaal \"{naamB}\" bij {dienstB} schuift mee door een afhankelijkheid vanuit {dienstA}.',\n      'Een verschuiving bij {dienstA} werkt via een directe relatie door naar de mijlpaal \"{naamB}\" bij {dienstB}.',\n    ],\n    impact: [\n      'Dit is een cross-dienst afhankelijkheid — {dienstB} moet de nieuwe datum expliciet accorderen.',\n      'Zonder afstemming tussen {dienstA} en {dienstB} loopt deze mijlpaal risico op een dubbele vertraging.',\n    ],\n  },\n  crossTaak: {\n    wat: [\n      'De taak \"{naamB}\" bij {dienstB} schuift mee door een afhankelijkheid vanuit {dienstA}.',\n      '\"{naamA}\" ({dienstA}) duwt via een directe relatie de taak \"{naamB}\" bij {dienstB} door.',\n    ],\n    impact: [\n      'Cross-dienst doorwerking — controleer of {dienstB} deze verschuiving kan opvangen binnen de eigen planning.',\n      'Dit verdient afstemming tussen {dienstA} en {dienstB} voordat de verschuiving als definitief geldt.',\n    ],\n  },\n  lokaleMijlpaal: {\n    wat: ['De mijlpaal \"{naamB}\" is verschoven binnen dienst {dienstA}.'],\n    impact: ['Beperkte doorwerking buiten de eigen dienst, maar wel een wijziging in het mijlpalenoverzicht.'],\n  },\n};\n\nfunction ipl_uniek(arr){ var seen={}, out=[]; arr.forEach(function(x){ if(!seen[x]){seen[x]=1;out.push(x);} }); return out; }\n\n// ── detecteert conflicten uit de huidige cascade: relaties waarvan de\n// voorganger verschoven is, met nadruk op mijlpalen en cross-dienst ──\nfunction ipl_detecteerConflicten(){\n  if(!IPL_MODEL) return [];\n  var conflicten=[]; var gezienMijlpaal={};\n  IPL_MODEL.relaties.forEach(function(rel){\n    var a=ipl_regelById(rel.from), b=ipl_regelById(rel.to);\n    if(!a||!b) return;\n    var shA=IPL_CASCADE[a.id]||0;\n    if(Math.abs(shA)<0.001) return;\n    var dienstA=ipl_regelDienst(a), dienstB=ipl_regelDienst(b);\n    var crossDienst=dienstA!==dienstB;\n    var mijlpaalGeraakt=b.kind==='mile';\n    var openstelling=mijlpaalGeraakt && IPL_OPENSTELLING_RE.test(b.naam);\n    var kleur = openstelling ? 'rood' : ((mijlpaalGeraakt&&crossDienst) ? 'rood' : (crossDienst||mijlpaalGeraakt ? 'oranje' : null));\n    if(!kleur) return;\n    var type = openstelling?'openstelling':(mijlpaalGeraakt?'crossMijlpaal':'crossTaak');\n    var vars={naamA:a.naam,naamB:b.naam,dienstA:dienstA,dienstB:dienstB};\n    var pool=IPL_CONFLICT_TEKST[type];\n    var sleutel=a.id+'|'+b.id+'|'+type;\n    var ea=ipl_eff(a), eb=ipl_eff(b);\n    conflicten.push({\n      id:rel.from+'>'+rel.to, naam:a.naam+' → '+b.naam,\n      wat:ipl_vul(ipl_kiesTekst(pool.wat,sleutel+'w'),vars),\n      impact:ipl_vul(ipl_kiesTekst(pool.impact,sleutel+'i'),vars),\n      kleur:kleur, diensten:ipl_uniek([dienstA,dienstB]),\n      vanMoment:eb.t0-(IPL_CASCADE[b.id]||0), naarMoment:eb.t0, deltaM:Math.round((IPL_CASCADE[b.id]||0)*12),\n      project:ipl_regelProjectNaam(b)||ipl_regelProjectNaam(a), mijlpaal:mijlpaalGeraakt, openstelling:openstelling,\n    });\n    if(mijlpaalGeraakt) gezienMijlpaal[b.id]=1;\n  });\n  IPL_MODEL.regels.forEach(function(r){\n    if(r.kind!=='mile') return;\n    var sh=IPL_CASCADE[r.id]||0;\n    if(Math.abs(sh)<0.001 || gezienMijlpaal[r.id]) return;\n    var openstelling=IPL_OPENSTELLING_RE.test(r.naam);\n    var pool=IPL_CONFLICT_TEKST[openstelling?'openstelling':'lokaleMijlpaal'];\n    var vars={naamA:r.naam,naamB:r.naam,dienstA:ipl_regelDienst(r),dienstB:ipl_regelDienst(r)};\n    var sleutel='mijlpaal-'+r.id;\n    conflicten.push({\n      id:sleutel, naam:r.naam,\n      wat:ipl_vul(ipl_kiesTekst(pool.wat,sleutel+'w'),vars),\n      impact:ipl_vul(ipl_kiesTekst(pool.impact,sleutel+'i'),vars),\n      kleur:openstelling?'rood':'oranje', diensten:[ipl_regelDienst(r)],\n      vanMoment:r.t0, naarMoment:ipl_eff(r).t0, deltaM:Math.round(sh*12),\n      project:ipl_regelProjectNaam(r), mijlpaal:true, openstelling:openstelling,\n    });\n  });\n  conflicten.sort(function(x,y){ if(x.kleur!==y.kleur) return x.kleur==='rood'?-1:1; return Math.abs(y.deltaM)-Math.abs(x.deltaM); });\n  return conflicten;\n}\n\nfunction ipl_conflictKaart(cf){\n  var bc=cf.kleur==='rood'?'#c0121f':'#e06b00';\n  var bg=cf.kleur==='rood'?'#fde8ea':'#fff0e0';\n  var icon=cf.kleur==='rood'?'🔴':'🟠';\n  var badges=cf.diensten.map(function(d){ return '<span style=\"background:#e8f0fb;border:1px solid #c0d0ec;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;color:#003082;\">'+d+'</span>'; }).join(' ');\n  return '<div style=\"background:'+bg+';border:1px solid '+bc+';border-left:4px solid '+bc+';border-radius:4px;padding:10px 12px;margin-bottom:6px;\">'\n    +'<div style=\"font-size:12px;font-weight:700;color:'+bc+';margin-bottom:4px;\">'+icon+' '+cf.naam+(cf.openstelling?' <span style=\"font-size:9px;background:'+bc+';color:#fff;border-radius:3px;padding:1px 6px;margin-left:4px;\">OPENSTELLING</span>':'')+'</div>'\n    +'<div style=\"font-size:11px;color:#4a5568;margin-bottom:4px;\">'+cf.wat+'</div>'\n    +'<div style=\"font-size:11px;color:'+bc+';margin-bottom:6px;\"><strong>Gevolg: </strong>'+cf.impact+'</div>'\n    +'<div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;\">'+badges\n    +'<span style=\"margin-left:auto;font-size:10px;color:#6a7898;\">'+cf.project+'</span></div>'\n    +'<div style=\"display:flex;gap:12px;font-size:10px;flex-wrap:wrap;padding-top:5px;border-top:1px solid rgba(0,0,0,0.08);\">'\n    +'<span>Was: <strong>'+ipl_fToDate(cf.vanMoment)+'</strong></span>'\n    +'<span>Nu: <strong style=\"color:'+bc+';\">'+ipl_fToDate(cf.naarMoment)+'</strong></span>'\n    +'<span>'+(cf.deltaM>0?'+':'')+cf.deltaM+' mnd</span></div></div>';\n}\n\n// ── impact per dienst: welke conflicten raken welke dienst ──\nfunction ipl_renderImpactPerDienst(conflicten){\n  var di={}; IPL_DIENSTEN.forEach(function(d){ di[d]={items:[],kleur:IPL_DIENST_KLEUR[d]}; });\n  conflicten.forEach(function(cf){ cf.diensten.forEach(function(d){ if(di[d]) di[d].items.push(cf.naam); }); });\n  var cards=Object.keys(di).filter(function(d){return di[d].items.length>0;}).map(function(d){\n    var v=di[d];\n    var items=v.items.slice(0,6).map(function(it){ return '<div style=\"font-size:10px;color:#4a5568;margin-bottom:2px;\">• '+it+'</div>'; }).join('');\n    var meer=v.items.length>6?'<div style=\"font-size:9px;color:#9aa3b5;\">+ '+(v.items.length-6)+' meer…</div>':'';\n    return '<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid '+v.kleur+';border-radius:4px;padding:10px 12px;\">'\n      +'<div style=\"font-size:11px;font-weight:800;color:'+v.kleur+';margin-bottom:4px;\">'+d+' <span style=\"color:#9aa3b5;font-weight:400;\">('+v.items.length+')</span></div>'+items+meer+'</div>';\n  }).join('');\n  if(!cards) return '';\n  return '<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;padding:12px 16px;margin-top:12px;\">'\n    +'<div style=\"font-size:12px;font-weight:700;color:#003082;margin-bottom:10px;\">Impact per dienst</div>'\n    +'<div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;\">'+cards+'</div></div>';\n}\n\n// ── hoofdrender: vervangt/verrijkt het platte impact-paneel ──\nfunction renderIPLImpact(){\n  var el=document.getElementById('ipl-impact'); if(!el||!IPL_MODEL) return;\n  var conflicten=ipl_detecteerConflicten();\n  if(!conflicten.length){\n    el.innerHTML='<div style=\"background:#e8f0fb;border:1px solid #c0d0ec;border-radius:6px;padding:12px 16px;font-size:12px;color:#003082;\">'\n      +'<strong>Integrale impactanalyse:</strong> sleep een balk of mijlpaal, of gebruik de tijdbalk, om een vertraging of vervroeging te simuleren. De verschuiving cascadeert via de geïmporteerde Primavera-afhankelijkheden. Conflicten met een mijlpaal of over dienstgrenzen heen verschijnen hier als kaart, met wat er gebeurt en wat het gevolg is.</div>';\n    return;\n  }\n  var rN=conflicten.filter(function(c){return c.kleur==='rood';}).length;\n  var oN=conflicten.length-rN;\n  var top=conflicten.slice(0,30);\n  var rows=top.map(ipl_conflictKaart).join('');\n  var meer=conflicten.length>30?'<div style=\"padding:8px;text-align:center;font-size:11px;color:#6a7898;\">+ '+(conflicten.length-30)+' conflicten meer — verklein de selectie of los de grootste eerst op.</div>':'';\n  el.innerHTML='<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;\">'\n    +'<div style=\"background:#1a2236;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;\">'+conflicten.length+' conflicten gedetecteerd</div>'\n    +'<div style=\"display:flex;gap:8px;align-items:center;\">'\n    +'<span style=\"background:rgba(255,255,255,.15);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;\">🔴 '+rN+'</span>'\n    +'<span style=\"background:rgba(255,255,255,.15);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;\">🟠 '+oN+'</span>'\n    +'<button onclick=\"ipl_reset()\" style=\"padding:5px 12px;border:1px solid #fff;background:transparent;color:#fff;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">↺ Reset</button></div></div>'\n    +'<div style=\"padding:12px;max-height:420px;overflow-y:auto;\">'+rows+meer+'</div></div>'\n    +ipl_renderImpactPerDienst(conflicten);\n}\n\n// ══════════════════════════════════════════════════════════\n// FORMATIECONFLICT-TABEL — per dienst per kwartaal waar de FTE-vraag\n// de beschikbare capaciteit overschrijdt, met de bijdragende taken.\n// ══════════════════════════════════════════════════════════\nfunction ipl_formatieConflicten(){\n  if(!IPL_MODEL) return [];\n  var t0=IPL_MODEL.t0,t1=IPL_MODEL.t1,step=0.25;\n  var buckets=[];\n  for(var t=t0;t<=t1+0.001;t+=step){ var b={t:t}; IPL_DIENSTEN.forEach(function(d){b[d]={fte:0,items:[]};}); buckets.push(b); }\n  IPL_MODEL.regels.forEach(function(r){\n    if(r.kind==='mile') return;\n    var e=ipl_eff(r);\n    var rollen=(typeof ipl_dashTaakFteRollen==='function'?ipl_dashTaakFteRollen(r):[]);\n    rollen.forEach(function(a){\n      var d=a.dienst||ipl_regelDienst(r); var f=parseFloat(a.fte)||0; if(f<=0) return;\n      buckets.forEach(function(b){\n        if(b.t>=e.t0-0.001 && b.t<e.t1-0.001){ if(!b[d]) return; b[d].fte+=f; b[d].items.push({naam:r.naam,fte:f}); }\n      });\n    });\n  });\n  var cap=(typeof IPL_DASHCONFIG!=='undefined' && IPL_DASHCONFIG.beschikbareFte)||{};\n  var conflicten=[];\n  buckets.forEach(function(b){\n    IPL_DIENSTEN.forEach(function(d){\n      var beschikbaar=cap[d]||0;\n      if(b[d].fte>beschikbaar+0.01){\n        conflicten.push({ dienst:d, kwartaal:ipl_fmtKwartaal(b.t), gevraagd:Math.round(b[d].fte*10)/10, beschikbaar:beschikbaar, tekort:Math.round((b[d].fte-beschikbaar)*10)/10, items:b[d].items });\n      }\n    });\n  });\n  return conflicten;\n}\n\nfunction renderIPLFormatieConflicten(){\n  var el=document.getElementById('ipl-fmt-conflicten'); if(!el||!IPL_MODEL) return;\n  var conflicten=ipl_formatieConflicten();\n  if(!conflicten.length){ el.innerHTML='<div style=\"font-size:10px;color:#1a8a4a;padding:6px 2px;\">✓ Geen kwartalen waarin de FTE-vraag de beschikbare formatie overschrijdt.</div>'; return; }\n  var rows=conflicten.slice(0,25).map(function(f){\n    var itemsTxt=f.items.slice(0,4).map(function(it){return it.naam+' ('+it.fte+' fte)';}).join(', ')+(f.items.length>4?' +'+(f.items.length-4)+' meer':'');\n    return '<tr><td style=\"padding:5px 8px;font-size:10px;font-weight:700;color:'+IPL_DIENST_KLEUR[f.dienst]+';white-space:nowrap;\">'+f.dienst+' · '+f.kwartaal+'</td>'\n      +'<td style=\"padding:5px 6px;text-align:center;font-size:11px;font-weight:800;color:#c0121f;\">'+f.gevraagd+'</td>'\n      +'<td style=\"padding:5px 6px;text-align:center;font-size:11px;color:#003082;\">'+f.beschikbaar+'</td>'\n      +'<td style=\"padding:5px 6px;text-align:center;font-size:11px;font-weight:800;color:#c0121f;\">+'+f.tekort+'</td>'\n      +'<td style=\"padding:5px 8px;font-size:9px;color:#6a7898;\">'+itemsTxt+'</td></tr>';\n  }).join('');\n  el.innerHTML='<table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#f4f6fb;\">'\n    +'<th style=\"padding:5px 8px;text-align:left;font-size:8px;text-transform:uppercase;color:#6a7898;\">Dienst · kwartaal</th>'\n    +'<th style=\"padding:5px 6px;text-align:center;font-size:8px;text-transform:uppercase;color:#c0121f;\">Gevraagd</th>'\n    +'<th style=\"padding:5px 6px;text-align:center;font-size:8px;text-transform:uppercase;color:#003082;\">Besch.</th>'\n    +'<th style=\"padding:5px 6px;text-align:center;font-size:8px;text-transform:uppercase;color:#c0121f;\">Tekort</th>'\n    +'<th style=\"padding:5px 8px;text-align:left;font-size:8px;text-transform:uppercase;color:#6a7898;\">Taken</th>'\n    +'</tr></thead><tbody>'+rows+'</tbody></table>'\n    +(conflicten.length>25?'<div style=\"font-size:9px;color:#6a7898;padding:4px 8px;\">+ '+(conflicten.length-25)+' meer…</div>':'');\n}\n\n\n\n// ===== PROJECTSTATUSTABEL, BESLUITPUNTEN-MATRIX, PORTFOLIO-TRIGGERS =====\n\n// ══════════════════════════════════════════════════════════\n// PROJECTSTATUSTABEL & BESLUITPUNTEN-MATRIX — dashboard-visualisaties\n// in dezelfde stijl als de vroege demo (project|fase|openstelling|\n// risico|score-sparkline, en een project×dienst-matrix), nu gevoed\n// door de echte geïmporteerde planning i.p.v. vijf fictieve projecten.\n// ══════════════════════════════════════════════════════════\n\n// sparkline-canvas-placeholder + tekenroutine (poort van drawSparkline)\nfunction ipl_spark(vals,col,w){\n  col=col||'#003082'; w=w||70;\n  return '<canvas data-sparkline=\\''+JSON.stringify(vals)+'\\' data-color=\"'+col+'\" style=\"width:'+w+'px;height:26px;display:inline-block;vertical-align:middle;\"></canvas>';\n}\nfunction ipl_drawSparkline(canvas){\n  var vals; try{ vals=JSON.parse(canvas.dataset.sparkline); }catch(e){ return; }\n  if(!vals||!vals.length) return;\n  var col=canvas.dataset.color||'#003082';\n  var w=parseInt(canvas.style.width)||70, h=parseInt(canvas.style.height)||26;\n  var dpr=window.devicePixelRatio||1;\n  canvas.width=w*dpr; canvas.height=h*dpr;\n  var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);\n  var max=Math.max.apply(null,vals), min=Math.min.apply(null,vals); var range=(max-min)||1;\n  var step=w/Math.max(vals.length-1,1);\n  ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.lineJoin='round'; ctx.lineCap='round';\n  ctx.beginPath();\n  vals.forEach(function(v,i){ var x=i*step, y=h-((v-min)/range)*(h-6)-3; if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); });\n  ctx.stroke();\n  ctx.lineTo((vals.length-1)*step,h); ctx.lineTo(0,h); ctx.closePath();\n  ctx.fillStyle=col+'22'; ctx.fill();\n  var lx=(vals.length-1)*step, ly=h-((vals[vals.length-1]-min)/range)*(h-6)-3;\n  ctx.beginPath(); ctx.arc(lx,ly,2.5,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();\n}\nfunction ipl_drawAllSparklines(container){\n  var els=(container||document).querySelectorAll('[data-sparkline]');\n  for(var i=0;i<els.length;i++) ipl_drawSparkline(els[i]);\n}\n\n// welke projecten horen bij dit dashboard (op basis van dienst/regio-filter)?\nfunction ipl_dashboardProjecten(db){\n  if(!IPL_MODEL) return [];\n  var fc=ipl_dashboardFilterContext(db);\n  return IPL_MODEL.projecten.filter(function(p){\n    var regelsVanProj=IPL_MODEL.regels.filter(function(r){return r.project===p.id;});\n    if(!regelsVanProj.length) return false;\n    if(fc.dienst && fc.dienst!=='ALLE'){\n      var matcht=regelsVanProj.some(function(r){return ipl_regelDienst(r)===fc.dienst;});\n      if(!matcht) return false;\n    }\n    if(fc.regio && fc.regio!=='ALLE'){\n      var matchtVc=regelsVanProj.some(function(r){return ipl_regelVC(r)===fc.regio;});\n      if(!matchtVc) return false;\n    }\n    return true;\n  });\n}\n\n// ── data per project: fase, openstelling(sdatum), risico, FTE-trend ──\nfunction ipl_projectStatusRij(p){\n  var regels=IPL_MODEL.regels.filter(function(r){return r.project===p.id;});\n  var taken=regels.filter(function(r){return r.kind!=='mile';});\n  // fase: van de taak die nu het meest \"actueel\" is (loopt over 'nu', anders de eerstvolgende)\n  var nu=IPL_MODEL.t0+ (IPL_MODEL.t1-IPL_MODEL.t0)*0.4;\n  var actueel=taken.filter(function(r){var e=ipl_eff(r); return nu>=e.t0&&nu<e.t1;})[0]\n    || taken.slice().sort(function(a,b){return ipl_eff(a).t0-ipl_eff(b).t0;})[0];\n  var fase=actueel?ipl_taakFaseSleutel(actueel):'—';\n  // openstelling: mijlpaal die matcht op IPL_OPENSTELLING_RE, anders de laatste mijlpaal als proxy\n  var mijlpalen=regels.filter(function(r){return r.kind==='mile';});\n  var openMs=mijlpalen.filter(function(r){return IPL_OPENSTELLING_RE.test(r.naam);});\n  var proxy=false;\n  var openM=openMs[0];\n  if(!openM && mijlpalen.length){ openM=mijlpalen.slice().sort(function(a,b){return ipl_eff(b).t0-ipl_eff(a).t0;})[0]; proxy=true; }\n  var openDatum=openM?ipl_fToDate(ipl_eff(openM).t0):'—';\n  // risico: conflicten die dit project raken, PLUS of het project zelf al is\n  // verschoven — anders blijft een project dat je zelf 8 maanden opschuift\n  // ten onrechte \"groen\" zolang er toevallig geen downstream-conflict is.\n  var conflicten=(typeof ipl_detecteerConflicten==='function'?ipl_detecteerConflicten():[]).filter(function(c){return c.project===p.naam;});\n  var eigenVerschoven=regels.some(function(r){return Math.abs(IPL_CASCADE[r.id]||0)>0.001;});\n  var risico = conflicten.some(function(c){return c.kleur==='rood';}) ? 'rood'\n    : (conflicten.length || eigenVerschoven) ? 'oranje' : 'groen';\n  // FTE-trend als sparkline (echte, geen verzonnen historie)\n  var t0=IPL_MODEL.t0,t1=IPL_MODEL.t1; var trend=[];\n  for(var i=0;i<8;i++){\n    var t=t0+(t1-t0)*(i/7); var f=0;\n    taken.forEach(function(r){ var e=ipl_eff(r); if(t>=e.t0&&t<e.t1){ (typeof ipl_dashTaakFteRollen==='function'?ipl_dashTaakFteRollen(r):[]).forEach(function(a){f+=parseFloat(a.fte)||0;}); } });\n    trend.push(Math.round(f*10)/10);\n  }\n  var maxShiftM=0; regels.forEach(function(r){ maxShiftM=Math.max(maxShiftM,Math.abs(Math.round((IPL_CASCADE[r.id]||0)*12))); });\n  return {naam:p.naam, fase:fase, open:openDatum, openProxy:proxy, risico:risico, trend:trend, aantalConflicten:conflicten.length, eigenVerschoven:eigenVerschoven, maxShiftM:maxShiftM};\n}\n\nfunction ipl_renderProjectStatusTabel(db){\n  var projecten=ipl_dashboardProjecten(db);\n  if(!projecten.length) return '<div style=\"padding:16px;color:#9aa3b5;font-size:12px;\">Geen projecten gevonden binnen deze dienst/regio-selectie.</div>';\n  var kleur=IPL_DIENST_KLEUR[db.dienst]||'#003082';\n  var rijen=projecten.map(ipl_projectStatusRij);\n  var rows=rijen.map(function(r){\n    var col=r.risico==='rood'?'#c0121f':r.risico==='oranje'?'#e06b00':'#1a8a4a';\n    var shiftTxt = r.maxShiftM>0 ? ' <span style=\"font-size:9px;color:#e06b00;font-weight:700;\">('+(r.aantalConflicten?r.aantalConflicten+' confl.':'verschoven')+' +'+r.maxShiftM+'m)</span>' : '';\n    return '<tr><td style=\"padding:7px 10px;font-size:11px;font-weight:600;\">'+r.naam+'</td>'\n      +'<td style=\"padding:7px 8px;font-size:10px;color:#6a7898;\">'+r.fase+'</td>'\n      +'<td style=\"padding:7px 8px;font-size:10px;color:#6a7898;white-space:nowrap;\">'+r.open+(r.openProxy?' <span style=\"color:#9aa3b5;font-style:italic;\">(laatste mijlpaal)</span>':'')+'</td>'\n      +'<td style=\"padding:7px 8px;white-space:nowrap;\">'+ipl_statusBadge(r.risico)+shiftTxt+'</td>'\n      +'<td style=\"padding:7px 8px;\">'+ipl_spark(r.trend,col,60)+'</td></tr>';\n  }).join('');\n  return '<div style=\"overflow-x:auto;\"><table style=\"width:100%;border-collapse:collapse;min-width:480px;\"><thead><tr style=\"background:#f4f6fb;\">'\n    +'<th style=\"padding:7px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Project</th>'\n    +'<th style=\"padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Fase</th>'\n    +'<th style=\"padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Openstelling</th>'\n    +'<th style=\"padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Risico</th>'\n    +'<th style=\"padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">FTE-trend</th>'\n    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';\n}\n\nfunction ipl_statusBadge(s){\n  var map={rood:'#c0121f',oranje:'#e06b00',groen:'#1a8a4a'};\n  var labels={rood:'🔴 Rood',oranje:'🟠 Oranje',groen:'🟢 OK'};\n  var c=map[s]||'#6a7898';\n  return '<span style=\"display:inline-flex;align-items:center;gap:3px;background:'+c+'22;color:'+c+';padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;\">'+(labels[s]||s)+'</span>';\n}\n\n// ── besluitpunten-matrix: project × dienst, kleur o.b.v. conflicten tussen die twee ──\nfunction ipl_renderBesluitpuntenMatrix(db){\n  var projecten=ipl_dashboardProjecten(db);\n  if(!projecten.length) return '<div style=\"padding:16px;color:#9aa3b5;font-size:12px;\">Geen projecten gevonden binnen deze dienst/regio-selectie.</div>';\n  var conflicten=(typeof ipl_detecteerConflicten==='function'?ipl_detecteerConflicten():[]);\n  var kolommen=IPL_DIENSTEN.filter(function(d){return d!==db.dienst || db.dienst==='ALLE';});\n  if(!kolommen.length) kolommen=IPL_DIENSTEN;\n  var rows=projecten.map(function(p){\n    var cells=kolommen.map(function(d){\n      var raakt=conflicten.filter(function(c){return c.project===p.naam && c.diensten.indexOf(d)>=0;});\n      if(!raakt.length){\n        var heeftTaken=IPL_MODEL.regels.some(function(r){return r.project===p.id && ipl_regelDienst(r)===d;});\n        return '<td style=\"padding:6px 8px;text-align:center;\">'+(heeftTaken?ipl_statusBadge('groen'):'<span style=\"color:#d0d4dc;font-size:11px;\">—</span>')+'</td>';\n      }\n      var kleur=raakt.some(function(c){return c.kleur==='rood';})?'rood':'oranje';\n      return '<td style=\"padding:6px 8px;text-align:center;\">'+ipl_statusBadge(kleur)+'</td>';\n    }).join('');\n    return '<tr><td style=\"padding:7px 10px;font-size:11px;font-weight:600;\">'+p.naam+'</td>'+cells+'</tr>';\n  }).join('');\n  var head=kolommen.map(function(d){ return '<th style=\"padding:7px 8px;text-align:center;font-size:9px;text-transform:uppercase;color:'+IPL_DIENST_KLEUR[d]+';\">'+d+'</th>'; }).join('');\n  return '<div style=\"overflow-x:auto;\"><table style=\"width:100%;border-collapse:collapse;min-width:420px;\"><thead><tr style=\"background:#1a2236;\">'\n    +'<th style=\"padding:7px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#fff;\">Project</th>'+head\n    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';\n}\n\n// ── Portfolio-brede triggerbalk (samenvatting over de HELE geladen planning) ──\nfunction ipl_computePortfolioTriggers(){\n  if(!IPL_MODEL) return null;\n  var conflicten=(typeof ipl_detecteerConflicten==='function'?ipl_detecteerConflicten():[]);\n  var rood=conflicten.filter(function(c){return c.kleur==='rood';}).length;\n  var oranje=conflicten.filter(function(c){return c.kleur==='oranje';}).length;\n  var projectenMetRisico=ipl_uniek(conflicten.filter(function(c){return c.mijlpaal;}).map(function(c){return c.project;})).length;\n  var formatie=(typeof ipl_formatieConflicten==='function'?ipl_formatieConflicten():[]).length;\n  var openstellingen=conflicten.filter(function(c){return c.openstelling;}).length;\n  var crossRel=0;\n  IPL_MODEL.relaties.forEach(function(rel){ var a=ipl_regelById(rel.from), b=ipl_regelById(rel.to); if(a&&b&&ipl_regelDienst(a)!==ipl_regelDienst(b)) crossRel++; });\n  var taken=IPL_MODEL.regels.filter(function(r){return r.kind!=='mile';});\n  var metFte=taken.filter(function(r){return (IPL_CONFIG.fte[r.id]||[]).length>0;});\n  var datakwaliteit=taken.length?Math.round(metFte.length/taken.length*100):0;\n  return {rood:rood, oranje:oranje, projectenMetRisico:projectenMetRisico, formatie:formatie, openstellingen:openstellingen, crossRel:crossRel, datakwaliteit:datakwaliteit};\n}\nfunction ipl_renderPortfolioTriggers(){\n  var el=document.getElementById('ipl-portfolio-triggers'); if(!el) return;\n  var t=ipl_computePortfolioTriggers();\n  if(!t){ el.innerHTML=''; return; }\n  function tegel(kleur,val,lbl){ return '<div style=\"background:#fff;border-top:3px solid '+kleur+';border-radius:6px;padding:10px 12px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,0.04);\"><div style=\"font-size:20px;font-weight:800;color:'+kleur+';\">'+val+'</div><div style=\"font-size:9px;color:#6a7898;text-transform:uppercase;letter-spacing:.3px;\">'+lbl+'</div></div>'; }\n  el.innerHTML='<div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px;\">'\n    +tegel('#c0121f',t.rood,'Rode conflicten')\n    +tegel('#e06b00',t.oranje,'Oranje conflicten')\n    +tegel('#c0121f',t.projectenMetRisico,'Projecten met mijlpaalrisico')\n    +tegel('#e06b00',t.formatie,'Formatieconflicten')\n    +tegel('#c0121f',t.openstellingen,'Openstellingen geraakt')\n    +tegel('#003082',t.crossRel,'Cross-dienst afhankelijkheden')\n    +tegel('#1a8a4a',t.datakwaliteit+'%','FTE-compleetheid')\n    +'</div>';\n}\n\n\ndocument.addEventListener('DOMContentLoaded', () => {\n  document.querySelector('#sidenav a').classList.add('active');\n  setupTooltips();\n  // herstel automatisch bewaarde scenario-instellingen uit deze browser (indien aanwezig)\n  var hersteld=null;\n  if(typeof app_loadFromLocalStorage==='function') hersteld=app_loadFromLocalStorage();\n  if(hersteld && typeof app_applyState==='function'){\n    app_applyState(hersteld);\n    APP_RESTORE.unshift({tijd:new Date(), label:'Automatisch hersteld bij openen', state:hersteld});\n    app_updateSaveStatus('Eerder bewaarde instellingen uit deze browser hersteld. Laad dezelfde planning-XML opnieuw via \"Planning importeren\" om verder te gaan waar je gebleven was.');\n  }\n  if(typeof app_renderRestorePanel==='function') app_renderRestorePanel();\n});\nwindow.addEventListener('resize', ()=>{\n  if(document.getElementById('s16')?.classList.contains('active') && IPL_MODEL) renderIPL();\n  if(document.getElementById('s11')?.classList.contains('active') && IPL_MODEL) renderIPLDash();\n});\n<\/script>\n\n</body>\n</html>\n";
</script>
