FAT A15\n  const lnwn0=2030.0,lnwn1=2031.0,af0=2030.0,af1=2030.75;\n  if(af0<lnwn1 && af1>lnwn0){\n    const ct=Math.max(af0,lnwn0);\n    const d=conflictDetectMoment(ct);\n    conflicts.push({id:'a15lcm',kleur:sh>3/12?'rood':'oranje',\n      naam:'LCM VCNWN ↔ FAT Corridor A15 West',\n      wat:'LCM-vervanging VC Noordwest-NL overlapt FAT Corridor A15 West. VC beschikbaarheid in risico.',\n      impact:'FAT A15 kan niet starten · VWM-gereedheid VC in gevaar',\n      diensten:['VWM','CIV','GPO'],conflictT:ct,\n      zonderMoment:d.zonder,metMoment:d.met,\n      deadline:dlLabel(d.met,-3),winst_mnd:Math.round((d.zonder-d.met)*12)});\n  }\n\n  // 4. Supporteinde LTS Bediening v1.3.1 na shift\n  if(sh>0 && (2029.75+sh)>2029.92){\n    const ct=2029.92;\n    const d=conflictDetectMoment(ct);\n    conflicts.push({id:'support',kleur:'rood',\n      naam:'LTS Bediening v1.3.1 buiten supportperiode na verschuiving',\n      wat:'Supporteinde v1.3.1: Q4 2029. Openstelling A27 valt na verschuiving buiten geldige supportperiode. Contractueel niet toegestaan zonder vrijstelling.',\n      impact:'Upgrade naar v1.3.2 vereist · meerwerk · contractwijziging · kostenklasse B',\n      diensten:['CIV','VWM','GPO'],conflictT:ct,\n      zonderMoment:d.zonder,metMoment:d.met,\n      deadline:dlLabel(d.met,-4),winst_mnd:Math.round((d.zonder-d.met)*12)});\n  }\n\n  // 5. PPO onderhoud vs FAT A27\n  const pt0=2029.0+sh,pt1=2029.33+sh;\n  if(sh>0 && pt0<(2029.5+sh) && pt1>(2029.0+sh)){\n    const ct=pt0;\n    const d=conflictDetectMoment(ct);\n    conflicts.push({id:'ppo',kleur:'oranje',\n      naam:'PPO onderhoudsvenster A27 ↔ FAT Tunnel A27 Noord',\n      wat:'PPO-onderhoudsvenster A27-ring overlapt FAT-periode Tunnel A27 Noord. Areaalbeschikbaarheid beperkt tijdens V-model testfasen.',\n      impact:'FAT risico · areaal beperkt · herplannen onderhoudsvenster nodig',\n      diensten:['PPO','GPO'],conflictT:ct,\n      zonderMoment:d.zonder,metMoment:d.met,\n      deadline:dlLabel(d.met,-3),winst_mnd:Math.round((d.zonder-d.met)*12)});\n  }\n\n  // 6. Audio bouwblok uitrol botst met capaciteitsdruk bij shift\n  if(sh>3/12){\n    const ct=audFAT;\n    const d=conflictDetectMoment(ct);\n    conflicts.push({id:'audio',kleur:'oranje',\n      naam:'LTS Audio uitrol ↔ FAT A27 Noord — CIV capaciteitsdruk',\n      wat:`Audio bouwblok koppelt op FAT-moment A27 Noord (${formatT(audFAT)}). Na verschuiving valt dit samen met FAT Heinenoord én LCM VCMN. CIV moet Audio, Bediening én Heinenoord-integratie gelijktijdig ondersteunen.`,\n      impact:'Integratierisico Audio bij FAT · CIV-capaciteit over grens · testvenster Audio dreigt te schuiven',\n      diensten:['CIV','GPO','VWM'],conflictT:ct,\n      zonderMoment:d.zonder,metMoment:d.met,\n      deadline:dlLabel(d.met,-4),winst_mnd:Math.round((d.zonder-d.met)*12)});\n  }\n\n  // 7. NOORDTUNNEL — Audio BB niet tijdig gereed voor ISTSI na verschuiving\n  if(sh>2/12){\n    const istsiStart=2028.0+sh;\n    const audioReady=2028.0+sh; // Audio BB goedkeuring valt samen met ISTSI-start\n    const ct=istsiStart;\n    const d=conflictDetectMoment(ct);\n    conflicts.push({id:'nt_audio',kleur:sh>4/12?'rood':'oranje',\n      naam:'Audio Bouwblok 1.2 ↔ ISTSI-fase Noordtunnel',\n      wat:'Het Audio Bouwblok 1.2 (CIV) moet compliant en uitgerold zijn vóór de ISTSI-fase van de Noordtunnel. Na verschuiving wordt de marge tussen goedkeuring Audio BB en start ISTSI te krap — risico dat ISTSI start zonder werkend bouwblok.',\n      impact:'ISTSI-fase vertraagt · openstelling Noordtunnel in gevaar · CIV-LCM-uitrol onder druk',\n      diensten:['VWM','CIV','GPO'],conflictT:ct,\n      zonderMoment:d.zonder,metMoment:d.met,\n      deadline:dlLabel(d.met,-4),winst_mnd:Math.round((d.zonder-d.met)*12)});\n  }\n\n  // 8. NOORDTUNNEL — Opleiding niet tijdig afgerond vóór openstelling na verschuiving\n  if(sh>0){\n    // De opleidingslijn rekent terug vanaf T=0. T-4 (VWM opgeleid) is het kritieke punt.\n    const t0=2028.99+sh;\n    const tMin4=t0-4/52;\n    const ct=tMin4;\n    const d=conflictDetectMoment(ct);\n    conflicts.push({id:'nt_opl',kleur:sh>6/12?'rood':'oranje',\n      naam:'Opleiding VWM (VCZWN) ↔ Openstelling Noordtunnel',\n      wat:'De opleidingslijn rekent terug vanaf openstelling (T=0): T-60 werkgroep OTO tot T-4 VWM opgeleid. Schuift de openstelling, dan moet de volledige opleidingsketen mee terugrekenen — anders staat er bij openstelling onvoldoende opgeleid personeel in de verkeerscentrale.',\n      impact:'Onvoldoende opgeleid VWM-personeel bij openstelling · O-SIT niet afgerond · openstellingsvergunning in gevaar',\n      diensten:['VWM','GPO'],conflictT:ct,\n      zonderMoment:d.zonder,metMoment:d.met,\n      deadline:dlLabel(d.met,-4),winst_mnd:Math.round((d.zonder-d.met)*12)});\n  }\n\n  return conflicts;\n}\nfunction ganttRender() {\n  const rows=buildRows();\n  const conflicts=detectConflicts3();\n  const fteConflicts=detectFormationConflicts();\n\n  // Markeer rows met FTE-overschrijding\n  const fteOverRowIds = new Set(fteConflicts.flatMap(f=>f.rows.map(r=>r.rowId)));\n\n  conflictBarSet=new Set(conflicts.map(c=>c.id));\n  conflictBarIds=conflictBarSet; // compat\n\n  drawBothGantts(rows,conflicts,fteOverRowIds);\n  renderSignalering(conflicts);\n  renderVerschilPanel(conflicts);\n  renderConflictPanel(conflicts);\n  renderFtePanel(fteConflicts);\n  renderImpactSummary(conflicts);\n}\n\nfunction drawBothGantts(rows,conflicts,fteOverRowIds=new Set()) {\n  ['Zonder','Met'].forEach(mode=>{\n    const canvas=document.getElementById('gantt'+mode);\n    if(!canvas) return;\n    const dpr=window.devicePixelRatio||1;\n    const cW=canvas.parentElement.clientWidth;\n    const nRows=rows.filter(r=>!r.spacer && !r.section).length;\n    const nSpacers=rows.filter(r=>r.spacer).length;\n    const nSections=rows.filter(r=>r.section).length;\n    const cH=HH+nRows*RH+nSpacers*8+nSections*26;\n    canvas.width=cW*dpr; canvas.height=cH*dpr; canvas.style.height=cH+'px';\n    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);\n    drawGantt(ctx,rows,conflicts,cW,cH,mode==='Met',fteOverRowIds);\n  });\n}\n\nfunction drawGantt(ctx,rows,conflicts,cW,cH,isMet,fteOverRowIds=new Set()) {\n  const sh=gShift/12;\n  ctx.fillStyle='#f8f9fc'; ctx.fillRect(0,0,cW,cH);\n\n  // Header\n  ctx.fillStyle='#001f57'; ctx.fillRect(0,0,cW,HH);\n  ctx.fillStyle='#5a7aaa'; ctx.font='bold 9px Segoe UI,Arial';\n  ctx.fillText('Activiteit / dienst',5,HH-7);\n\n  for(let y=2025;y<=2031;y++){\n    const x=tToX(y,cW),xN=tToX(y+1,cW);\n    ctx.fillStyle=y%2===0?'#002060':'#001f57';\n    ctx.fillRect(x,0,xN-x,HH);\n    ctx.fillStyle='#F9B000'; ctx.font='bold 10px Segoe UI,Arial'; ctx.textAlign='center';\n    ctx.fillText(String(y),(x+xN)/2,HH-7);\n    for(let q=1;q<=3;q++){\n      const xq=tToX(y+q*0.25,cW);\n      ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(xq-0.5,0,1,HH);\n      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='8px Segoe UI,Arial';\n      ctx.fillText('Q'+(q+1),xq+2,HH-7);\n    }\n  }\n  ctx.textAlign='left';\n\n  // Rows\n  let yy=HH; let vi=0;\n  for(const row of rows){\n    if(row.spacer){yy+=8;continue;}\n    if(row.section){\n      // Sectiekop-banner over volle breedte\n      const grad=ctx.createLinearGradient(0,yy,cW,yy);\n      grad.addColorStop(0,'#c05000'); grad.addColorStop(1,'#8a3800');\n      ctx.fillStyle=grad; ctx.fillRect(0,yy,cW,26);\n      ctx.fillStyle='#F9B000'; ctx.fillRect(0,yy,4,26);\n      ctx.fillStyle='#fff'; ctx.font='bold 11px Segoe UI,Arial';\n      ctx.fillText(row.title||'',10,yy+12);\n      ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='8px Segoe UI,Arial';\n      ctx.fillText(row.subtitle||'',10,yy+22);\n      yy+=26; continue;\n    }\n    const cy=yy+RH/2; const even=vi%2===0; vi++;\n\n    ctx.fillStyle=even?'#ffffff':'#f4f6fb'; ctx.fillRect(0,yy,cW,RH);\n    // grid\n    for(let y=2025;y<=2031;y++){\n      ctx.strokeStyle='#d8dce8'; ctx.lineWidth=0.5;\n      ctx.beginPath();ctx.moveTo(tToX(y,cW),yy);ctx.lineTo(tToX(y,cW),yy+RH);ctx.stroke();\n      for(let q=1;q<=3;q++){\n        ctx.strokeStyle='#eceff4'; ctx.lineWidth=0.3;\n        ctx.beginPath();ctx.moveTo(tToX(y+q*0.25,cW),yy);ctx.lineTo(tToX(y+q*0.25,cW),yy+RH);ctx.stroke();\n      }\n    }\n\n    // Supporteinde lijn\n    if(row.supporteinde){\n      const xs=tToX(row.supporteinde,cW);\n      ctx.save(); ctx.strokeStyle='#c0121f'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);\n      ctx.beginPath();ctx.moveTo(xs,yy);ctx.lineTo(xs,yy+RH);ctx.stroke();\n      ctx.setLineDash([]); ctx.fillStyle='#c0121f'; ctx.font='bold 8px Segoe UI,Arial'; ctx.textAlign='center';\n      ctx.fillText('sup.einde',xs,yy+10); ctx.textAlign='left'; ctx.restore();\n    }\n\n    // Capaciteitsoverschrijding highlight (alleen met integraal)\n    if(row.capaciteitsgrens && isMet && sh>0){\n      const ov0=Math.max(2029.0+sh,2029.0), ov1=Math.min(2029.5+sh,2029.5);\n      if(ov0<ov1){\n        const ox0=tToX(ov0,cW),ox1=tToX(ov1,cW);\n        ctx.save();\n        ctx.fillStyle='rgba(192,18,31,0.2)'; ctx.fillRect(ox0,yy,ox1-ox0,RH);\n        ctx.strokeStyle='#c0121f'; ctx.lineWidth=1.5; ctx.strokeRect(ox0,yy,ox1-ox0,RH);\n        ctx.fillStyle='#c0121f'; ctx.font='bold 7px Segoe UI,Arial'; ctx.textAlign='center';\n        ctx.fillText('MAX',( ox0+ox1)/2,cy+3); ctx.textAlign='left'; ctx.restore();\n      }\n    }\n\n    // Label — met FTE-info en formatieconflict-markering\n    const fteDef = FTE_DEFS.find(d=>d.rowId===row.id);\n    const hasFteOver = isMet && fteOverRowIds.has(row.id);\n    const lblBg = hasFteOver ? '#fff5e0' : '#f0f2f5';\n    ctx.fillStyle=lblBg; ctx.fillRect(0,yy,LBL,RH);\n    ctx.strokeStyle=hasFteOver?'#e06b00':'#d0d6de'; ctx.lineWidth=hasFteOver?1.5:0.5;\n    ctx.strokeRect(0,yy,LBL,RH);\n    ctx.fillStyle=row.color; ctx.fillRect(0,yy,3,RH);\n    ctx.fillStyle='#1a2236'; ctx.font='bold 10px Segoe UI,Arial'; ctx.fillText(row.label||'',6,yy+12);\n    ctx.fillStyle='#6a7898'; ctx.font='9px Segoe UI,Arial'; ctx.fillText(row.sub||'',6,yy+23);\n\n    // FTE badge rechts in label\n    if(fteDef) {\n      // Bereken max FTE in dit row over alle fasen\n      const maxFte = Math.max(...fteDef.phases.map(p=>p.fte));\n      const cap = FTE_CAP[fteDef.dienst];\n      const over = isMet && maxFte > cap.max;\n      const badgeCol = over ? '#e06b00' : fteDef.dienst==='GPO'?'#003082':fteDef.dienst==='CIV'?'#5a2d82':fteDef.dienst==='VWM'?'#00823c':fteDef.dienst==='PPO'?'#00698a':'#c05000';\n      const badgeTxt = `${fteDef.dienst} ${maxFte}fte`;\n      ctx.save();\n      ctx.font='bold 7px Segoe UI,Arial';\n      const tw=ctx.measureText(badgeTxt).width+6;\n      ctx.fillStyle=badgeCol;\n      ctx.fillRect(LBL-tw-2, yy+2, tw, 12);\n      ctx.fillStyle='#fff'; ctx.textAlign='center';\n      ctx.fillText(badgeTxt, LBL-tw/2-2, yy+10);\n      ctx.textAlign='left'; ctx.restore();\n      if(over) {\n        // Oranje driehoekje linksboven\n        ctx.save();\n        ctx.fillStyle='#e06b00';\n        ctx.beginPath();ctx.moveTo(0,yy);ctx.lineTo(10,yy);ctx.lineTo(0,yy+10);ctx.closePath();ctx.fill();\n        ctx.restore();\n      }\n    }\n\n    ctx.strokeStyle='#d0d6de'; ctx.lineWidth=0.3;\n    ctx.beginPath();ctx.moveTo(0,yy+RH);ctx.lineTo(cW,yy+RH);ctx.stroke();\n\n    // FTE-bezettingsbalk onderin rij (alleen in \"Met\"-modus)\n    if(isMet && fteDef) {\n      const cap = FTE_CAP[fteDef.dienst];\n      // Teken een dunne FTE-balk per fase als overlay onderaan de rij\n      for(const ph of fteDef.phases) {\n        const px0=tToX(ph.t0Ref(),cW), px1=tToX(ph.t1Ref(),cW), pw=px1-px0;\n        if(pw<2) continue;\n        const ratio = Math.min(ph.fte/cap.max,1.2);\n        const over = ph.fte > cap.max;\n        const barH = 4;\n        const barY = yy+RH-barH-1;\n        ctx.fillStyle = over ? '#e06b00' : '#1a8a4a';\n        ctx.globalAlpha = 0.7;\n        ctx.fillRect(px0, barY, pw*ratio, barH);\n        if(over) {\n          ctx.fillStyle='#c0121f'; ctx.globalAlpha=0.85;\n          ctx.fillRect(px0+pw, barY, 3, barH); // overflow indicator\n        }\n        ctx.globalAlpha=1;\n      }\n    }\n\n    // Bars\n    for(const bar of row.bars||[]){\n      const bx=tToX(bar.t0,cW),bx2=tToX(bar.t1,cW),bw=bx2-bx,bh=18,by=cy-9;\n      const isConfl=bar.conflict && sh>0;\n\n      if(bar.color==='#d0e8f8'){\n        ctx.fillStyle='#e8f4ff'; ctx.fillRect(bx,by,bw,bh);\n        ctx.strokeStyle='#90c0e0'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);\n      } else if(isConfl && isMet){\n        // MET: rood gestreept\n        ctx.fillStyle='#c0121f'; ctx.fillRect(bx,by,bw,bh);\n        ctx.save(); ctx.strokeStyle='rgba(255,180,180,0.35)'; ctx.lineWidth=4;\n        for(let sx=bx-bh;sx<bx+bw+bh;sx+=9){ctx.beginPath();ctx.moveTo(sx,by+bh);ctx.lineTo(sx+bh,by);ctx.stroke();}\n        ctx.restore();\n        ctx.fillStyle='rgba(192,18,31,0.75)'; ctx.fillRect(bx,by,bw,bh);\n        ctx.strokeStyle='#ff4444'; ctx.lineWidth=2; ctx.strokeRect(bx,by,bw,bh);\n      } else if(isConfl && !isMet){\n        // ZONDER: gewone kleur — dienst ziet eigen bar normaal, geen rode waarschuwing\n        ctx.fillStyle=bar.color; ctx.fillRect(bx,by,bw,bh);\n        // geen rood border\n      } else {\n        ctx.fillStyle=bar.color; ctx.fillRect(bx,by,bw,bh);\n      }\n\n      if(bw>16){\n        ctx.save(); ctx.beginPath(); ctx.rect(bx+2,by,bw-4,bh); ctx.clip();\n        ctx.fillStyle=bar.textColor||(bar.color==='#d0e8f8'?'#003082':'#fff');\n        ctx.font='bold 8px Segoe UI,Arial';\n        ctx.fillText(bar.label,bx+3,cy+2); ctx.restore();\n      }\n    }\n\n    // Milestones\n    for(const ms of row.ms||[]){\n      const mx=tToX(ms.t,cW);\n      const isConfl=ms.conflict && sh>0;\n      const msCol=(isConfl && isMet)?C.rood:C.geel;\n      if(ms.type==='gono'){\n        ctx.beginPath();ctx.arc(mx,cy,5,0,Math.PI*2);\n        ctx.fillStyle='#fff';ctx.fill();\n        ctx.strokeStyle=msCol;ctx.lineWidth=2;ctx.stroke();\n        ctx.fillStyle='#1a2236';ctx.font='bold 7px Segoe UI,Arial';ctx.textAlign='center';\n        ctx.fillText(ms.lbl,mx,cy-7);ctx.textAlign='left';\n      } else if(ms.type==='open'){\n        ctx.save();ctx.translate(mx,cy);ctx.rotate(Math.PI/4);\n        ctx.fillStyle=msCol;ctx.fillRect(-6,-6,12,12);\n        ctx.strokeStyle=(isConfl&&isMet)?'#ff4444':'#c08000';ctx.lineWidth=1.5;ctx.strokeRect(-6,-6,12,12);\n        ctx.restore();\n        ctx.fillStyle=msCol;ctx.font='bold 7px Segoe UI,Arial';ctx.textAlign='center';\n        ctx.fillText('OPEN',mx,cy+15);ctx.textAlign='left';\n      } else {\n        ctx.save();ctx.translate(mx,cy);ctx.rotate(Math.PI/4);\n        ctx.fillStyle=msCol;ctx.fillRect(-5,-5,10,10);ctx.restore();\n        ctx.fillStyle=isConfl&&isMet?C.rood:'#6a5000';ctx.font='bold 7px Segoe UI,Arial';ctx.textAlign='center';\n        ctx.fillText(ms.lbl,mx,cy-7);ctx.textAlign='left';\n      }\n    }\n    yy+=RH;\n  }\n\n  // ── SIGNALERINGSLIJN per conflict ────────────────\n  for(const c of conflicts){\n    const signalT = isMet ? c.metMoment : c.zonderMoment;\n    const sx = tToX(signalT, cW);\n    const sigCol = isMet ? '#1a8a4a' : '#c0121f';\n\n    // Verticale stippellijn\n    ctx.save();\n    ctx.strokeStyle=sigCol; ctx.lineWidth=2;\n    ctx.setLineDash([6,4]);\n    ctx.beginPath();ctx.moveTo(sx,HH);ctx.lineTo(sx,cH-2);ctx.stroke();\n    ctx.setLineDash([]);\n\n    // Pijl omlaag op lijn\n    ctx.fillStyle=sigCol;\n    ctx.beginPath();ctx.moveTo(sx,HH+2);ctx.lineTo(sx-5,HH+13);ctx.lineTo(sx+5,HH+13);ctx.closePath();ctx.fill();\n    ctx.restore();\n\n    // Label pill\n    const pill = isMet\n      ? `⚡ ${formatT(signalT)}`\n      : `⚠ ${formatT(signalT)}`;\n    ctx.save();\n    ctx.font='bold 8px Segoe UI,Arial';\n    const tw=ctx.measureText(pill).width+8;\n    const lx=Math.max(LBL+2, Math.min(sx-tw/2, cW-tw-4));\n    ctx.fillStyle=sigCol;\n    ctx.beginPath();\n    ctx.roundRect ? ctx.roundRect(lx,HH+14,tw,13,3) : ctx.rect(lx,HH+14,tw,13);\n    ctx.fill();\n    ctx.fillStyle='#fff'; ctx.fillText(pill,lx+4,HH+23);\n    ctx.restore();\n  }\n\n  // ── \"Nu\" lijn ─────────────────────────────────\n  const nowX=tToX(2026.5,cW);\n  ctx.strokeStyle='#00cc44'; ctx.lineWidth=2; ctx.setLineDash([5,3]);\n  ctx.beginPath();ctx.moveTo(nowX,HH);ctx.lineTo(nowX,cH);ctx.stroke();\n  ctx.setLineDash([]);\n  ctx.fillStyle='#00cc44'; ctx.font='bold 9px Segoe UI,Arial';\n  ctx.fillText('▼ Nu',nowX-14,HH+9);\n\n  // ── \"Onzichtbaar\" zone in ZONDER-modus ────────\n  if(!isMet && sh>0){\n    ctx.save();\n    ctx.fillStyle='rgba(200,210,230,0.13)';\n    ctx.fillRect(nowX,HH,cW-nowX,cH-HH);\n    // Label \"Toekomst niet zichtbaar\"\n    ctx.fillStyle='rgba(100,120,160,0.35)'; ctx.font='bold 10px Segoe UI,Arial'; ctx.textAlign='center';\n    ctx.fillText('Toekomst niet zichtbaar zonder integrale koppeling',(nowX+cW)/2,HH+18);\n    ctx.textAlign='left'; ctx.restore();\n  }\n\n  // ── Labelkolom divider ────────────────────────\n  ctx.strokeStyle='#b0b8cc'; ctx.lineWidth=1;\n  ctx.beginPath();ctx.moveTo(LBL,HH);ctx.lineTo(LBL,cH);ctx.stroke();\n}\n\n// ── Signalering tekst ───────────────────────────────\nfunction renderSignalering(conflicts){\n  const elZ=document.getElementById('signaal-zonder');\n  const elM=document.getElementById('signaal-met');\n  if(!elZ||!elM) return;\n  if(gShift===0||conflicts.length===0){\n    elZ.innerHTML='<span style=\"color:#6a7898;font-size:12px;\">← Schuif de tijdsbalk om het verschil te zien</span>';\n    elM.innerHTML='<span style=\"color:#6a7898;font-size:12px;\">← Schuif de tijdsbalk om het verschil te zien</span>';\n    return;\n  }\n  const maxW=Math.max(...conflicts.map(c=>c.winst_mnd));\n  const eersteZ=conflicts.reduce((a,b)=>a.zonderMoment<b.zonderMoment?a:b);\n  const eersteM=conflicts.reduce((a,b)=>a.metMoment<b.metMoment?a:b);\n  elZ.innerHTML=`<div style=\"display:flex;gap:8px;\"><span style=\"font-size:18px;flex-shrink:0\">🕐</span><div>\n    <div style=\"font-weight:700;color:#c0121f;margin-bottom:3px;\">Eerste signaal: ${formatT(eersteZ.zonderMoment)}</div>\n    <div style=\"color:#7a3030;line-height:1.5;font-size:11px;\">Zonder integrale planning zie je de <strong>${conflicts.length} conflicten</strong> \n    pas als je er in de realisatiefase tegenaan loopt. Dan is bijsturen duur: maatwerk, meerwerk, restpunten, contractwijzigingen.</div></div></div>`;\n  elM.innerHTML=`<div style=\"display:flex;gap:8px;\"><span style=\"font-size:18px;flex-shrink:0\">⚡</span><div>\n    <div style=\"font-weight:700;color:#1a8a4a;margin-bottom:3px;\">Eerste signaal: ${formatT(eersteM.metMoment)} — <strong>${maxW} maanden eerder!</strong></div>\n    <div style=\"color:#1a5030;line-height:1.5;font-size:11px;\">Met integrale planning worden <strong>${conflicts.length} conflicten</strong> \n    zichtbaar zodra planningsdata van GPO, CIV en VWM worden gekoppeld — nog ruim vóór de realisatiefase.</div></div></div>`;\n}\n\nfunction renderVerschilPanel(conflicts){\n  const el=document.getElementById('verschil-panel');\n  if(!el) return;\n  if(gShift===0||conflicts.length===0){el.innerHTML='';return;}\n  const rows=conflicts.map(c=>{\n    const bc=c.kleur==='rood'?'#c0121f':'#e06b00';\n    return `<tr>\n      <td style=\"font-weight:600;font-size:11px;padding:7px 10px;\">${c.kleur==='rood'?'🔴':'🟠'} ${c.naam}</td>\n      <td style=\"color:#c0121f;font-weight:700;font-size:11px;padding:7px 8px;white-space:nowrap;\">${formatT(c.zonderMoment)}</td>\n      <td style=\"color:#1a8a4a;font-weight:700;font-size:11px;padding:7px 8px;white-space:nowrap;\">${formatT(c.metMoment)}</td>\n      <td style=\"font-weight:800;font-size:13px;color:#003082;padding:7px 8px;white-space:nowrap;\">+${c.winst_mnd} mnd</td>\n      <td style=\"font-size:11px;color:#6a7898;padding:7px 8px;\">${c.deadline}</td>\n    </tr>`;\n  }).join('');\n  const avg=Math.round(conflicts.reduce((a,c)=>a+c.winst_mnd,0)/conflicts.length);\n  el.innerHTML=`<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;\">\n    <div style=\"background:#003082;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;\">\n      <div style=\"font-size:13px;font-weight:700;\">📊 Vergelijking: wanneer zichtbaar?</div>\n      <div style=\"font-size:11px;opacity:.8;\">Verschuiving A27 Noord: +${gShift} maanden</div>\n    </div>\n    <table style=\"width:100%;border-collapse:collapse;\">\n      <thead><tr style=\"background:#f4f6fb;\">\n        <th style=\"padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Conflict</th>\n        <th style=\"padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#c0121f;\">🔴 Zonder integraal</th>\n        <th style=\"padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#1a8a4a;\">🟢 Met integraal</th>\n        <th style=\"padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#003082;\">Tijdwinst</th>\n        <th style=\"padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Besluit vóór</th>\n      </tr></thead>\n      <tbody>${rows}</tbody>\n    </table>\n    <div style=\"padding:10px 14px;background:#e8f5ed;border-top:1px solid #b0ddc0;font-size:12px;color:#1a5030;\">\n      <strong>Conclusie:</strong> Met integrale planning zijn conflicten gemiddeld <strong>${avg} maanden eerder</strong> zichtbaar — terwijl ze nog stuurbaar zijn.\n    </div>\n  </div>`;\n}\n\nfunction renderConflictPanel(conflicts){\n  var el=document.getElementById('conflict-panel');\n  if(!el) return;\n  if(conflicts.length===0){\n    el.innerHTML=gShift>0?'<div style=\"background:var(--groen-light);border:1px solid #b0ddc0;border-radius:6px;padding:12px 16px;font-size:13px;color:var(--groen);font-weight:600;\">Geen conflicten bij huidige verschuiving.</div>':'';\n    return;\n  }\n  var rN=0,oN=0;\n  for(var i=0;i<conflicts.length;i++){if(conflicts[i].kleur==='rood')rN++;else oN++;}\n  var rows=conflicts.map(function(cf){\n    var bc=cf.kleur==='rood'?'#c0121f':'#e06b00';\n    var bg=cf.kleur==='rood'?'#fde8ea':'#fff0e0';\n    var icon=cf.kleur==='rood'?'🔴':'🟠';\n    var d=(cf.diensten||[]).map(function(dv){\n      return '<span style=\"background:#e8f0fb;border:1px solid #c0d0ec;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;color:#003082;\">'+dv+'</span>';\n    }).join(' ');\n    return '<div style=\"background:'+bg+';border:1px solid '+bc+';border-left:4px solid '+bc+';border-radius:4px;padding:10px 12px;margin-bottom:4px;\">'\n      +'<div style=\"font-size:12px;font-weight:700;color:'+bc+';margin-bottom:4px;\">'+icon+' '+cf.naam+'</div>'\n      +'<div style=\"font-size:11px;color:#4a5568;margin-bottom:6px;\">'+cf.wat+'</div>'\n      +'<div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;\">'\n      +'<span style=\"font-size:10px;color:#666;\">Impact:</span>'\n      +'<span style=\"font-size:11px;color:'+bc+';\">'+cf.impact+'</span>'\n      +'<span style=\"margin-left:auto;\">'+d+'</span>'\n      +'</div>'\n      +'<div style=\"display:flex;gap:12px;font-size:10px;flex-wrap:wrap;padding-top:5px;border-top:1px solid #eee;\">'\n      +'<span>Zonder: <strong style=\"color:#c0121f\">'+formatT(cf.zonderMoment)+'</strong></span>'\n      +'<span>Met: <strong style=\"color:#1a8a4a\">'+formatT(cf.metMoment)+'</strong></span>'\n      +'<span>+'+cf.winst_mnd+' mnd</span>'\n      +'<span style=\"margin-left:auto;\">'+cf.deadline+'</span>'\n      +'</div></div>';\n  }).join('');\n  el.innerHTML='<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;margin-top:12px;\">'\n    +'<div style=\"background:#c0121f;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;\">'+conflicts.length+' conflicten gedetecteerd</div>'\n    +'<div style=\"display:flex;gap:8px;\">'\n    +'<span style=\"background:rgba(255,255,255,.2);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;\">🔴 '+rN+'</span>'\n    +'<span style=\"background:rgba(255,255,255,.2);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;\">🟠 '+oN+'</span>'\n    +'</div></div>'\n    +'<div style=\"padding:12px;\">'+rows+'</div>'\n    +'</div>';\n}\nfunction renderImpactSummary(conflicts){\n  var el=document.getElementById('impact-summary');\n  if(!el) return;\n  if(conflicts.length===0||gShift===0){el.innerHTML='';return;}\n  var di={GPO:{items:[],col:'#003082'},CIV:{items:[],col:'#5a2d82'},VWM:{items:[],col:'#00823c'},PPO:{items:[],col:'#00698a'},Regio:{items:[],col:'#c05000'}};\n  for(var ci=0;ci<conflicts.length;ci++){\n    var cf=conflicts[ci];\n    for(var di2=0;di2<(cf.diensten||[]).length;di2++){\n      var d=cf.diensten[di2];\n      if(di[d]) di[d].items.push(cf.naam);\n    }\n  }\n  var cards=Object.keys(di).filter(function(n){return di[n].items.length>0;}).map(function(n){\n    var v=di[n];\n    var itemsHtml=v.items.map(function(item){return '<div style=\"font-size:10px;color:#4a5568;margin-bottom:2px;\">• '+item+'</div>';}).join('');\n    return '<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid '+v.col+';border-radius:4px;padding:10px 12px;\">'\n      +'<div style=\"font-size:11px;font-weight:800;color:'+v.col+';margin-bottom:4px;\">'+n+'</div>'\n      +itemsHtml+'</div>';\n  }).join('');\n  el.innerHTML='<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;padding:12px 16px;margin-top:12px;\">'\n    +'<div style=\"font-size:12px;font-weight:700;color:#003082;margin-bottom:10px;\">Impact per dienst — verschuiving A27 Noord +'+gShift+' maanden</div>'\n    +'<div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;\">'+cards+'</div>'\n    +'</div>';\n}\n\nfunction renderFtePanel(fteConflicts) {\n  var el = document.getElementById('fte-panel');\n  if (!el) return;\n\n  var byQuarter = calcFteByQuarter();\n  var diensten = Object.keys(FTE_CAP);\n\n  // ── Dienstkaarten ─────────────────────────────────────\n  var dienstCards = diensten.map(function(d) {\n    var cap = FTE_CAP[d];\n    var qs = byQuarter[d] || [];\n    var peak = qs.length ? Math.max.apply(null, qs.map(function(q){return q.fte;})) : 0;\n    var overQs = qs.filter(function(q){return q.fte > cap.max;});\n    var statusCol = overQs.length > 0 ? '#c0121f' : peak >= cap.max*0.8 ? '#e06b00' : '#1a8a4a';\n    var statusTxt = overQs.length > 0 ? ('⚠ ' + overQs.length + '× overschreden') : (peak >= cap.max*0.8 ? 'Krap' : 'OK');\n    var pct = Math.min(Math.round(peak/cap.max*100), 130);\n\n    // Kwartaal-badges — geen geneste templates\n    var kwBadges = qs.slice(0,6).map(function(q) {\n      var over = q.fte > cap.max;\n      var bg = over ? '#fde8ea' : q.fte >= cap.max*0.8 ? '#fff0e0' : '#e8f5ee';\n      var col = over ? '#c0121f' : q.fte >= cap.max*0.8 ? '#e06b00' : '#1a8a4a';\n      var fw = over ? '800' : '600';\n      return '<span style=\"display:inline-block;margin:1px 3px 1px 0;padding:1px 5px;border-radius:3px;background:' + bg + ';color:' + col + ';font-weight:' + fw + ';\">' + q.label.replace(' ','&nbsp;') + ': ' + q.fte + '</span>';\n    }).join('');\n    if (qs.length > 6) kwBadges += '<span style=\"color:#6a7898\"> +' + (qs.length-6) + ' meer</span>';\n\n    // Overflow bar\n    var overflowBar = pct > 100\n      ? '<div style=\"height:100%;width:' + Math.min(pct-100,30) + '%;background:#ff4444;border-radius:0 3px 3px 0;margin-top:-8px;opacity:.7;\"></div>'\n      : '';\n\n    return '<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid ' + cap.kleur + ';border-radius:6px;padding:12px 14px;\">'\n      + '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">'\n      + '<div style=\"font-size:12px;font-weight:800;color:' + cap.kleur + ';\">' + cap.label + '</div>'\n      + '<div style=\"font-size:10px;font-weight:700;color:' + statusCol + ';\">' + statusTxt + '</div>'\n      + '</div>'\n      + '<div style=\"font-size:10px;color:#6a7898;margin-bottom:6px;\">Max: <strong>' + cap.max + ' FTE</strong> · Piek: <strong style=\"color:' + statusCol + '\">' + peak + ' FTE</strong></div>'\n      + '<div style=\"background:#e8eaf0;border-radius:3px;height:8px;overflow:hidden;margin-bottom:8px;\">'\n      + '<div style=\"height:100%;width:' + Math.min(pct,100) + '%;background:' + statusCol + ';border-radius:3px;\"></div>'\n      + overflowBar\n      + '</div>'\n      + '<div style=\"font-size:10px;color:#6a7898;\">' + kwBadges + '</div>'\n      + '</div>';\n  }).join('');\n\n  // ── Conflict-tabel ─────────────────────────────────────\n  var conflictHtml = '';\n  if (fteConflicts.length > 0) {\n    var trows = fteConflicts.map(function(f) {\n      var bc = f.kleur === 'rood' ? '#c0121f' : '#e06b00';\n      var icon = f.kleur === 'rood' ? '🔴' : '🟠';\n      var rowList = f.rows.map(function(r) {\n        return '<span style=\"font-size:10px;background:#f0f2f5;border-radius:3px;padding:1px 5px;margin:1px;\">' + r.label + ' (' + r.fte + 'fte)</span>';\n      }).join(' ');\n      var zichtbaar = gShift === 0\n        ? '<span style=\"font-size:10px;color:#6a7898;\">Altijd aanwezig</span>'\n        : '<span style=\"font-size:10px;background:#1a8a4a;color:#fff;padding:1px 6px;border-radius:3px;\">⚡ ' + formatT(f.metMoment) + '</span>';\n      return '<tr>'\n        + '<td style=\"padding:8px 10px;font-size:11px;font-weight:700;color:' + bc + ';\">' + icon + ' ' + f.dienst + ' · ' + f.kw + '</td>'\n        + '<td style=\"padding:8px 10px;text-align:center;font-size:13px;font-weight:800;color:' + bc + ';\">' + f.gevraagd + '</td>'\n        + '<td style=\"padding:8px 10px;text-align:center;font-size:13px;font-weight:800;color:#003082;\">' + f.beschikbaar + '</td>'\n        + '<td style=\"padding:8px 10px;text-align:center;font-size:13px;font-weight:800;color:' + bc + ';\">+' + f.tekort + '</td>'\n        + '<td style=\"padding:8px 10px;font-size:10px;\">' + rowList + '</td>'\n        + '<td style=\"padding:8px 10px;\">' + zichtbaar + '</td>'\n        + '</tr>';\n    }).join('');\n\n    conflictHtml = '<div style=\"margin-top:12px;\">'\n      + '<div style=\"font-size:12px;font-weight:700;color:#c0121f;margin-bottom:6px;\">⚠️ ' + fteConflicts.length + ' formatieconflicten — meer FTE gevraagd dan beschikbaar</div>'\n      + '<table style=\"width:100%;border-collapse:collapse;font-size:12px;\">'\n      + '<thead><tr style=\"background:#f4f6fb;\">'\n      + '<th style=\"padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Dienst · Kwartaal</th>'\n      + '<th style=\"padding:7px 8px;text-align:center;font-size:10px;color:#c0121f;\">Gevraagd</th>'\n      + '<th style=\"padding:7px 8px;text-align:center;font-size:10px;color:#003082;\">Max</th>'\n      + '<th style=\"padding:7px 8px;text-align:center;font-size:10px;color:#c0121f;\">Tekort</th>'\n      + '<th style=\"padding:7px 8px;text-align:left;font-size:10px;color:#6a7898;\">Activiteiten</th>'\n      + '<th style=\"padding:7px 8px;text-align:left;font-size:10px;color:#1a8a4a;\">Detectie</th>'\n      + '</tr></thead>'\n      + '<tbody>' + trows + '</tbody>'\n      + '</table></div>';\n  }\n\n  var headerTxt = fteConflicts.length > 0\n    ? '👥 Formatiecapaciteit — <span style=\"color:#F9B000\">' + fteConflicts.length + ' conflicten</span>'\n    : '👥 Formatiecapaciteit — geen overschrijdingen';\n\n  var mbVal = fteConflicts.length > 0 ? '12' : '0';\n\n  el.innerHTML = '<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;\">'\n    + '<div style=\"background:#1a2236;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;\">'\n    + '<div style=\"font-size:13px;font-weight:700;\">' + headerTxt + '</div>'\n    + '<div style=\"font-size:11px;opacity:.7;\">Fictieve FTE-bezetting · Verschuiving A27: +' + gShift + ' mnd</div>'\n    + '</div>'\n    + '<div style=\"padding:12px;\">'\n    + '<div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:' + mbVal + 'px;\">' + dienstCards + '</div>'\n    + conflictHtml\n    + '<div style=\"margin-top:10px;background:#e8f0fb;border:1px solid #c0d0ec;border-radius:4px;padding:8px 12px;font-size:11px;color:#003082;\">'\n    + '<strong>Legenda FTE-balk onderin rij (alleen \"Met integraal\"):</strong>'\n    + '<span style=\"margin-left:8px;\">🟢 Binnen cap.</span>'\n    + '<span style=\"margin-left:8px;\">🟠 &gt;80% bezet</span>'\n    + '<span style=\"margin-left:8px;\">🔴 Overschreden</span>'\n    + '</div>'\n    + '</div></div>';\n}\n\nfunction onSliderChange(val){\n  gShift=parseInt(val);\n  const pill=document.getElementById('shift-pill');\n  if(pill){\n    if(gShift===0){pill.textContent='Geen shift';pill.style.background='#003082';}\n    else{pill.textContent='+'+gShift+' maanden';pill.style.background=gShift>=9?'#c0121f':'#e06b00';}\n  }\n  ganttRender();\n}\n\n// backward compat\nfunction setMode(m){ gMode=m; ganttRender(); }\nfunction getProjectName(i){return['Tunnel A27 Noord','Heinenoordtunnel','Corridor A15 West'][i]||'—';}\n\nfunction setupTooltips(){\n  ['Zonder','Met'].forEach(mode=>{\n    const canvas=document.getElementById('gantt'+mode);\n    const tt=document.getElementById('tooltip-'+mode.toLowerCase());\n    if(!canvas||!tt) return;\n    canvas.addEventListener('mousemove',e=>{\n      const rect=canvas.getBoundingClientRect();\n      const mx=e.clientX-rect.left,my=e.clientY-rect.top;\n      const cW=canvas.offsetWidth;\n      const rows=buildRows(); let found=null; let yy=HH;\n      for(const row of rows){\n        if(row.spacer){yy+=8;continue;}\n        if(row.section){yy+=26;continue;}\n        const cy=yy+RH/2;\n        for(const ms of row.ms||[]){\n          if(ms.tooltip&&Math.abs(mx-tToX(ms.t,cW))<12&&Math.abs(my-cy)<14) found=ms.tooltip;\n        }\n        for(const b of row.bars||[]){\n          const bx=tToX(b.t0,cW),bx2=tToX(b.t1,cW);\n          if(mx>=bx&&mx<=bx2&&my>=cy-10&&my<=cy+10){\n            const dur=Math.round((b.t1-b.t0)*12);\n            found=`<strong>${b.label}</strong><br>${row.label}<br>${dur} mnd${b.conflict&&gShift>0?'<br><span style=\"color:#ff9999\">⚠ Conflicteert na verschuiving</span>':''}`;\n          }\n        }\n        yy+=RH;\n      }\n      if(found){tt.innerHTML=found;tt.style.display='block';tt.style.left=Math.min(mx+12,cW-230)+'px';tt.style.top=Math.max(my-44,4)+'px';canvas.style.cursor='pointer';}\n      else{tt.style.display='none';canvas.style.cursor='crosshair';}\n    });\n    canvas.addEventListener('mouseleave',()=>tt.style.display='none');\n  });\n}\n\n// ── compat stub voor oude setup ─────────────────────\nfunction setupTooltip(){ setupTooltips(); }\n\n// ══════════════════════════════════════════\n// KETEN CLICK\n// ══════════════════════════════════════════\n\nfunction ketenClick(nodeId) {\n  // Reset all\n  document.querySelectorAll('.keten-node').forEach(n => {\n    n.classList.remove('highlight','highlight-oranje');\n  });\n\n  const node = document.getElementById('kn-' + nodeId);\n  if (node) node.classList.add('highlight');\n\n  const info = KETEN_INFO[nodeId];\n  if (!info) return;\n\n  const impact = document.getElementById('keten-impact');\n  const content = document.getElementById('keten-impact-content');\n\n  content.innerHTML = `\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px;\">\n      <span style=\"font-size:28px;\">${info.icon}</span>\n      <div>\n        <div style=\"font-size:15px;font-weight:700;color:var(--rws-blauw);\">${info.titel}</div>\n      </div>\n    </div>\n    <div style=\"font-size:13px;color:var(--text-sub);line-height:1.7;\">${info.tekst}</div>\n  `;\n  impact.style.display = 'block';\n}\n\n// ══════════════════════════════════════════\n// FILTERS\n// ══════════════════════════════════════════\nlet activeFilters = { rood: true, oranje: false, groen: false };\n\nfunction toggleFilter(kleur) {\n  activeFilters[kleur] = !activeFilters[kleur];\n  const btn = document.getElementById('ft-' + kleur);\n  if (activeFilters[kleur]) btn.classList.remove('inactive');\n  else btn.classList.add('inactive');\n  applyFilters();\n}\n\nfunction applyFilters() {\n  // In een echte implementatie: filter triggerlijst\n  // Hier: demo update KPI teller\n  const project = document.getElementById('filter-project').value;\n  const vc = document.getElementById('filter-vc').value;\n  const baseRood = project || vc ? 3 : 7;\n  const baseOranje = project || vc ? 5 : 12;\n  document.getElementById('kpi-rood-n').textContent = baseRood;\n  document.getElementById('kpi-oranje-n').textContent = baseOranje;\n}\n\n// ══════════════════════════════════════════\n// DASHBOARD ENGINE — per dienst per niveau\n// ══════════════════════════════════════════\n\nlet dashDienst  = 'gpo';\nlet dashNiveau  = 'operationeel';\n\nconst DIENST_META = {\n  gpo:   { label:'GPO',          color:'#003082', bg:'#e8f0fb', icon:'🏗️', vol:'Grote Projecten en Onderhoud' },\n  civ:   { label:'CIV',          color:'#5a2d82', bg:'#f0eaf8', icon:'⚙️', vol:'Centrale Informatievoorziening' },\n  vwm:   { label:'VWM',          color:'#00823c', bg:'#e8f5ee', icon:'📡', vol:'Verkeer- en Watermanagement' },\n  ppo:   { label:'PPO',          color:'#00698a', bg:'#e8f4f7', icon:'🔧', vol:'Programma\\'s, Projecten en Onderhoud' },\n  regio: { label:'Regio',        color:'#c05000', bg:'#fdf0e8', icon:'🗺️', vol:'Gebiedseigenaar' },\n  mt:    { label:'MT RWS',       color:'#1a2236', bg:'#f0f2f5', icon:'🏛️', vol:'MT Rijkswaterstaat' },\n};\n\nfunction setDashDienst(d) {\n  dashDienst = d;\n  // Update tab styles\n  const colors = { gpo:'#003082', civ:'#5a2d82', vwm:'#00823c', ppo:'#00698a', regio:'#c05000', mt:'#1a2236' };\n  Object.keys(DIENST_META).forEach(k => {\n    const el = document.getElementById('dtab-'+k);\n    if (!el) return;\n    if (k === d) { el.style.background = colors[k]; el.style.color = ' e=\"padding:6px 8px;font-size:11px;color:#6a7898;\">'+oldD+'</td>'\n      +'<td style=\"padding:6px 8px;font-size:11px;color:#c05000;font-weight:700;\">'+newD+'</td>'\n      +'<td style=\"padding:6px 8px;text-align:center;font-size:13px;font-weight:800;color:#c0121f;\">+'+P6_SHIFTS[id]+'m</td></tr>';\n  }).join('');\n\n  // Doorwerking (cascade, niet handmatig)\n  var cascadeOnly = cascadeIds.filter(function(id){return !(P6_SHIFTS[id]>0);});\n  // groepeer doorwerking per dienst/lane\n  var byLane = {};\n  for (var i=0;i<cascadeOnly.length;i++){\n    var a=actOf(cascadeOnly[i]); if(!a)continue;\n    if(!byLane[a.lane]) byLane[a.lane]=[];\n    byLane[a.lane].push({a:a, sh:P6_CASCADE[cascadeOnly[i]]});\n  }\n\n  // bepaal welke diensten geraakt worden door cross-dienst doorwerking\n  var manualLanes = {};\n  manualIds.forEach(function(id){ var a=actOf(id); if(a) manualLanes[a.lane]=1; });\n  var crossImpactLanes = Object.keys(byLane).filter(function(l){ return !manualLanes[l]; });\n\n  var cascadeRows = '';\n  var laneOrder = Object.keys(byLane).sort();\n  for (var li=0; li<laneOrder.length; li++){\n    var lane = laneOrder[li];\n    var items = byLane[lane];\n    var isCrossDienst = !manualLanes[lane];\n    cascadeRows += '<tr style=\"background:'+(isCrossDienst?'#fff8f0':'#f9fafc')+';\"><td colspan=\"4\" style=\"padding:5px 10px;font-size:10px;font-weight:800;color:'+(isCrossDienst?'#c05000':'#6a7898')+';text-transform:uppercase;\">'\n      + (isCrossDienst?'⚠ Cross-dienst impact: ':'') + lane + ' ('+items.length+')</td></tr>';\n    cascadeRows += items.map(function(it){\n      var oldD=it.a.start, newD=p6_fToDate(p6_dToF(it.a.start)+it.sh/12);\n      return '<tr><td style=\"padding:5px 10px 5px 24px;font-size:11px;\">'+it.a.naam+'</td>'\n        +'<td style=\"padding:5px 8px;font-size:10px;color:#6a7898;\">'+oldD+'</td>'\n        +'<td style=\"padding:5px 8px;font-size:11px;color:#e06b00;\">'+newD+'</td>'\n        +'<td style=\"padding:5px 8px;text-align:center;font-size:12px;font-weight:700;color:#e06b00;\">+'+it.sh+'m</td></tr>';\n    }).join('');\n  }\n\n  var totalAffected = cascadeIds.length;\n  var maxShift = Math.max.apply(null, cascadeIds.map(function(id){return P6_CASCADE[id];}));\n  var openstShifts = cascadeIds.filter(function(id){var a=actOf(id);return a && a.lane==='Openstellingen';});\n\n  var summary = '<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;\">'\n    +'<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid #c0121f;border-radius:6px;padding:10px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#c0121f;\">'+totalAffected+'</div><div style=\"font-size:10px;color:#6a7898;\">Activiteiten geraakt</div></div>'\n    +'<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid #e06b00;border-radius:6px;padding:10px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#e06b00;\">'+crossImpactLanes.length+'</div><div style=\"font-size:10px;color:#6a7898;\">Diensten cross-impact</div></div>'\n    +'<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid #003082;border-radius:6px;padding:10px 12px;\"><div style=\"font-size:22px;font-weight:800;color:#003082;\">+'+maxShift+'m</div><div style=\"font-size:10px;color:#6a7898;\">Grootste verschuiving</div></div>'\n    +'<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid '+(openstShifts.length>0?'#c0121f':'#1a8a4a')+';border-radius:6px;padding:10px 12px;\"><div style=\"font-size:22px;font-weight:800;color:'+(openstShifts.length>0?'#c0121f':'#1a8a4a')+';\">'+openstShifts.length+'</div><div style=\"font-size:10px;color:#6a7898;\">Openstellingen geraakt</div></div>'\n    +'</div>';\n\n  var openstWarn = '';\n  if (openstShifts.length>0) {\n    openstWarn = '<div style=\"background:#fde8ea;border:1px solid #c0121f;border-left:4px solid #c0121f;border-radius:4px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#7a1020;\">'\n      +'<strong>⚠ Openstelling(en) in gevaar:</strong> de verschuiving werkt door tot tunnelopenstellingen — '\n      + openstShifts.map(function(id){var a=actOf(id);return a.naam.replace(' - Einde Uitvoering','')+' (+'+P6_CASCADE[id]+'m)';}).join(', ')\n      + '. Dit is precies het type ketenrisico dat integrale planning vroegtijdig zichtbaar maakt.</div>';\n  }\n\n  el.innerHTML = '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">'\n    +'<div style=\"font-size:14px;font-weight:700;color:#003082;\">Integrale impactanalyse — resultaat van je verschuiving</div>'\n    +'<button onclick=\"p6_reset()\" style=\"padding:6px 14px;border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">↺ Reset alle verschuivingen</button>'\n    +'</div>'\n    + summary + openstWarn\n    +'<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;margin-bottom:12px;\">'\n    +'<div style=\"background:#c05000;color:#fff;padding:8px 16px;font-size:12px;font-weight:700;\">Direct verschoven (door jou gesleept)</div>'\n    +'<table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#f4f6fb;\">'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Activiteit</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Oude start</th>'\n    +'<th style=\"padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Nieuwe start</th>'\n    +'<th style=\"padding:6px 8px;text-align:center;font-size:10px;text-transform:uppercase;color:#6a7898;\">Δ</th>'\n    +'</tr></thead><tbody>'+directRows+'</tbody></table></div>'\n    + (cascadeRows ? '<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;\">'\n        +'<div style=\"background:#e06b00;color:#fff;padding:8px 16px;font-size:12px;font-weight:700;\">Doorwerking via afhankelijkheden ('+cascadeOnly.length+' activiteiten)</div>'\n        +'<table style=\"width:100%;border-collapse:collapse;\"><tbody>'+cascadeRows+'</tbody></table></div>'\n        : '<div style=\"background:#e8f5ed;border:1px solid #b0ddc0;border-radius:6px;padding:10px 14px;font-size:12px;color:#1a5030;\">Geen doorwerking: deze activiteit heeft geen opvolgers in de keten.</div>');\n}\n\nfunction p6_reset() {\n  P6_SHIFTS = {};\n  P6_CASCADE = {};\n  renderP6();\n}\n\n// ── Link-modus helpers ──\nfunction p6_actName(id){\n  for (var i=0;i<P6_DATA.acts.length;i++) if(P6_DATA.acts[i].id===id) return P6_DATA.acts[i].naam;\n  return id;\n}\nfunction p6_setLinkStatus(html){\n  var el=document.getElementById('p6-linkstatus'); if(el) el.innerHTML=html;\n}\nfunction p6_toggleLinkMode(){\n  P6_LINKMODE = !P6_LINKMODE;\n  P6_LINKFROM = null;\n  var btn=document.getElementById('p6-linkbtn');\n  var banner=document.getElementById('p6-linkbanner');\n  if (P6_LINKMODE){\n    btn.style.background='#003082'; btn.style.color='#fff';\n    banner.style.display='flex';\n    p6_setLinkStatus('Klik op een <strong>voorganger</strong>-balk, dan op een <strong>opvolger</strong> om een afhankelijkheid te maken. Klik op een bestaande lijn om die te verwijderen.');\n  } else {\n    btn.style.background='#fff'; btn.style.color='#003082';\n    banner.style.display='none';\n  }\n  renderP6();\n}\nfunction p6_cancelLink(){\n  P6_LINKMODE=false; P6_LINKFROM=null;\n  var btn=document.getElementById('p6-linkbtn');\n  btn.style.background='#fff'; btn.style.color='#003082';\n  document.getElementById('p6-linkbanner').style.display='none';\n  renderP6();\n}\n// afstand punt tot lijnsegment\nfunction p6_distToSeg(px,py,x1,y1,x2,y2){\n  var dx=x2-x1, dy=y2-y1;\n  if (dx===0 && dy===0) return Math.hypot(px-x1,py-y1);\n  var t=((px-x1)*dx+(py-y1)*dy)/(dx*dx+dy*dy);\n  t=Math.max(0,Math.min(1,t));\n  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));\n}\nfunction p6_hitLine(mx,my){\n  for (var i=0;i<P6_LINELAYOUT.length;i++){\n    var ln=P6_LINELAYOUT[i];\n    for (var s=0;s<ln.segs.length;s++){\n      var sg=ln.segs[s];\n      if (p6_distToSeg(mx,my,sg[0],sg[1],sg[2],sg[3]) < 4) return ln;\n    }\n  }\n  return null;\n}\nfunction p6_addRel(p,s){\n  // voorkom duplicaten en directe omgekeerde\n  var rels=p6_activeRels();\n  for (var i=0;i<rels.length;i++){\n    if (rels[i].p===p && rels[i].s===s) return; // bestaat al\n  }\n  // bepaal of cross-dienst (verschillende lane-hoofdgroep)\n  function laneOf(id){ for(var k=0;k<P6_DATA.acts.length;k++) if(P6_DATA.acts[k].id===id) return P6_DATA.acts[k].lane; return ''; }\n  var cross = laneOf(p)!==laneOf(s) ? 1 : 0;\n  P6_USER_RELS.push({p:p,s:s,t:'FS',x:cross,user:1});\n}\nfunction p6_deleteRel(ln){\n  if (ln.user){\n    // verwijder uit user-relaties\n    for (var i=0;i<P6_USER_RELS.length;i++){\n      if (P6_USER_RELS[i].p===ln.p && P6_USER_RELS[i].s===ln.s){ P6_USER_RELS.splice(i,1); break; }\n    }\n  } else {\n    // markeer originele relatie als verwijderd\n    P6_DELETED[ln.p+'|'+ln.s] = true;\n  }\n  renderP6();\n}\n\n\n\n// ===== NOORDTUNNEL MODULE =====\n// ══════════════════════════════════════════════════════════\n// NOORDTUNNEL — Integrale 4-blokken casus (vervangt oude met/zonder)\n// Vier diensten-blokken, elk meerdere regels, met expliciete relaties.\n// Convergentie op openstelling T=0 = 31-12-2028 (= 2028.99).\n// Alle tijden in fractioneel jaar. NT_SHIFT verschuift de hele keten.\n// ══════════════════════════════════════════════════════════\n\nvar NT_T0  = 2028.99;          // openstelling Noordtunnel\nvar NT_T0B = 2030.50;          // openstelling Zuidasdok (~1,5 jaar later)\nvar NT_SHIFT = 0;             // globale verschuiving (maanden)\nvar NT_PROJSHIFT = { GPO:0, GPO2:0 }; // per GPO-project verschuiving (maanden)\nvar NT_DRAG = null;\nvar NT_MSHIFT = {};           // per-regel handmatige shift (maanden, mag negatief = vervroegen)\nvar NT_CASCADE = {};\nvar NT_LAYOUT = null;\nvar NT_SHOWREL = true;\n\n// Gedeelde formatie: CIV en VWM doen BEIDE tunnels met dezelfde teams.\n// Resources met capaciteit. GPO heeft per project eigen capaciteit (geen conflict).\nvar NT_RESOURCES = {\n  CIV_uitrol: { naam:'CIV uitrol-team', kleur:'#5a2d82', cap:1,\n    tip:'CIV-uitrolcapaciteit gedeeld over alle tunnels — 1 team' },\n  VWM_opl:    { naam:'VWM opleidingsteam', kleur:'#00a050', cap:1,\n    tip:'VWM-opleidingscapaciteit (trainers/OTO) gedeeld over alle tunnels — 1 team' },\n};\n\n// FTE-capaciteit per dienst (beschikbare formatie). GPO schaalt per project mee\n// (eigen capaciteit), CIV en VWM hebben een vaste pool (boeggolf-gevoelig).\nvar NT_DIENST_CAP = {\n  GPO: { naam:'GPO', kleur:'#003082', cap:8,  tip:'Projectcapaciteit GPO — schaalt mee per project (geen onderling conflict)' },\n  CIV: { naam:'CIV', kleur:'#5a2d82', cap:5,  tip:'CIV-pool — gedeeld over alle tunnels; één tunnel past, twee tegelijk = boeggolf boven 5 FTE' },\n  VWM: { naam:'VWM', kleur:'#00a050', cap:5,  tip:'VWM-pool (opleiding + opdracht) — gedeeld over tunnels; twee tunnels tegelijk = boeggolf boven 5 FTE' },\n};\n\n// FTE-belasting per regel-fase (fictief maar consistent). Wordt per dienst\n// gesommeerd over de tijd om de boeggolf (resource-histogram) te bouwen.\n// Default-FTE per blok als een regel geen eigen fte heeft.\nvar NT_DEFAULT_FTE = { GPO:1.5, GPO2:1.5, CIV:2, VWMF:1, VWMO:2.5 };\n\n// ── Uniforme rollen-bibliotheek per dienst (over alle projecten heen gelijk) ──\nvar NT_ROLLEN = {\n  GPO: ['Projectmanager','Technisch manager','Manager projectbeheersing','Testmanager','Omgevingsmanager','Portfoliomanager'],\n  CIV: ['Service delivery manager','Keten service delivery manager','Servicemanager','Portfoliomanager','Projectmanager','Tester','DevOps specialist'],\n  VWM: ['Productowner productieplatform','Netwerkdienst trekker OO','IBP coördinator tunnels','IBP coördinator productieplatform','Adviseur tunnels','OTO trainer','OTO coördinator','Teamleider VC','Afdelingshoofd VC','Transitiemanager','Wegverkeersleider','Verkeerskundige','Key user'],\n};\n// blok → dienst (voor rol-selectie)\nfunction nt_blokDienst(blok){ var m={GPO:'GPO',GPO2:'GPO',CIV:'CIV',VWMF:'VWM',VWMO:'VWM'}; return m[blok]||'GPO'; }\n\n// ── Configureerbare projecten: groeperen regels tot een te-budgetteren project ──\n// Elk project verzamelt regel-ids; budget wordt via verdeelsleutel over die\n// regels (fases) en hun looptijd over de jaren verdeeld.\nvar NT_PROJECTEN = {\n  noordtunnel: { naam:'Noordtunnel (GPO)', dienst:'GPO', kleur:'#003082',\n    regels:['g_lc','g_lcm','g_start','g_eng_i','g_eng_v','g_eng_p','g_uvo','g_udo','g_uuo','g_ubf','g_istsi','g_naz'] },\n  zuidasdok:   { naam:'Zuidasdok (GPO)', dienst:'GPO', kleur:'#0a4ea0',\n    regels:['z_lc','z_lcm','z_start','z_eng_i','z_eng_v','z_eng_p','z_uvo','z_udo','z_uuo','z_ubf','z_istsi','z_naz'] },\n  audiobb:     { naam:'Audio Bouwblok 1.2 — ontwikkeling & uitrol (CIV)', dienst:'CIV', kleur:'#5a2d82',\n    regels:['c_ontw','c_real','c_fat','c_comp','c_lcm','c_roll','c_lcm2','c_roll2'] },\n  opleiding:   { naam:'Opleidingen VWM (alle tunnels)', dienst:'VWM', kleur:'#00a050',\n    regels:['o_oto','o_reg','o_trn','o_sit','o_oto2','o_reg2','o_trn2','o_sit2'] },\n  opdracht:    { naam:'VWM Opdracht & financiën', dienst:'VWM', kleur:'#00823c',\n    regels:['f_beh','f_bud','f_opd','f_opd2'] },\n};\n\n// ── Config-state (instelbaar via configuratie-tab) ──\n// Per project: totaalbudget (k€) + verdeelsleutel (gewicht per regel).\n// Per taak (regel-id): array van FTE-toewijzingen {rol, dienst, fte}.\nvar NT_CONFIG = {\n  budget: { noordtunnel:24000, zuidasdok:38000, audiobb:6500, opleiding:3200, opdracht:800 }, // k€\n  verdeel: {},   // projectKey -> { regelId: gewicht }  (leeg = gelijk verdelen)\n  fte: {},       // regelId -> [ {rol, dienst, fte} ]\n};\n\n// Initialiseer verdeelsleutel (gelijk) en FTE-toewijzing (uit bestaande fte/default)\nfunction nt_initConfig(){\n  for(var pk in NT_ g_udo',to:'g_uuo',type:'FS'},\n    {from:'g_uuo',to:'g_ubf',type:'FS'},{from:'g_ubf',to:'g_istsi',type:'FS'},\n    {from:'g_istsi',to:'g_open',type:'FS'},{from:'g_open',to:'g_naz',type:'FS'},\n    {from:'g_lc',to:'g_lcm',type:'FF'},\n    // GPO ZD interne keten\n    {from:'z_start',to:'z_eng_i',type:'FS'},{from:'z_eng_i',to:'z_eng_v',type:'SS'},\n    {from:'z_eng_v',to:'z_eng_p',type:'SS'},{from:'z_eng_p',to:'z_uvo',type:'FS'},\n    {from:'z_uvo',to:'z_udo',type:'FS'},{from:'z_udo',to:'z_uuo',type:'FS'},\n    {from:'z_uuo',to:'z_ubf',type:'FS'},{from:'z_ubf',to:'z_istsi',type:'FS'},\n    {from:'z_istsi',to:'z_open',type:'FS'},{from:'z_open',to:'z_naz',type:'FS'},\n    {from:'z_lc',to:'z_lcm',type:'FF'},\n    // VWM fin NT → CIV\n    {from:'f_beh',to:'f_opd',type:'FS'},{from:'f_bud',to:'f_opd',type:'FF'},\n    {from:'f_opd',to:'c_ontw',type:'FS',cross:true},\n    // CIV ontwikkeling keten (éénmalig)\n    {from:'c_ontw',to:'c_real',type:'FS'},{from:'c_real',to:'c_fat',type:'FS'},\n    {from:'c_fat',to:'c_comp',type:'FS'},\n    // CIV uitrol NT (na compliant)\n    {from:'c_comp',to:'c_lcm',type:'FS'},{from:'c_lcm',to:'c_roll',type:'FS'},\n    {from:'c_roll',to:'g_istsi',type:'FS',cross:true},\n    {from:'c_comp',to:'g_istsi',type:'FS',cross:true},\n    // CIV uitrol ZD (na compliant, eigen opdracht) — zelfde bouwblok, geen 2e ontwikkeling\n    {from:'c_comp',to:'c_lcm2',type:'FS'},{from:'c_lcm2',to:'c_roll2',type:'FS'},\n    {from:'c_roll2',to:'z_istsi',type:'FS',cross:true},\n    {from:'f_opd2',to:'c_lcm2',type:'FS',cross:true},\n    // GPO NT DO → VWM opdracht\n    {from:'g_uvo',to:'f_opd',type:'SS',cross:true},\n    // GPO ZD DO → VWM opdracht ZD\n    {from:'z_uvo',to:'f_opd2',type:'SS',cross:true},\n    // Opleiding NT keten\n    {from:'o_oto',to:'o_reg',type:'FS'},{from:'o_reg',to:'o_trn',type:'FS'},{from:'o_trn',to:'o_sit',type:'FS'},\n    {from:'o_sit',to:'g_open',type:'FF',cross:true},{from:'g_istsi',to:'o_trn',type:'SS',cross:true},\n    // Opleiding ZD keten\n    {from:'o_oto2',to:'o_reg2',type:'FS'},{from:'o_reg2',to:'o_trn2',type:'FS'},{from:'o_trn2',to:'o_sit2',type:'FS'},\n    {from:'o_sit2',to:'z_open',type:'FF',cross:true},{from:'z_istsi',to:'o_trn2',type:'SS',cross:true},\n  ],\n};\n\n\n// ── Tijdas helpers ──\nvar NT_TSTART = 2025.5, NT_TEND = 2031.0;\nfunction nt_tToX(t, x0, w){ return x0 + ((t-NT_TSTART)/(NT_TEND-NT_TSTART))*w; }\nfunction nt_xToT(x, x0, w){ return NT_TSTART + ((x-x0)/w)*(NT_TEND-NT_TSTART); }\nfunction nt_fmtY(t){ var y=Math.floor(t), m=Math.round((t-y)*12)+1, q=Math.ceil(m/3); return 'Q'+q+' '+y; }\nfunction nt_fmtD(t){ var y=Math.floor(t); var mf=(t-y)*12; var m=Math.floor(mf); var mn=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec']; return mn[Math.max(0,Math.min(11,m))]+' '+y; }\n\n// ── Cascade: verschuiving propageert door relaties.\n//    Verlaten (later) duwt opvolgers mee. Vervroegen (eerder) is toegestaan,\n//    maar genereert volgorde-schendingen die als ketenrisico worden gemeld. ──\nvar NT_VIOLATIONS = [];   // volgorde-schendingen door vervroegen\nvar NT_RESCONFLICTS = []; // gedeelde-formatie conflicten (CIV/VWM)\n\nfunction nt_computeCascade(){\n  NT_CASCADE = {};\n  var g = NT_SHIFT/12;\n  for (var i=0;i<NT_MODEL.regels.length;i++){\n    var r=NT_MODEL.regels[i];\n    // per-project shift geldt voor GPO-blokken; werkt via cascade door naar CIV/VWM\n    var proj = (NT_PROJSHIFT[r.blok]||0)/12;\n    NT_CASCADE[r.id] = (NT_MSHIFT[r.id]||0)/12 + g + proj;\n  }\n  // Doorwerking: een voorganger die later valt, duwt zijn opvolgers mee (alleen later).\n  // Vervroegen wordt NIET via de keten teruggetrokken — dat zou de voorganger\n  // dwingen mee te vervroegen. In plaats daarvan detecteren we de schending.\n  var rels=NT_MODEL.relaties, changed=true, guard=0;\n  while(changed && guard<80){\n    changed=false; guard++;\n    for (var k=0;k<rels.length;k++){\n      var rel=rels[k];\n      var ps=NT_CASCADE[rel.from]||0;\n      if (ps>(NT_CASCADE[rel.to]||0)){ NT_CASCADE[rel.to]=ps; changed=true; }\n    }\n  }\n  nt_detectViolations();\n  nt_detectResourceConflicts();\n}\n\n// Volgorde-schending: na (handmatige) verschuiving valt een opvolger vóór wat\n// de relatie toestaat. Treedt vooral op bij vervroegen.\nfunction nt_detectViolations(){\n  NT_VIOLATIONS=[];\n  var rels=NT_MODEL.relaties;\n  for(var k=0;k<rels.length;k++){\n    var rel=rels[k];\n    var pa=nt_regelById(rel.from), sa=nt_regelById(rel.to);\n    if(!pa||!sa) continue;\n    var pe=nt_eff(pa), se=nt_eff(sa);\n    // vereiste: bij FS moet succ.t0 >= pred.t1; FF succ.t1>=pred.t1; SS succ.t0>=pred.t0; SF succ.t1>=pred.t0\n    var need, have, kind;\n    if(rel.type==='FS'){ need=pe.t1; have=se.t0; kind='start na einde voorganger'; }\n    else if(rel.type==='FF'){ need=pe.t1; have=se.t1; kind='einde na einde voorganger'; }\n    else if(rel.type==='SS'){ need=pe.t0; have=se.t0; kind='start na start voorganger'; }\n    else { need=pe.t0; have=se.t1; kind='einde na start voorganger'; }\n    var gap=(have-need)*12; // maanden speling; negatief = schending\n    if(gap < -0.3){ // meer dan ~9 dagen te vroeg\n      NT_VIOLATIONS.push({from:rel.from,to:rel.to,type:rel.type,cross:rel.cross?1:0,\n        maanden:Math.round(-gap), kind:kind,\n        predLabel:pa.label.replace(/^\\s+/,''), succLabel:sa.label.replace(/^\\s+/,'')});\n    }\n  }\n}\n\n// Gedeelde-formatie conflict: taken met dezelfde 'res' (CIV_uitrol / VWM_opl)\n// die in de tijd overlappen → één team, twee tunnels tegelijk = capaciteitsconflict.\n// GPO heeft geen 'res' → nooit conflict (eigen capaciteit per project).\nfunction nt_detectResourceConflicts(){\n  NT_RESCONFLICTS=[];\n  var byRes={};\n  for(var i=0;i<NT_MODEL.regels.length;i++){\n    var r=NT_MODEL.regels[i];\n    if(!r.res) continue;\n    var e=nt_eff(r);\n    if(!byRes[r.res]) byRes[r.res]=[];\n    byRes[r.res].push({id:r.id, t0:e.t0, t1:e.t1, tunnel:r.tunnel, label:r.label.replace(/^\\s+/,'')});\n  }\n  for(var res in byRes){\n    var items=byRes[res];\n    for(var a=0;a<items.length;a++) for(var b=a+1;b<items.length;b++){\n      var A=items[a], B=items[b];\n      if(A.tunnel===B.tunnel) continue; // zelfde tunnel = geen onderling conflict\n      var ov0=Math.max(A.t0,B.t0), ov1=Math.min(A.t1,B.t1);\n      if(ov1>ov0+0.02){ // echte overlap (>~1 week)\n        NT_RESCONFLICTS.push({res:res, a:A, b:B, ov0:ov0, ov1:ov1,\n          maanden:Math.round((ov1-ov0)*12)});\n      }\n    }\n  }\n}\n\n// ── Geconfigureerde FTE per taak: som van alle rol-toewijzingen ──\nfunction nt_taakFte(r){\n  var cfg=NT_CONFIG.fte[r.id];\n  if(cfg && cfg.length){\n    var s=0; for(var i=0;i<cfg.length;i++) s+=(parseFloat(cfg[i].fte)||0);\n    return s;\n  }\n  return (r.fte!==undefined)?r.fte:NT_DEFAULT_FTE[r.blok];\n}\n\n// ── Budgetverdeling: totaalbudget → per fase (verdeelsleutel) → per jaar (looptijd) ──\n// Geeft { perRegel:{id:bedrag}, perJaar:{jaar:bedrag}, perRegelJaar:{id:{jaar:bedrag}} }\nfunction nt_budgetVerdeling(projKey){\n  var proj=NT_PROJECTEN[projKey]; if(!proj) return null;\n  var totaal=NT_CONFIG.budget[projKey]||0;\n  var sleutel=NT_CONFIG.verdeel[projKey]||{};\n  // som van gewichten\n  var som=0; for(var i=0;i<proj.regels.length;i++){ som+=(parseFloat(sleutel[proj.regels[i]])||0); }\n  if(som<=0) som=proj.regels.length; // fallback gelijk\n  var perRegel={}, perJaar={}, perRegelJaar={};\n  for(var j=0;j<proj.regels.length;j++){\n    var rid=proj.regels[j];\n    var r=nt_regelById(rid); if(!r) continue;\n    var gew=parseFloat(sleutel[rid]); if(!(gew>0)) gew=(som===proj.regels.length?1:0);\n    var bedrag=totaal*(gew/som);\n    perRegel[rid]=bedrag;\n    // verdeel bedrag over jaren naar rato van looptijd-overlap\n    var e=nt_eff(r);\n    var dur=Math.max(e.t1-e.t0, 0.01);\n    perRegelJaar[rid]={};\n    for(var y=2025;y<=2032;y++){\n      var ov=Math.max(0, Math.min(e.t1,y+1)-Math.max(e.t0,y));\n      if(ov>0){\n        var deel=bedrag*(ov/dur);\n        perRegelJaar[rid][y]=deel;\n        perJaar[y]=(perJaar[y]||0)+deel;\n      }\n    }\n  }\n  return {totaal:totaal, perRegel:perRegel, perJaar:perJaar, perRegelJaar:perRegelJaar};\n}\n\nfunction nt_eff(r){ // effectieve t0/t1 incl cascade\n  var s=NT_CASCADE[r.id]||0;\n  return {t0:r.t0+s, t1:r.t1+s, ms:(r.ms||[]).map(function(m){return {t:m.t+s,lbl:m.lbl,tip:m.tip};})};\n}\n\n// ── FTE-boeggolf: sommeer FTE-belasting per dienst over de tijd ──\n// Voor gedeelde-resource taken (CIV_uitrol/VWM_opl) telt PER TUNNEL de piek-FTE\n// (niet de som van opeenvolgende fasen) — binnen één tunnel werkt het team\n// sequentieel. De boeggolf ontstaat als TWEE tunnels tegelijk capaciteit vragen.\nfunction nt_computeBowWave(){\n  var t0=2025.5, t1=2031.5, step=1/12;\n  var buckets=[];\n  for(var t=t0;t<=t1+0.001;t+=step) buckets.push({t:t, GPO:0, CIV:0, VWM:0});\n  function blokDienst(blok){ var m={GPO:'GPO',GPO2:'GPO',CIV:'CIV',VWMF:'VWM',VWMO:'VWM'}; return m[blok]; }\n\n  for(var b=0;b<buckets.length;b++){\n    var bt=buckets[b].t;\n    // niet-gedeelde taken: gewoon optellen\n    var sum={GPO:0,CIV:0,VWM:0};\n    // gedeelde resources: verzamel per tunnel de actieve FTE, neem max binnen tunnel, som over tunnels\n    var shared={}; // resKey -> { tunnel -> maxFte }\n    for(var i=0;i<NT_MODEL.regels.length;i++){\n      var r=NT_MODEL.regels[i];\n      if(r.kind==='mile') continue;\n      var e=nt_eff(r);\n      if(!(bt>=e.t0-0.001 && bt<e.t1-0.001)) continue;\n      var dienst=blokDienst(r.blok);\n      var fte=nt_taakFte(r);\n      if(r.res){\n        // gedeelde resource: groepeer per tunnel\n        if(!shared[r.res]) shared[r.res]={};\n        var tun=r.tunnel||'?';\n        shared[r.res][tun]=Math.max(shared[r.res][tun]||0, fte);\n      } else {\n        sum[dienst]+=fte;\n      }\n    }\n    // tel gedeelde resources op: som van per-tunnel-pieken (overlap = optellen = boeggolf)\n    for(var resK in shared){\n      var perTun=shared[resK];\n      var dienst2 = resK.indexOf('CIV')===0 ? 'CIV' : 'VWM';\n      for(var tun2 in perTun) sum[dienst2]+=perTun[tun2];\n    }\n    buckets[b].GPO=sum.GPO; buckets[b].CIV=sum.CIV; buckets[b].VWM=sum.VWM;\n  }\n  return buckets;\n}\n\n// Boeggolf-statistiek per dienst: piek, overschrijding, conflictperiodes\n// GPO: capaciteit schaalt mee met aantal actieve projecten (eigen capaciteit per\n// project → geen onderling conflict). CIV/VWM: vaste pool → boeggolf bij overlap.\nfunction nt_bowWaveStats(){\n  var bw=nt_computeBowWave();\n  var stats={};\n  ['GPO','CIV','VWM'].forEach(function(d){\n    var baseCap=NT_DIENST_CAP[d].cap;\n    var peak=0, overMonths=0, peakT=null;\n    for(var i=0;i<bw.length;i++){\n      var v=bw[i][d];\n      // GPO: effectieve capaciteit = baseCap zolang ≤1 project loopt, ×aantal projecten anders.\n      // Vereenvoudigd: GPO overbelast nooit (eigen capaciteit), dus cap volgt vraag.\n      var effCap = (d==='GPO') ? Math.max(baseCap, v) : baseCap;\n      if(v>peak){ peak=v; peakT=bw[i].t; }\n      if(d!=='GPO' && v>baseCap+0.01) overMonths++;\n    }\n    stats[d]={cap:baseCap, peak:peak, overMonths:overMonths, peakT:peakT,\n              util: baseCap>0?Math.round(peak/baseCap*100):0,\n              schaalt:(d==='GPO')};\n  });\n  return {buckets:bw, stats:stats};\n}\n\nfunction nt_regelById(id){ for(var i=0;i<NT_MODEL.regels.length;i++) if(NT_MODEL.regels[i].id===id) return NT_MODEL.regels[i]; return null; }\n// is een regel betrokken bij een actief resource-conflict?\nfunction nt_inResConflict(id){\n  for(var i=0;i<NT_RESCONFLICTS.length;i++){\n    if(NT_RESCONFLICTS[i].a.id===id||NT_RESCONFLICTS[i].b.id===id) return true;\n  }\n  return false;\n}\n\nfunction renderNT(){\n  var canvas=document.getElementById('ntCanvas');\n  if(!canvas) return;\n  NT_SHOWREL = document.getElementById('nt-rel') ? document.getElementById('nt-rel').checked : true;\n  nt_computeCascade();\n\n  var LBL=250, RH=22, HH=30, BH=24, dpr=window.devicePixelRatio||1;\n  // bouw geordende rijenlijst: per blok een kop + regels\n  var ordered=[];\n  for (var b=0;b<NT_MODEL.blokken.length;b++){\n    var blok=NT_MODEL.blokken[b];\n    ordered.push({type:'blok',blok:blok});\n    var regels=NT_MODEL.regels.filter(function(r){return r.blok===blok.id;});\n    for(var r=0;r<regels.length;r++) ordered.push({type:'regel',regel:regels[r]});\n  }\n\n  var nBlok=NT_MODEL.blokken.length, nReg=NT_MODEL.regels.length;\n  var cW=Math.max(1080, canvas.parentElement.clientWidth-4);\n  var STRIP_H=34, nStrips=2; // CIV_uitrol + VWM_opl capaciteitsstroken\n  var cH=HH + nBlok*BH + nReg*RH + 12 + nStrips*STRIP_H + 8;\n  var plotW=cW-LBL-16;\n\n  canvas.width=cW*dpr; canvas.height=cH*dpr;\n  canvas.style.width=cW+'px'; canvas.style.height=cH+'px';\n  var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);\n\n  function X(t){ return nt_tToX(t, LBL, plotW); }\n\n  // achtergrond\n  ctx.fillStyle='#f8f9fc'; ctx.fillRect(0,0,cW,cH);\n\n  // header jaartallen + kwartalen\n  ctx.fillStyle='#001f57'; ctx.fillRect(0,0,cW,HH);\n  ctx.fillStyle='#5a7aaa'; ctx.font='bold 10px Segoe UI,Arial';\n  ctx.fillText('Blok / activiteit  (sleep een balk →)',6,HH-10);\n  for (var y=2026; y<=2030; y++){\n    var x=X(y), xN=X(y+1);\n    ctx.fillStyle=(y%2===0)?'#002060':'#001f57'; ctx.fillRect(x,0,xN-x,HH);\n    ctx.fillStyle='#F9B000'; ctx.font='bold 10px Segoe UI,Arial'; ctx.textAlign='center';\n    ctx.fillText(String(y),(x+xN)/2,HH-10); ctx.textAlign='left';\n    for(var q=1;q<=3;q++){ var xq=X(y+q*0.25);\n      ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font='7px Segoe UI,Arial';\n      ctx.fillText('Q'+(q+1),xq+2,HH-11);\n    }\n    ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=0.5;\n    ctx.beginPath();ctx.moveTo(x,HH);ctx.lineTo(x,cH);ctx.stroke();\n  }\n  // kwartaal-gridlijnen\n  for(var y2=2026;y2<=2030;y2++) for(var q2=1;q2<=3;q2++){\n    var xq2=X(y2+q2*0.25);\n    ctx.strokeStyle='#eef0f5'; ctx.lineWidth=0.4;\n    ctx.beginPath();ctx.moveTo(xq2,HH);ctx.lineTo(xq2,cH);ctx.stroke();\n  }\n\n  // T=0 verticale lijn (openstelling, schuift mee)\n  var t0line = NT_T0 + (NT_CASCADE['g_open']||0);\n  var x0=X(t0line);\n  ctx.strokeStyle='#c05000'; ctx.lineWidth=2; ctx.setLineDash([5,3]);\n  ctx.beginPath();ctx.moveTo(x0,HH);ctx.lineTo(x0,cH);ctx.stroke(); ctx.setLineDash([]);\n  ctx.fillStyle='#c05000'; ctx.font='bold 9px Segoe UI,Arial'; ctx.textAlign='center';\n  ctx.fillText('T=0 openstelling',x0,HH+10); ctx.textAlign='left';\n\n  // teken rijen + bewaar posities\n  var rowY={}; var layout=[]; var yy=HH;\n  for (var i2=0;i2<ordered.length;i2++){\n    var row=ordered[i2];\n    if(row.type==='blok'){\n      var bl=row.blok;\n      var grad=ctx.createLinearGradient(0,yy,cW,yy);\n      grad.addColorStop(0,bl.kleur); grad.addColorStop(1,nt_darken(bl.kleur));\n      ctx.fillStyle=grad; ctx.fillRect(0,yy,cW,BH);\n      ctx.fillStyle='#F9B000'; ctx.fillRect(0,yy,4,BH);\n      ctx.fillStyle='#fff'; ctx.font='bold 12px Segoe UI,Arial';\n      ctx.fillText(bl.naam,10,yy+12);\n      ctx.fillStyle='rgba(255,255,255,0.82)'; ctx.font='8px Segoe UI,Arial';\n      ctx.fillText(bl.sub,10,yy+21);\n      yy+=BH;\n    } else {\n      var rg=row.regel; var e=nt_eff(rg); var cy=yy+RH/2; rowY[rg.id]=cy;\n      var bl2=NT_MODEL.blokken.filter(function(x){return x.id===rg.blok;})[0];\n      var shifted=(NT_CASCADE[rg.id]||0)!==0;\n      var manual=(NT_MSHIFT[rg.id]||0)!==0;\n      var resConf=nt_inResConflict(rg.id);\n\n      // rij-bg\n      ctx.fillStyle=(i2%2===0)?'#ffffff':'#f4f6fb'; ctx.fillRect(LBL,yy,cW-LBL,RH);\n      // label\n      ctx.fillStyle= resConf ? '#fde8ea' : (shifted ? (manual?'#fff0e0':'#fffbe6') : '#f0f2f5'); ctx.fillRect(0,yy,LBL,RH);\n      ctx.fillStyle=bl2.kleur; ctx.fillRect(0,yy,3,RH);\n      ctx.strokeStyle='#e6e9f0'; ctx.lineWidth=0.3; ctx.strokeRect(0,yy,LBL,RH);\n      ctx.fillStyle='#2a3445'; ctx.font=(rg.crit?'bold ':'')+'10px Segoe UI,Arial';\n      var lbl=rg.label.length>40?rg.label.substring(0,40)+'…':rg.label;\n      ctx.fillText(lbl,8,yy+14);\n      // resource-badge (gedeeld team)\n      if(rg.res){\n        var rc=NT_RESOURCES[rg.res];\n        ctx.fillStyle=resConf?'#c0121f':rc.kleur; ctx.font='bold 7px Segoe UI,Arial'; ctx.textAlign='right';\n        ctx.fillText(resConf?'⚠ gedeeld':'gedeeld',LBL-4,yy+20); ctx.textAlign='left';\n      }\n      if(shifted){ ctx.fillStyle=manual?'#c05000':'#e06b00'; ctx.font='bold 8px Segoe UI,Arial'; ctx.textAlign='right';\n        ctx.fillText((NT_CASCADE[rg.id]>0?'+':'')+Math.round((NT_CASCADE[rg.id])*12)+'m',LBL-4,yy+11); ctx.textAlign='left'; }\n\n      // balk of mijlpaal\n      var bx, bx2;\n      if(rg.kind==='mile'){\n        var mx=X(e.t0); bx=mx; bx2=mx;\n        if(shifted){ var omx=X(rg.t0); ctx.save();ctx.translate(omx,cy);ctx.rotate(Math.PI/4);\n          ctx.strokeStyle='rgba(150,150,150,0.5)';ctx.lineWidth=1;ctx.strokeRect(-6,-6,12,12);ctx.restore(); }\n        ctx.save();ctx.translate(mx,cy);ctx.rotate(Math.PI/4);\n        ctx.fillStyle=rg.crit?'#c0121f':'#F9B000'; ctx.fillRect(-6,-6,12,12);\n        ctx.strokeStyle='#8a3000';ctx.lineWidth=1;ctx.strokeRect(-6,-6,12,12); ctx.restore();\n      } else {\n        bx=X(e.t0); bx2=X(e.t1); var bw=Math.max(bx2-bx,3);\n        if(shifted){ var ob=X(rg.t0),ob2=X(rg.t1);\n          ctx.fillStyle='rgba(150,150,150,0.16)'; ctx.fillRect(ob,cy-6,Math.max(ob2-ob,3),12); }\n        var col = resConf?'#c0121f':(manual?'#c05000':(shifted?'#e06b00':bl2.kleur));\n        if(rg.crit && !shifted && !resConf) col=nt_lighten(bl2.kleur,-10);\n        ctx.fillStyle=col; ctx.fillRect(bx,cy-6,bw,12);\n        if(resConf){ ctx.strokeStyle='#c0121f'; ctx.lineWidth=2; ctx.strokeRect(bx,cy-6,bw,12);\n          // diagonale arcering bij conflict\n          ctx.save(); ctx.beginPath(); ctx.rect(bx,cy-6,bw,12); ctx.clip();\n          ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1;\n          for(var hx=bx-12;hx<bx2+12;hx+=6){ ctx.beginPath();ctx.moveTo(hx,cy+6);ctx.lineTo(hx+12,cy-6);ctx.stroke(); }\n          ctx.restore();\n        }\n        else if(rg.crit){ ctx.strokeStyle='#c0121f'; ctx.lineWidth=1.5; ctx.strokeRect(bx,cy-6,bw,12); }\n        else { ctx.strokeStyle='rgba(0,0,0,0.14)'; ctx.lineWidth=0.5; ctx.strokeRect(bx,cy-6,bw,12); }\n        // label in balk indien breed genoeg\n        if(bw>52){ ctx.fillStyle='#fff'; ctx.font='8px Segoe UI,Arial';\n          var inl=rg.label.replace(/^\\s+/,''); if(inl.length>Math.floor(bw/6)) inl=inl.substring(0,Math.floor(bw/6))+'…';\n          ctx.fillText(inl,bx+4,cy+3); }\n      }\n      // mijlpaal-markers op de regel\n      for(var m=0;m<e.ms.length;m++){\n        var mm=e.ms[m]; var mmx=X(mm.t);\n        ctx.save();ctx.translate(mmx,cy);ctx.rotate(Math.PI/4);\n        ctx.fillStyle='#F9B000';ctx.fillRect(-4,-4,8,8);\n        ctx.strokeStyle='#8a6d00';ctx.lineWidth=0.8;ctx.strokeRect(-4,-4,8,8);ctx.restore();\n        ctx.fillStyle='#6a5500'; ctx.font='7px Segoe UI,Arial';\n        ctx.fillText(mm.lbl,mmx+6,cy-5);\n      }\n      layout.push({id:rg.id,cy:cy,bx:bx,bx2:bx2,mile:rg.kind==='mile',regel:rg,e:e,y0:yy,y1:yy+RH});\n      yy+=RH;\n    }\n  }\n\n  // relaties tekenen\n  NT_LINELAYOUT=[];\n  if(NT_SHOWREL){\n    for(var ri=0;ri<NT_MODEL.relaties.length;ri++){\n      var rel=NT_MODEL.relaties[ri];\n      var pa=nt_regelById(rel.from), sa=nt_regelById(rel.to);\n      if(!pa||!sa) continue;\n      var pe=nt_eff(pa), se=nt_eff(sa);\n      var py=rowY[rel.from], sy=rowY[rel.to];\n      if(py===undefined||sy===undefined) continue;\n      var px=(rel.type==='FS'||rel.type==='FF')?X(pe.t1):X(pe.t0);\n      var sx=(rel.type==='FS'||rel.type==='SS')?X(se.t0):X(se.t1);\n      var active=((NT_CASCADE[rel.from]||0)!==0);\n      var col = active?'#c0121f':(rel.cross?'#F9B000':'rgba(120,135,170,0.4)');\n      ctx.strokeStyle=col; ctx.lineWidth=active?1.8:(rel.cross?1.4:0.7);\n      var midX=px+6;\n      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(midX,py);ctx.lineTo(midX,sy);ctx.lineTo(sx,sy);ctx.stroke();\n      ctx.fillStyle=col;\n      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-4,sy-2.5);ctx.l
