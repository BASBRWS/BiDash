/* standalone capaciteitskaart uit de P6-export (zonder tool-model): totale
   FTE-vraag over de tijd + per rol, met koppelstatus. Zo is de capaciteit uit
   het bestand direct zichtbaar, ook v\u00f3\u00f3r de planning in de tool staat. */
function p6StandaloneKaartHTML(opts){
  const knoppen=!opts||opts.knoppen!==false;
  const c=DB.p6Capaciteit,kws=p6StandaloneKwartalen(c);
  let chart='<div class="empty">Geen datums in de export om de capaciteit over de tijd te tonen.</div>';
  if(kws.length){
    const W=Math.max(700,kws.length*30+120),x0=46,plotW=W-x0-14,bw=Math.max(8,plotW/kws.length-6);
    const maxT=Math.max(...kws.map(k=>k.tot),1)*1.12,yv=v=>160-v/maxT*140;
    let svg=`<svg width="${W}" height="200" font-family="Segoe UI,Arial,sans-serif">`;
    for(let g=0;g<=4;g++){const v=maxT*g/4;svg+=`<line x1="${x0}" y1="${yv(v)}" x2="${W-10}" y2="${yv(v)}" stroke="#e8ecf2"/><text x="${x0-6}" y="${yv(v)+3.5}" text-anchor="end" font-size="9" fill="#5a6478" font-family="Consolas">${v.toFixed(0)}</text>`;}
    kws.forEach((k,i)=>{const x=x0+i*(plotW/kws.length)+3;
      svg+=`<rect x="${x}" y="${yv(k.tot)}" width="${bw}" height="${160-yv(k.tot)}" fill="#0050a0" opacity=".9"><title>${k.label}: ${fmtF(k.tot)} fte</title></rect>`;
      if(k.q===1)svg+=`<text x="${x+bw/2}" y="174" text-anchor="middle" font-size="8.5" fill="#5a6478">${k.label}</text>`;});
    svg+='</svg>';chart=`<div style="overflow-x:auto">${svg}</div>`;
  }
  const projRows=Object.entries(c.perProject||{}).sort((a,b)=>b[1].fte-a[1].fte).map(([naam,p])=>
    `<tr><td><b>${esc(naam)}</b>${p.pad&&p.pad.length?`<br><span style="font-size:11px;color:var(--sub)">${esc(p.pad.join(' \u203a '))}</span>`:''}</td><td>${p.vc?`<span class="tag gy">${esc(p.vc)}</span>`:'\u2014'}</td><td class="num">${p.nAct}</td><td class="num" style="font-weight:700">${fmtF(p.fte)}</td></tr>`).join('');
  const rolRows=Object.entries(c.perRol||{}).sort((a,b)=>b[1]-a[1]).map(([r,v])=>`<tr><td>${esc(r)}</td><td class="num">${fmtF(v)}</td></tr>`).join('');
  return `<div class="card" style="margin-bottom:0"><h3>Capaciteitsvraag uit de planning <span class="hint">bron: P6-export (${esc(c.bestand)})</span></h3>
    ${knoppen?p6CapBlok():''}
    <div class="footnote" style="color:var(--oranje);margin-top:0">Nog niet gekoppeld aan de planningstool. Laad ${knoppen?'hierboven ':''}dezelfde Primavera-export in de planningstool (pagina Integrale planning) voor de uitsplitsing per dienst en toetsing aan de capaciteitsgrenzen. De capaciteit per project en over de tijd staat hieronder.</div>
    <div class="p6-stats"><span>totaal <b>${fmtF(c.totFte)}</b> fte over <b>${c.nActiviteiten}</b> activiteiten</span><span><b>${c.nAssign}</b> toewijzingen \u00b7 <b>${c.rollen.length}</b> rollen</span></div>
    <h3 style="font-size:12px;margin:12px 0 6px">Capaciteit per project <span style="font-weight:400;text-transform:none;color:var(--sub)">(uit de WBS van de export)</span></h3>
    <table style="max-width:640px"><thead><tr><th>Project (WBS)</th><th>Verkeerscentrale</th><th class="num">Activiteiten</th><th class="num">FTE</th></tr></thead><tbody>${projRows}</tbody></table>
    ${chart}
    <table style="margin-top:10px;max-width:420px"><thead><tr><th>Rol (resource)</th><th class="num">FTE</th></tr></thead><tbody>${rolRows}</tbody></table>
    <div class="footnote">Capaciteit rechtstreeks uit de resource-toewijzingen van de Primavera-export (PlannedUnitsPerTime per activiteit), toegewezen aan het project via de WBS-hi\u00ebrarchie.</div></div>`;
}

/* de volledige capaciteitskaart als HTML-string, herbruikbaar op de planning- en
   databronnenpagina. Gekoppeld (per dienst) als de planning in de tool staat,
   anders standalone uit de P6-export. */
function capaciteitKaartHTML(opts){
  opts=opts||{};const knoppen=opts.knoppen!==false;
  const m=bridgeModel();
  const cap=m?bridgeCapaciteit():null;
  if(!(cap&&cap.geconfig)){
    if(DB.p6Capaciteit)return p6StandaloneKaartHTML(opts);
    if(!m)return '';
    return `<div class="card" style="margin-bottom:0"><h3>Capaciteitsvraag uit de planning</h3>
      ${knoppen?p6CapBlok():''}
      <div class="empty">De geladen planning bevat nog geen FTE-toewijzingen (${cap?cap.nTaken:0} taken, 0 met FTE-rollen).<br><br>
      Houd de capaciteit aan uit je <b>Primavera-export</b>${knoppen?' met de knop hierboven':' (pagina Integrale planning)'} (resource-toewijzingen → FTE per activiteit), óf gebruik de FTE-configuratie van de planningstool zelf.</div></div>`;
  }
  const kleuren=DIENST_KLEUR,kws=cap.kwartalen;
  const W=Math.max(700,kws.length*34+120),Hh=210,x0=46,plotW=W-x0-14,bw=Math.max(10,plotW/Math.max(1,kws.length)-6);
  const maxTot=Math.max(...kws.map(k=>k.tot),...Object.values(cap.perDienst).map(i=>i.grens||0),1)*1.12;
  const yv=v=>170-v/maxTot*150;
  let svg=`<svg width="${W}" height="${Hh}" font-family="Segoe UI,Arial,sans-serif">`;
  for(let g=0;g<=4;g++){const v=maxTot*g/4;svg+=`<line x1="${x0}" y1="${yv(v)}" x2="${W-10}" y2="${yv(v)}" stroke="#e8ecf2"/><text x="${x0-6}" y="${yv(v)+3.5}" text-anchor="end" font-size="9" fill="#5a6478" font-family="Consolas">${v.toFixed(0)}</text>`}
  kws.forEach((k,i)=>{
    const x=x0+i*(plotW/kws.length)+3;let y=170;
    cap.diensten.forEach(d=>{const v=k.per[d]||0;if(v<=0)return;const hh=v/maxTot*150;y-=hh;
      svg+=`<rect x="${x}" y="${y}" width="${bw}" height="${hh}" fill="${kleuren[d]||'#5a6478'}" opacity=".9"><title>${k.label} · ${d}: ${fmtF(v)} fte</title></rect>`});
    if(k.q===1)svg+=`<text x="${x+bw/2}" y="184" text-anchor="middle" font-size="8.5" fill="#5a6478">${k.label}</text>`;
  });
  cap.diensten.forEach(d=>{const g=cap.perDienst[d].grens;if(!g)return;
    svg+=`<line x1="${x0}" y1="${yv(g)}" x2="${W-10}" y2="${yv(g)}" stroke="${kleuren[d]}" stroke-width="1.2" stroke-dasharray="5 3" opacity=".7"/><text x="${W-12}" y="${yv(g)-3}" text-anchor="end" font-size="8.5" fill="${kleuren[d]}" font-weight="700">grens ${d} (${g})</text>`});
  svg+='</svg>';
  const rijen=cap.diensten.map(d=>{const i=cap.perDienst[d];
    const status=i.grens>0?(i.piek>i.grens?(i.piek-i.grens>=2?'<span class="tag r">Overschrijding</span>':'<span class="tag o">Boven grens</span>'):'<span class="tag g">Binnen grens</span>'):'<span class="tag gy">Geen grens</span>';
    return `<tr><td>${dienstChip(d)}</td><td class="num">${fmtF(i.piek)}</td><td>${esc(i.piekKw)}</td><td class="num">${i.grens||'—'}</td><td class="num">${i.overKw||0}</td><td>${status}</td></tr>`}).join('');
  const bron=DB.p6Capaciteit?'P6-export ('+esc(DB.p6Capaciteit.bestand)+')':'FTE-config van de planningstool';
  return `<div class="card" style="margin-bottom:0"><h3>Capaciteitsvraag uit de planning <span class="hint">bron: ${bron} · grenzen instelbaar in de rule engine · telt door in triggers en Monte Carlo</span></h3>
    ${knoppen?p6CapBlok():''}
    <div class="p6-stats"><span><b>${cap.nMetFte}</b> van <b>${cap.nTaken}</b> taken met FTE</span><span>cumulatief <b>${fmtF(cap.totFte)}</b> fte-toewijzing</span></div>
    <div style="overflow-x:auto">${svg}</div>
    <table style="margin-top:10px;max-width:640px"><thead><tr><th>Dienst</th><th class="num">Piek FTE</th><th>Kwartaal</th><th class="num">Grens</th><th class="num">Kw &gt; grens</th><th>Status</th></tr></thead><tbody>${rijen}</tbody></table>
    ${p6ProjectTabelHTML()}</div>`;
}

/* ─────────────── SIMULATIE ─────────────── */
let mcResult=null;
function renderSim(){
  const p=SIM||basisParams();
  const sliders=[
    {k:'verzuim',lbl:'Ziekteverzuim %',sub:'basis '+fmtF(+cfg('personeel.ziekteverzuim',5))+'% uit config.html',min:0,max:15,step:0.5,fmt:v=>fmtF(v)+'%'},
    {k:'ftePct',lbl:'Formatie \u0394%',sub:'meer of minder inzetbare fte',min:-20,max:20,step:1,fmt:v=>(v>0?'+':'')+v+'%'},
    {k:'kostenIndex',lbl:'Kostenindex',sub:'prijsstijging onderhoud & inhuur',min:0.9,max:1.3,step:0.01,fmt:v=>'\u00d7'+fmtF(v,2)},
    {k:'budgetPct',lbl:'Budget \u0394%',sub:'taakstelling of extra middelen',min:-25,max:25,step:1,fmt:v=>(v>0?'+':'')+v+'%'},
    {k:'storingsFactor',lbl:'Storingsfactor',sub:'toename asset-uitval (veroudering, cyber)',min:0.5,max:3,step:0.1,fmt:v=>'\u00d7'+fmtF(v)}
  ];
  const baseT=evalTriggers(basisParams()),simT=evalTriggers(p);
  const cnt=(T,s)=>T.filter(t=>t.sev===s).length;

  $('#page-sim').innerHTML=`
    <div class="pagehead"><h2>Simulatie</h2><div class="desc">Maak de gevolgen van alle parameters inzichtelijk: pas ze aan, zie de triggers verschuiven en prognosticeer risico\u2019s met Monte Carlo.</div>
    <div class="actions"><button class="btn" onclick="simUitConfig()">\u2b07 Config-scenario overnemen (sim.*)</button><button class="btn" onclick="resetSim()">\u21ba Terug naar basis</button></div></div>
    <div class="grid2">
      <div class="card"><h3>Parameters <span class="hint">wijzigingen gelden direct in de hele driehoek</span></h3>
        ${sliders.map(s=>`<div class="slider-row"><label>${s.lbl}<small>${s.sub}</small></label>
          <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${p[s.k]}" oninput="setSim('${s.k}',+this.value)">
          <div class="sval" id="sv-${s.k}">${s.fmt(p[s.k])}</div></div>`).join('')}
        <div style="margin-top:14px;display:flex;gap:10px;align-items:center">
          <select id="mcN" style="width:150px"><option value="2000">2.000 runs</option><option value="10000" selected>10.000 runs</option><option value="50000">50.000 runs</option></select>
          <button class="btn primary" onclick="doMC()">\u25b6 Monte Carlo prognose</button></div>
      </div>
      <div class="card"><h3>Effect op triggers <span class="hint">basis vs simulatie</span></h3>
        <table><thead><tr><th></th><th class="num">Basis</th><th class="num">Simulatie</th><th class="num">\u0394</th></tr></thead><tbody>
          ${[['Kritiek','r'],['Aandacht','o']].map(([l,s])=>{const b=cnt(baseT,s),v=cnt(simT,s);return `<tr><td>${sevTag(s)} ${l}</td><td class="num">${b}</td><td class="num" style="font-weight:700">${v}</td><td class="num" style="color:${v>b?'var(--rood)':v<b?'var(--groen)':'var(--sub)'}">${v-b>0?'+':''}${v-b}</td></tr>`}).join('')}
        </tbody></table>
        <div id="mcout" style="margin-top:14px">${mcResult?mcHTML(mcResult):'<div class="empty">Nog geen prognose gedraaid. Stel parameters in en start de Monte Carlo.</div>'}</div>
      </div>
    </div>`;
  if(mcResult)drawHist(mcResult);
}
function setSim(k,v){
  if(!SIM)SIM=basisParams();
  SIM[k]=v;
  $('#simbadge').classList.add('on');
  const fmts={verzuim:x=>fmtF(x)+'%',ftePct:x=>(x>0?'+':'')+x+'%',kostenIndex:x=>'\u00d7'+fmtF(x,2),budgetPct:x=>(x>0?'+':'')+x+'%',storingsFactor:x=>'\u00d7'+fmtF(x)};
  $('#sv-'+k).textContent=fmts[k](v);
  clearTimeout(setSim._t);setSim._t=setTimeout(()=>renderSim(),350);
}
function doMC(){
  const n=+$('#mcN').value;
  mcResult=runMC(n,activeParams());mcResult.n=n;
  renderSim();
}
function mcHTML(m){
  return `<div class="mc-stats" style="grid-template-columns:repeat(3,1fr)">
    <div class="mc-stat"><div class="v" style="color:${m.pFte>0.5?'var(--rood)':m.pFte>0.2?'var(--oranje)':'var(--groen)'}">${Math.round(m.pFte*100)}%</div><div class="l">Kans FTE-tekort</div></div>
    <div class="mc-stat"><div class="v" style="color:${m.pBud>0.5?'var(--rood)':m.pBud>0.2?'var(--oranje)':'var(--groen)'}">${Math.round(m.pBud*100)}%</div><div class="l">Kans budgetoverschrijding</div></div>
    <div class="mc-stat"><div class="v" style="color:${m.pAsset>0.5?'var(--rood)':m.pAsset>0.2?'var(--oranje)':'var(--groen)'}">${Math.round(m.pAsset*100)}%</div><div class="l">Kans asset extra onder norm</div></div></div>
  <table style="margin-bottom:10px"><thead><tr><th></th><th class="num">P10</th><th class="num">P50</th><th class="num">P90</th></tr></thead><tbody>
    <tr><td>FTE-gat (fte)</td><td class="num">${fmtF(m.q(m.fteGaps,.1))}</td><td class="num">${fmtF(m.q(m.fteGaps,.5))}</td><td class="num" style="font-weight:700;color:var(--rood)">${fmtF(m.q(m.fteGaps,.9))}</td></tr>
    <tr><td>Budgetgat incl. boete (\u20ac)</td><td class="num">${fmtE(m.q(m.budGaps,.1))}</td><td class="num">${fmtE(m.q(m.budGaps,.5))}</td><td class="num" style="font-weight:700;color:var(--rood)">${fmtE(m.q(m.budGaps,.9))}</td></tr>
    <tr><td>Contractboete (\u20ac)</td><td class="num">${fmtE(m.q(m.boetes,.1))}</td><td class="num">${fmtE(m.q(m.boetes,.5))}</td><td class="num" style="font-weight:700;color:var(--rood)">${fmtE(m.q(m.boetes,.9))}</td></tr>
  </tbody></table>
  <div style="font-size:11px;color:var(--sub);margin-bottom:4px">Verdeling samengestelde risicoscore \u00b7 ${m.n.toLocaleString('nl-NL')} runs \u00b7 MTTR en contracteis uit config.html</div>
  <canvas class="chart" id="histc" width="600" height="150"></canvas>`;
}
function drawHist(m){
  const c=$('#histc');if(!c)return;const ctx=c.getContext('2d');
  const B=36,min=m.scores[0],max=m.scores[m.scores.length-1]||1,bins=new Array(B).fill(0);
  m.scores.forEach(s=>{bins[Math.min(B-1,Math.floor((s-min)/(max-min||1)*B))]++});
  const mx=Math.max(...bins);
  ctx.clearRect(0,0,600,150);
  const p50=m.q(m.scores,.5),p90=m.q(m.scores,.9);
  bins.forEach((b,i)=>{
    const x=i/B*590+5,h=b/mx*120,binVal=min+(i+0.5)/B*(max-min);
    ctx.fillStyle=binVal>=p90?'#c0121f':binVal>=p50?'#e06b00':'#0050a0';
    ctx.fillRect(x,140-h,590/B-2,h);
  });
  ctx.fillStyle='#5a6478';ctx.font='10px Consolas';
  ctx.fillText('laag risico',8,149);ctx.textAlign='right';ctx.fillText('hoog risico \u2192',595,149);ctx.textAlign='left';
}

/* ─────────────── NAV & IO ─────────────── */
function goto(page){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  document.querySelectorAll('.page').forEach(pg=>pg.classList.toggle('active',pg.id==='page-'+page));
  refresh();
}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>goto(b.dataset.page));
function refresh(){
  const T=evalTriggers(activeParams());
  const rag=ragOf(T);
  ['dot-dash','dot-trig'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.background=ragColor(rag)});
  $('#simbadge').classList.toggle('on',simActive());
  const act=document.querySelector('.page.active').id.replace('page-','');
  ({dash:renderDash,rules:renderRules,triggers:renderTriggers,am:renderAM,planning:renderPlanning,data:renderData,sim:renderSim})[act]();
}
/* leeg het model — wist alle actuele data (functies, assets, ketens, doelen en
   de NDW-/storingsimports) maar laat de regels staan (config, impact, amRegels,
   storingsRegels, capgrens). Handig om schoon te testen met eigen data. */
function legModel(){
  if(!confirm('Alle actuele data wissen — bedrijfsfuncties, assets en geïmporteerde NDW-/storingsdata — en met een leeg model beginnen?\n\nDe regels (config, impactregels, AM-regels, storingsregels, capaciteitsgrenzen) én de generieke bedienketens uit de taakanalyse blijven staan. Dit kan niet ongedaan worden gemaakt.'))return;
  DB.functies=[];DB.assets=[];DB.doelen=[];
  DB.financien={budgetJr:0};
  delete DB.ndwImport;delete DB.storingsImport;
  saveDB();
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bidash-wvm-dataset.json';a.click();
}
function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{DB=migreerDB(JSON.parse(r.result));saveDB()}catch(e){alert('Ongeldig JSON-bestand')}};r.readAsText(f);
}
refresh();
</script>

active-rood { background: var(--rood); color: var(--wit); }\n\n  .gantt-container {\n    background: var(--wit);\n    border-radius: var(--radius-lg);\n    border: 1px solid var(--border);\n    overflow: hidden;\n    margin-bottom: 16px;\n  }\n  .gantt-header {\n    background: var(--rws-blauw-dark);\n    color: var(--wit);\n    display: grid;\n    font-size: 11px;\n    font-weight: 700;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n  }\n  .gantt-header-row {\n    display: grid;\n    grid-template-columns: 220px 1fr;\n    border-bottom: 1px solid rgba(255,255,255,0.1);\n  }\n  .gantt-th { padding: 8px 12px; }\n  .gantt-years {\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    border-left: 1px solid rgba(255,255,255,0.2);\n  }\n  .gantt-year { padding: 6px 8px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }\n\n  .gantt-row {\n    display: grid;\n    grid-template-columns: 220px 1fr;\n    border-bottom: 1px solid var(--grijs-mid);\n    transition: background 0.1s;\n  }\n  .gantt-row:hover { background: var(--grijs-licht); }\n  .gantt-row:last-child { border-bottom: none; }\n  .gantt-label {\n    padding: 10px 12px;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 12px;\n    border-right: 1px solid var(--border);\n  }\n  .gantt-label .gl-dienst {\n    width: 6px; height: 6px; border-radius: 50%;\n    flex-shrink: 0;\n    margin-top: 1px;\n  }\n  .gantt-label .gl-name { font-weight: 600; }\n  .gantt-label .gl-sub { font-size: 10px; color: var(--text-sub); }\n  .gantt-bar-area {\n    position: relative;\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    padding: 8px 0;\n  }\n  .gantt-grid-line {\n    border-right: 1px dashed var(--grijs-mid);\n    height: 100%;\n  }\n  .gantt-bar {\n    position: absolute;\n    height: 20px;\n    border-radius: 3px;\n    top: 50%;\n    transform: translateY(-50%);\n    display: flex;\n    align-items: center;\n    padding: 0 6px;\n    font-size: 10px;\n    font-weight: 700;\n    color: var(--wit);\n    transition: all 0.4s ease;\n    cursor: pointer;\n    white-space: nowrap;\n    overflow: hidden;\n  }\n  .bar-gpo { background: #003082; }\n  .bar-civ { background: #5a2d82; }\n  .bar-vwm { background: #00823c; }\n  .bar-ppo { background: #00698a; }\n  .bar-regio { background: #c05000; }\n\n  .gantt-milestone {\n    position: absolute;\n    width: 14px; height: 14px;\n    background: var(--rws-geel);\n    transform: rotate(45deg) translateY(-50%);\n    top: 50%;\n    cursor: pointer;\n    transition: left 0.4s ease;\n    z-index: 2;\n  }\n  .gantt-milestone.rood { background: var(--rood); }\n\n  .dep-line {\n    position: absolute;\n    height: 2px;\n    background: var(--rood);\n    top: 50%;\n    z-index: 1;\n    display: none;\n  }\n  .dep-line.visible { display: block; }\n\n  /* Impact panel */\n  .impact-panel {\n    background: var(--wit);\n    border-radius: var(--radius-lg);\n    border: 1px solid var(--border);\n    overflow: hidden;\n  }\n  .impact-panel-header {\n    background: var(--rood);\n    color: var(--wit);\n    padding: 12px 16px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n  .impact-panel-header h3 { font-size: 14px; }\n  .impact-panel-body { padding: 16px; }\n\n  .impact-dienst {\n    display: flex;\n    align-items: flex-start;\n    gap: 12px;\n    padding: 12px;\n    border-radius: var(--radius);\n    margin-bottom: 8px;\n    border: 1px solid var(--border);\n  }\n  .impact-dienst .id-badge {\n    width: 40px; height: 40px;\n    border-radius: 50%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-weight: 800;\n    font-size: 12px;\n    color: var(--wit);\n    flex-shrink: 0;\n  }\n  .impact-dienst .id-content { flex: 1; }\n  .impact-dienst .id-naam { font-weight: 700; font-size: 13px; margin-bottom: 3px; }\n  .impact-dienst .id-impact { font-size: 12px; color: var(--text-sub); }\n  .impact-dien iddle; }\n  .dw-table tr:hover td { background: #f4f6fb; }\n  .dw-table tr:last-child td { border-bottom: none; }\n\n  .status-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 4px; flex-shrink: 0; }\n  .sd-rood { background: var(--rood); } .sd-oranje { background: var(--oranje); } .sd-groen { background: var(--groen); } .sd-blauw { background: var(--rws-blauw); }\n\n  .dw-bar-chart { margin-bottom: 16px; }\n  .dw-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }\n  .dw-bar-label { width: 150px; flex-shrink: 0; color: var(--text-sub); text-align: right; font-weight: 600; }\n  .dw-bar-track { flex: 1; background: var(--grijs-mid); border-radius: 4px; height: 18px; overflow: hidden; position: relative; }\n  .dw-bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 10px; font-weight: 700; color: #fff; transition: width .4s ease; }\n  .dw-bar-val { font-weight: 700; color: var(--text-main); min-width: 36px; }\n\n  .dw-donut-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }\n  .dw-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }\n  .dw-leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }\n\n  .dw-timeline { position: relative; padding-left: 24px; margin-bottom: 8px; }\n  .dw-timeline::before { content:''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }\n  .dw-tl-item { position: relative; padding: 8px 0 8px 16px; font-size: 12px; border-bottom: 1px solid var(--grijs-licht); }\n  .dw-tl-item::before { content:''; position: absolute; left: -20px; top: 14px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--wit); background: var(--grijs-mid); }\n  .dw-tl-item.rood::before { background: var(--rood); }\n  .dw-tl-item.oranje::before { background: var(--oranje); }\n  .dw-tl-item.groen::before { background: var(--groen); }\n  .dw-tl-datum { font-size: 10px; color: var(--text-sub); }\n  .dw-tl-titel { font-weight: 700; margin-bottom: 2px; }\n\n  .dw-spark { display: inline-flex; align-items: flex-end; gap: 2px; height: 24px; }\n  .dw-spark-bar { width: 6px; border-radius: 2px 2px 0 0; background: var(--rws-blauw); opacity: .7; }\n\n  .dw-alert { border-radius: 4px; padding: 8px 12px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; font-size: 12px; }\n  .dw-alert.rood { background: var(--rood-light); border: 1px solid #f0bcc0; }\n  .dw-alert.oranje { background: var(--oranje-light); border: 1px solid #f0d0a0; }\n  .dw-alert.groen { background: var(--groen-light); border: 1px solid #b0ddc0; }\n  .dw-alert.info { background: #e8f0fb; border: 1px solid #c0d0ec; }\n  .dw-alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }\n  .dw-alert strong { display: block; margin-bottom: 1px; }\n\n  .dw-gauge { text-align: center; padding: 8px 0; }\n  .dw-gauge canvas { display: block; margin: 0 auto; }\n  .dw-gauge-lbl { font-size: 11px; color: var(--text-sub); margin-top: 4px; }\n\n  .dw-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-sub); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }\n\n  .progress-ring { display: inline-flex; align-items: center; gap: 8px; }\n  .progress-ring-label { font-size: 11px; color: var(--text-sub); }\n\n  .dash-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }\n  .dash-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }\n  .dash-grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }\n  .dash-card { background: var(--wit); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }\n  .dash-card h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-sub); margin-bottom: 10px; }\n\n  .mini-kpi { text-align: center; padding: 12px 8px; }\n  .mini-kpi .mv { font-size: 22px; font-weight: 800; line-height: 1; }\n  .mini-kpi .ml { font-size: 10px; color: var(--text-sub); text-transform: uppercase; margin-top: 2px; }\n  .mini-kpi .mt2 { font-size: 10px; font-weight: 600; margin-top: 4px; }\n\n  @media(max-width:900px){\n    .dw-kpi-grid { grid-template-columns: 1fr 1fr; }\n    .dash-grid-2,.dash-grid-3,.dash-grid-4 { grid-template-columns: 1fr; }\n  }\n</style>\n</head>\n<body>\n\n<!-- TOPBAR -->\n<div id=\"topbar\">\n  <div class=\"logo\">\n    <div class=\"diamond\"></div>\n    <div class=\"label\">Rijkswaterstaat<br><span style=\"font-weight:400;font-size:11px;color:#a0b4d0\">Integrale Planning</span></div>\n  </div>\n  <div class=\"title-center\">Ketenafhankelijkheden · Openstellingszekerheid · Één feitenbasis</div>\n</div>\n\n<!-- LAYOUT -->\n<div id=\"layout\">\n\n  <!-- SIDENAV -->\n  <nav id=\"sidenav\">\n    <div class=\"nav-section\">Overzicht</div>\n    <a href=\"javascript:void(0)\" class=\"active\" onclick=\"showScreen('s1',this)\"><span class=\"nav-num\">1</span> Start</a>\n    <div class=\"nav-section\">Integrale Planning</div>\n    <a href=\"javascript:void(0)\" onclick=\"showScreen('s16',this)\"><span class=\"nav-num\" style=\"color:#F9B000\">📥</span> Planning importeren</a>\n    <a href=\"javascript:void(0)\" onclick=\"showScreen('s17',this)\"><span class=\"nav-num\" style=\"color:#F9B000\">⚙</span> Project &amp; budget</a>\n    <a href=\"javascript:void(0)\" onclick=\"showScreen('s18',this)\"><span class=\"nav-num\" style=\"color:#F9B000\">🧭</span> Dashboard configureren</a>\n    <a href=\"javascript:void(0)\" onclick=\"showScreen('s19',this)\"><span class=\"nav-num\" style=\"color:#F9B000\">📋</span> Dashboards</a>\n    <a href=\"javascript:void(0)\" onclick=\"showScreen('s11',this)\"><span class=\"nav-num\" style=\"color:#F9B000\">📊</span> Dashboards</a>\n    <div class=\"nav-section\">Beheer</div>\n    <a href=\"javascript:void(0)\" onclick=\"showScreen('s15',this)\"><span class=\"nav-num\" style=\"color:#F9B000\">💾</span> Opslaan &amp; herstellen</a>\n  </nav>\n\n  <!-- MAIN -->\n  <main id=\"main\">\n\n    <!-- KPI BAR (persistent) -->\n    <div id=\"kpi-bar\">\n      <div class=\"kpi-tile kpi-rood\" onclick=\"showTriggerSidebar('all')\">\n        <div class=\"kpi-val\" id=\"kpi-rood-n\">7</div>\n        <div class=\"kpi-lbl\">Rode triggers</div>\n      </div>\n      <div class=\"kpi-tile kpi-oranje\">\n        <div class=\"kpi-val\" id=\"kpi-oranje-n\">12</div>\n        <div class=\"kpi-lbl\">Oranje triggers</div>\n      </div>\n      <div class=\"kpi-tile kpi-rood\">\n        <div class=\"kpi-val\">3</div>\n        <div class=\"kpi-lbl\">Openstellings-risico</div>\n      </div>\n      <div class=\"kpi-tile kpi-oranje\">\n        <div class=\"kpi-val\">5</div>\n        <div class=\"kpi-lbl\">LCM-conflicten</div>\n      </div>\n      <div class=\"kpi-tile kpi-rood\">\n        <div class=\"kpi-val\">4</div>\n        <div class=\"kpi-lbl\">Testvenster-conflicten</div>\n      </div>\n      <div class=\"kpi-tile kpi-oranje\">\n        <div class=\"kpi-val\">2</div>\n        <div class=\"kpi-lbl\">VC-capaciteits-conflict</div>\n      </div>\n      <div class=\"kpi-tile kpi-blauw\">\n        <div class=\"kpi-val\">18</div>\n        <div class=\"kpi-lbl\">Afhankelijkheden</div>\n      </div>\n      <div class=\"kpi-tile kpi-groen\">\n        <div class=\"kpi-val\">83%</div>\n        <div class=\"kpi-lbl\">Datakwaliteit</div>\n      </div>\n    </div>\n\n    <!-- FILTERS BAR -->\n    <div id=\"filters-bar\">\n      <label>Filter:</label>\n      <select id=\"filter-project\" onchange=\"applyFilters()\">\n        <option value=\"\">Alle projecten</option>\n        <option value=\"a27\">Tunnel A27 Noord</option>\n        <option value=\"heinenoord\">Renovatie Heinenoordtunnel</option>\n        <option value=\"a15\">Corridor A15 West</option>\n        <option value=\"maasdelta\">Tunnel Maasdelta</option>\n        <option value=\"sijtwendetunnel\">Renovatie Sijtwendetunnel</option>\n      </select>\n      <select id=\"filter-vc\" onchange=\"applyFilters()\">\n        <option value=\"\">Alle verkeerscentrales</option>\n        <option value=\"vcmn\">VC Midden-Nederland</option>\n        <option value=\"vczwn\">VC Zuidwest-Nederland</option>\n        <option value=\"vcnwn\">VC Noordwest-Nederland</option>\n      </select>\n      <button class=\"filter-tag\" id=\"ft-rood\" onclick=\"toggleFilter('rood')\">🔴 Rood</button>\n      <button class=\"filter-tag inactive\" id=\"ft-oranje\" onclick=\"toggleFilter('oranje')\">🟠 Oranje</button>\n      <button class=\"filter-tag inactive\" id=\"ft-groen\" onclick=\"toggleFilter('groen')\">🟢 Groen</button>\n      <div style=\"margin-left:auto;font-size:12px;color:var(--text-sub)\">Peildatum: <strong>1 juli 2027</strong></div>\n    </div>\n\n    <!-- ─────────────────────────────────\n         SCHERM 1: START\n    ───────────────────────────────── -->\n    <div class=\"screen active\" id=\"s1\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>RWS Integrale Planning</h1>\n          <div class=\"screen-sub\">Operationeel hulpmiddel voor integrale planning op basis van Primavera P6-exports</div>\n        </div>\n        <div class=\"screen-num\">01</div>\n      </div>\n\n      <div class=\"kernboodschap\">\n        <div class=\"kb-label\">Werkwijze</div>\n        <p>Importeer een Primavera P6 XML-export. De WBS-structuur, activiteiten, mijlpalen en alle afhankelijkheden worden ingelezen. Verschuif vervolgens taken of hele projecten om scenario's te bouwen en de integrale impact op de keten en de openstellingen direct te zien. De dashboards tonen de planning per dienst en per niveau.</p>\n      </div>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:20px 0;\">\n        <div onclick=\"showScreen('s16',document.querySelector('#sidenav a[onclick*=s16]'))\" style=\"cursor:pointer;background:var(--wit);border:1px solid var(--border);border-top:4px solid #003082;border-radius:8px;padding:20px;\">\n          <div style=\"font-size:32px;margin-bottom:10px;\">📥</div>\n          <div style=\"font-size:16px;font-weight:700;color:#003082;margin-bottom:6px;\">1 · Planning importeren</div>\n          <div style=\"font-size:12px;color:var(--text-sub);line-height:1.6;\">Laad een Primavera P6 XML-export. Activiteiten, WBS-hiërarchie en relaties worden lokaal in de browser verwerkt — er wordt niets geüpload.</div>\n        </div>\n        <div onclick=\"showScreen('s16',document.querySelector('#sidenav a[onclick*=s16]'))\" style=\"cursor:pointer;background:var(--wit);border:1px solid var(--border);border-top:4px solid #5a2d82;border-radius:8px;padding:20px;\">\n          <div style=\"font-size:32px;margin-bottom:10px;\">🔀</div>\n          <div style=\"font-size:16px;font-weight:700;color:#5a2d82;margin-bottom:6px;\">2 · Scenario's bouwen</div>\n          <div style=\"font-size:12px;color:var(--text-sub);line-height:1.6;\">Sleep taken of hele projecten (vroeger of later). De verschuiving cascadeert via de geïmporteerde afhankelijkheden — ook over WBS-groepen heen.</div>\n        </div>\n        <div onclick=\"showScreen('s11',document.querySelector('#sidenav a[onclick*=s11]'))\" style=\"cursor:pointer;background:var(--wit);border:1px solid var(--border);border-top:4px solid #00823c;border-radius:8px;padding:20px;\">\n          <div style=\"font-size:32px;margin-bottom:10px;\">📊</div>\n          <div style=\"font-size:16px;font-weight:700;color:#00823c;margin-bottom:6px;\">3 · Dashboards &amp; impact</div>\n          <div style=\"font-size:12px;color:var(--text-sub);line-height:1.6;\">Bekijk de planning per dienst of WBS-groep, op operationeel (taken), tactisch (capaciteit) en strategisch (mijlpalen &amp; risico's) niveau.</div>\n        </div>\n      </div>\n\n      <div style=\"background:#003082;color:#fff;border-radius:8px;padding:18px 22px;border-left:5px solid #F9B000;\">\n        <div style=\"font-size:14px;font-weight:700;margin-bottom:8px;\">Diensten houden hun eigen verantwoordelijkheid</div>\n        <div style=\"font-size:12px;line-height:1.7;opacity:.92;\">GPO, CIV, VWM, PPO en de regio behouden hun eigen planning. Dit hulpmiddel verbindt de kritieke raakvlakken en afhankelijkheden, zodat openstellingsrisico's, contract- en bouwblokrisico's en LCM-afhankelijkheden eerder zichtbaar en bestuurbaar worden. De WBS→dienst-mapping is instelbaar in de dashboards.</div>\n        <button onclick=\"showScreen('s16',document.querySelector('#sidenav a[onclick*=s16]'))\" style=\"margin-top:14px;padding:10px 22px;background:#F9B000;color:#003082;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;\">📥 Start met importeren</button>\n      </div>\n    </div>\n\n\n    <div class=\"screen\" id=\"s11\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>Dashboards per dienst &amp; niveau</h1>\n          <div class=\"screen-sub\">Gevoed door de geïmporteerde planning. Kies per dienst of per WBS-hoofdgroep, en per niveau: operationeel (taken), tactisch (capaciteit), strategisch (mijlpalen &amp; risico's).</div>\n        </div>\n        <div class=\"screen-num\">📊</div>\n      </div>\n\n      <!-- MODE TOGGLE + SELECTIE -->\n      <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:10px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n        <div id=\"ipl-dash-modetoggle\" style=\"display:flex;\"></div>\n        <div id=\"ipl-dash-select\" style=\"display:flex;gap:6px;flex-wrap:wrap;\"></div>\n        <button onclick=\"showScreen('ipl-mapping-toggle')\" style=\"display:none;\"></button>\n        <label style=\"margin-left:auto;font-size:11px;color:var(--text-sub);display:flex;align-items:center;gap:5px;cursor:pointer;\"><input type=\"checkbox\" id=\"ipl-dash-showmap\" onchange=\"ipl_dashToggleMap()\"> WBS→dienst mapping tonen</label>\n      </div>\n\n      <!-- MAPPING-PANEL (verborgen tot aangevinkt) -->\n      <div id=\"ipl-dash-mappanel\" style=\"display:none;background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:8px;\">\n        <div style=\"font-size:12px;font-weight:700;color:#003082;margin-bottom:8px;\">WBS-hoofdgroep → dienst</div>\n        <div id=\"ipl-dash-maprows\" style=\"display:flex;flex-direction:column;gap:6px;\"></div>\n      </div>\n\n      <!-- VC-FILTER (alleen zichtbaar bij dienst VWM) -->\n      <div id=\"ipl-dash-vcfilter\" style=\"display:none;align-items:center;gap:6px;flex-wrap:wrap;background:#e6f5ed;border:1px solid #b0ddc0;border-radius:6px;padding:8px 16px;margin-bottom:8px;\"></div>\n\n      <!-- NIVEAU KNOPPEN -->\n      <div id=\"ipl-dash-niveau\" style=\"display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;\"></div>\n\n      <!-- DASHBOARD CONTENT -->\n      <div id=\"ipl-dash-content\"></div>\n    </div>\n\n    <!-- ═══════════════════════════════════════════\n         SCHERM 15 — OPSLAAN & HERSTELLEN\n    ═══════════════════════════════════════════ -->\n    <div class=\"screen\" id=\"s15\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>Opslaan &amp; herstellen</h1>\n          <div class=\"screen-sub\">Je scenario-aanpassingen, budgetten, FTE-configuraties en dashboards worden automatisch bewaard — zowel als herstelpunt (rechts) als lokaal in deze browser. Exporteer naar een bestand om te delen of over te zetten naar een andere computer.</div>\n        </div>\n        <div class=\"screen-num\">💾</div>\n      </div>\n\n      <div style=\"background:#003082;color:#fff;border-radius:6px;padding:14px 18px;margin-bottom:14px;border-left:5px solid #F9B000;display:flex;gap:16px;align-items:flex-start;\">\n        <div style=\"font-size:28px;flex-shrink:0;\">💾</div>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;margin-bottom:6px;\">Twee opslagniveaus</div>\n          <div style=\"font-size:12px;line-height:1.7;opacity:.92;\">\n            <strong>1) Automatisch, lokaal in deze browser</strong> — elke wijziging (verschuivingen, budget, FTE per taak, FTE-sjablonen, dashboard-configuratie, dienst-mapping) wordt na een korte pauze automatisch bewaard in deze browser (localStorage). Sluit je de pagina en open je hetzelfde bestand later opnieuw in dezelfde browser, dan wordt dit automatisch hersteld.<br><br>\n            <strong>2) Handmatig, als bestand</strong> — met <strong>Exporteren</strong> sla je alles op als <code>.json</code> om te delen met een collega, over te zetten naar een andere computer, of als expliciete back-up. <strong>Importeren</strong> laadt dat weer terug.<br><br>\n            Let op: de geïmporteerde planning zelf (de XML) wordt niet bewaard — laad die na een herstel opnieuw via <strong>Planning importeren</strong>; je scenario-instellingen wachten dan al op je.\n          </div>\n        </div>\n      </div>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n        <!-- EXPORT/IMPORT -->\n        <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:18px;\">\n          <div style=\"font-size:13px;font-weight:700;color:#003082;margin-bottom:12px;\">Bestand</div>\n          <button onclick=\"app_export()\" style=\"width:100%;padding:12px;border:none;background:#003082;color:#fff;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;\">⬇ Exporteren naar bestand</button>\n          <label style=\"display:block;width:100%;padding:12px;border:1px dashed var(--border);background:var(--grijs-licht);border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;color:#003082;margin-bottom:10px;\">\n            ⬆ Importeren uit bestand\n            <input type=\"file\" accept=\"application/json,.json\" onchange=\"app_import(this)\" style=\"display:none;\">\n          </label>\n          <button onclick=\"app_wisLokaleOpslag()\" style=\"width:100%;padding:8px;border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;\">🗑 Lokale browseropslag wissen</button>\n          <div id=\"app-save-status\" style=\"margin-top:12px;font-size:11px;color:#1a8a4a;font-weight:600;\">Klaar — wijzig iets om automatisch te bewaren.</div>\n        </div>\n\n        <!-- HERSTELPUNTEN -->\n        <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:18px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n            <div style=\"font-size:13px;font-weight:700;color:#003082;\">Herstelpunten (automatisch)</div>\n            <button onclick=\"app_autosave('Handmatig bewaarpunt')\" style=\"padding:4px 12px;border:1px solid #003082;background:#e8f0fb;color:#003082;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">+ Bewaarpunt nu</button>\n          </div>\n          <div id=\"app-restore-list\" style=\"max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:5px;\"></div>\n        </div>\n      </div>\n    </div>\n\n    <!-- ═══════════════════════════════════════════\n         SCHERM 16 — INTEGRALE PLANNING (Primavera XML import)\n    ═══════════════════════════════════════════ -->\n    <div class=\"screen\" id=\"s16\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>RWS Integrale Planning — import</h1>\n          <div class=\"screen-sub\">Laad een Primavera P6 XML-export. Activiteiten, WBS-structuur, relaties en afhankelijkheden worden geladen en gegroepeerd. Daarna kan elke taak/project verschoven worden om de integrale impact te bepalen.</div>\n        </div>\n        <div class=\"screen-num\">📥</div>\n      </div>\n\n      <div style=\"background:#003082;color:#fff;border-radius:6px;padding:14px 18px;margin-bottom:14px;border-left:5px solid #F9B000;display:flex;gap:16px;align-items:flex-start;\">\n        <div style=\"font-size:28px;flex-shrink:0;\">🧭</div>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;margin-bottom:6px;\">De basis voor RWS Integrale Planning</div>\n          <div style=\"font-size:12px;line-height:1.7;opacity:.92;\">\n            Deze methode — gelaagde planning met zichtbare afhankelijkheden en directe impactanalyse — vormt de basis voor integraal plannen bij RWS. Voer je eigen Primavera-export in: de <strong>WBS-structuur</strong> wordt automatisch de indeling, de <strong>relaties</strong> bepalen de cascade. Verschuif een taak of heel project en zie welke activiteiten en mijlpalen meebewegen, ook over WBS-groepen heen.\n          </div>\n        </div>\n      </div>\n\n      <!-- UPLOAD PROMPT -->\n      <div id=\"ipl-upload-prompt\" style=\"background:var(--wit);border:2px dashed var(--border);border-radius:10px;padding:40px 24px;text-align:center;margin-bottom:14px;\">\n        <div style=\"font-size:42px;margin-bottom:12px;\">📥</div>\n        <div style=\"font-size:16px;font-weight:700;color:#003082;margin-bottom:6px;\">Laad een Primavera P6 XML-export</div>\n        <div style=\"font-size:12px;color:var(--text-sub);margin-bottom:18px;max-width:480px;margin-left:auto;margin-right:auto;\">Het bestand wordt lokaal in je browser verwerkt — er wordt niets geüpload. Activiteiten, WBS-hiërarchie en alle relatietypes (FS/FF/SS/SF) worden ingelezen.</div>\n        <label style=\"display:inline-block;padding:12px 28px;background:#003082;color:#fff;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;\">\n          Kies XML-bestand\n          <input type=\"file\" accept=\".xml,text/xml,application/xml\" onchange=\"ipl_handleFile(this)\" style=\"display:none;\">\n        </label>\n        <div id=\"ipl-status\" style=\"margin-top:14px;font-size:12px;color:var(--text-sub);\">Nog geen bestand geladen.</div>\n      </div>\n\n      <!-- WORKSPACE (na laden) -->\n      <div id=\"ipl-workspace\" style=\"display:none;\">\n        <!-- STATS -->\n        <div id=\"ipl-stats\" style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;\"></div>\n\n        <!-- EXPORT NAAR PRIMAVERA -->\n        <div style=\"background:#e8f0fb;border:1px solid #b0c8ec;border-radius:6px;padding:10px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n          <span style=\"font-size:18px;\">📤</span>\n          <div style=\"flex:1;min-width:220px;\">\n            <div style=\"font-size:12px;font-weight:700;color:#003082;\">Scenario geaccepteerd? Exporteer terug naar Primavera</div>\n            <div style=\"font-size:10px;color:#4a6a9a;\">Schrijft de huidige verschuivingen als nieuwe datums in een kopie van de originele XML — direct opnieuw te importeren in Primavera P6.</div>\n          </div>\n          <button onclick=\"ipl_exportXML()\" style=\"padding:8px 18px;background:#003082;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;\">📥 Exporteer naar Primavera XML</button>\n        </div>\n\n        <!-- CONTROLS -->\n        <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:10px 16px;margin-bottom:8px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n          <div style=\"font-size:12px;font-weight:700;color:var(--text-sub);\">Verschuif keten:</div>\n          <div style=\"display:flex;align-items:center;gap:8px;flex:1;min-width:180px;\">\n            <span style=\"font-size:11px;color:var(--text-sub)\">−12</span>\n            <input type=\"range\" id=\"ipl-slider\" min=\"-12\" max=\"12\" value=\"0\" step=\"1\" style=\"flex:1;accent-color:#003082;\" oninput=\"ipl_slider(this.value)\">\n            <span style=\"font-size:11px;color:var(--text-sub)\">+12 mnd</span>\n          </div>\n          <div id=\"ipl-pill\" style=\"background:#003082;color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:800;min-width:80px;text-align:center;\">Geen shift</div>\n          <label style=\"font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer;\"><input type=\"checkbox\" id=\"ipl-rel\" checked onchange=\"renderIPL()\"> Relaties</label>\n          <button onclick=\"ipl_expandAll(true)\" style=\"padding:5px 10px;border:1px solid var(--border);background:var(--grijs-licht);border-radius:4px;font-size:11px;cursor:pointer;\">Alles uitklappen</button>\n          <button onclick=\"ipl_expandAll(false)\" style=\"padding:5px 10px;border:1px solid var(--border);background:var(--grijs-licht);border-radius:4px;font-size:11px;cursor:pointer;\">Alles inklappen</button>\n          <button onclick=\"ipl_reset()\" style=\"padding:5px 10px;border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">Reset</button>\n          <label style=\"margin-left:auto;padding:5px 12px;border:1px solid #003082;background:#e8f0fb;color:#003082;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">\n            Ander bestand laden\n            <input type=\"file\" accept=\".xml,text/xml,application/xml\" onchange=\"ipl_handleFile(this)\" style=\"display:none;\">\n          </label>\n        </div>\n\n        <!-- PROJECTEN/TUNNELS VERSCHUIVEN (via vinkje op de groepsregel) -->\n        <div style=\"background:#f3eefa;border:1px solid #d8c8ec;border-radius:6px;padding:8px 16px;margin-bottom:8px;font-size:11px;color:#5a2d82;display:flex;align-items:center;gap:8px;\">\n          <span style=\"font-size:16px;\">☑</span>\n          <span>Elke <strong>uitklapbare regel</strong> (hoofdgroep of WBS-groep) heeft een vinkje. Zet die aan om de regel — met alles eronder — sleepbaar te maken. Naast de aangevinkte regel verschijnt een <strong>schuifbalk</strong> om te vertragen of versnellen — alle onderliggende taken en hun opvolgers bewegen mee.</span>\n          <button onclick=\"ipl_projClearAll()\" style=\"margin-left:auto;padding:4px 10px;border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">Wis projectselectie</button>\n        </div>\n\n        <!-- LEGENDA -->\n        <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:8px 16px;margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-sub);align-items:center;\">\n          <span style=\"font-weight:700;\">Legenda:</span>\n          <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"display:inline-block;width:18px;height:3px;background:#b0b8cc;\"></span> Binnen groep</span>\n          <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"display:inline-block;width:18px;height:3px;background:#F9B000;\"></span> Cross-groep</span>\n          <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"display:inline-block;width:18px;height:3px;background:#c0121f;\"></span> Actieve cascade</span>\n          <span style=\"display:flex;align-items:center;gap:4px;\"><span style=\"display:inline-block;width:10px;height:10px;background:#F9B000;transform:rotate(45deg);\"></span> Mijlpaal</span>\n          <span style=\"margin-left:auto;font-style:italic;\">Klik op een WBS-groep om in/uit te klappen</span>\n        </div>\n\n        <!-- GANTT + ZWEVEND FORMATIE-PANEEL -->\n        <div style=\"display:flex;gap:14px;align-items:flex-start;\">\n          <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;overflow:auto;position:relative;max-height:680px;flex:1;min-width:0;\">\n            <canvas id=\"iplCanvas\" style=\"display:block;cursor:default;\"></canvas>\n            <div id=\"ipl-tooltip\" style=\"position:absolute;display:none;background:#1a2236;color:#fff;font-size:11px;padding:8px 12px;border-radius:4px;pointer-events:none;max-width:320px;z-index:200;line-height:1.5;border:1px solid #F9B000;\"></div>\n            <div id=\"ipl-float-slider\" style=\"position:absolute;display:none;background:#fff;border:1px solid #5a2d82;border-radius:6px;padding:6px 10px;z-index:250;box-shadow:0 2px 8px rgba(0,0,0,0.18);align-items:center;gap:8px;\">\n              <span id=\"ipl-float-naam\" style=\"font-size:10px;font-weight:700;color:#5a2d82;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\"></span>\n              <input type=\"range\" id=\"ipl-float-range\" min=\"-18\" max=\"18\" value=\"0\" step=\"1\" style=\"width:140px;accent-color:#5a2d82;\" oninput=\"ipl_floatSlide(this.value)\">\n              <span id=\"ipl-float-val\" style=\"font-size:11px;font-weight:800;color:#5a2d82;min-width:42px;text-align:right;\">0 mnd</span>\n              <span onclick=\"ipl_floatClose()\" style=\"cursor:pointer;color:#c0121f;font-weight:700;font-size:13px;padding:0 2px;\">×</span>\n            </div>\n          </div>\n\n          <!-- ZWEVEND FORMATIE-PANEEL -->\n          <div style=\"width:320px;flex-shrink:0;position:sticky;top:12px;max-height:680px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;\">\n            <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:12px 14px;\">\n              <div style=\"font-size:12px;font-weight:700;color:#003082;margin-bottom:2px;\">FTE per dienst</div>\n              <div style=\"font-size:10px;color:var(--text-sub);margin-bottom:8px;\">Alle diensten in één grafiek, elk met een eigen lijn.</div>\n              <canvas id=\"ipl-fmt-alle\" style=\"display:block;width:100%;\"></canvas>\n              <div id=\"ipl-fmt-alle-legend\" style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:9px;\"></div>\n            </div>\n            <div id=\"ipl-fmt-perdienst\" style=\"display:flex;flex-direction:column;gap:10px;\"></div>\n            <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:12px 14px;\">\n              <div style=\"font-size:12px;font-weight:700;color:#c0121f;margin-bottom:2px;\">Formatieconflicten</div>\n              <div style=\"font-size:10px;color:var(--text-sub);margin-bottom:6px;\">Kwartalen waarin de FTE-vraag de beschikbare formatie overschrijdt, met de bijdragende taken.</div>\n              <div id=\"ipl-fmt-conflicten\" style=\"max-height:220px;overflow-y:auto;\"></div>\n            </div>\n          </div>\n        </div>\n\n        <!-- IMPACT -->\n        <div id=\"ipl-impact\" style=\"margin-top:12px;\"></div>\n      </div>\n    </div>\n\n    <!-- ═══════════════════════════════════════════\n         SCHERM 17 — PROJECT CONFIGUREREN & BUDGET\n    ═══════════════════════════════════════════ -->\n    <div class=\"screen\" id=\"s17\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>Project configureren &amp; budget</h1>\n          <div class=\"screen-sub\">Selecteer een project of tunnel uit de geïmporteerde planning, ken een totaalbudget toe (verdeeld over taken en jaren) en stel de FTE-bezetting per taak in.</div>\n        </div>\n        <div class=\"screen-num\">⚙</div>\n      </div>\n\n      <div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:12px 18px;margin-bottom:14px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;\">\n        <div style=\"font-size:12px;font-weight:700;color:var(--text-sub);\">Configureer project/tunnel:</div>\n        <select id=\"ipl-cfg-select\" onchange=\"ipl_cfgSelChanged()\" style=\"padding:7px 12px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-weight:600;color:#003082;min-width:300px;max-width:420px;\"></select>\n        <div style=\"margin-left:auto;font-size:11px;color:var(--text-sub);\">Budget en FTE worden automatisch als herstelpunt bewaard.</div>\n      </div>\n\n      <div id=\"ipl-cfg-content\"></div>\n    </div>\n\n    <!-- ═══════════════════════════════════════════\n         SCHERM 18 — DASHBOARD CONFIGUREREN\n    ═══════════════════════════════════════════ -->\n    <div class=\"screen\" id=\"s18\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>Dashboard configureren</h1>\n          <div class=\"screen-sub\">Stel in hoe dienst en verkeerscentrale per taak bepaald worden. Bronprioriteit: Primavera ActivityCode-toewijzing → configuratieregels hieronder → standaardwaarde.</div>\n        </div>\n        <div class=\"screen-num\">⚙</div>\n      </div>\n\n      <div id=\"ipl-cfgdash-bron\" style=\"margin-bottom:14px;\"></div>\n      <div id=\"ipl-cfgdash-content\"></div>\n    </div>\n\n    <!-- ═══════════════════════════════════════════\n         SCHERM 19 — DASHBOARDS OVERZICHT\n    ═══════════════════════════════════════════ -->\n    <div class=\"screen\" id=\"s19\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>Dashboards</h1>\n          <div class=\"screen-sub\">Maak, bewerk en publiceer dashboards per dienst. Elk dashboard combineert KPI's en grafieken op een vast, gevalideerd filter (dienst · niveau · regio).</div>\n        </div>\n        <div class=\"screen-num\">📋</div>\n      </div>\n      <div id=\"ipl-portfolio-triggers\"></div>\n      <div id=\"ipl-dbov-content\"></div>\n    </div>\n\n    <!-- ═══════════════════════════════════════════\n         SCHERM 20 — DASHBOARD BEWERKEN\n    ═══════════════════════════════════════════ -->\n    <div class=\"screen\" id=\"s20\">\n      <div class=\"screen-header\">\n        <div>\n          <h1>Dashboard bewerken</h1>\n          <div class=\"screen-sub\">KPI's en grafieken configureren, met live voorbeeldwaarden uit de geladen planning. Publiceren kan pas als het validatierapport geen blokkerende fouten toont.</div>\n        </div>\n        <div class=\"screen-num\">✏️</div>\n      </div>\n      <div id=\"ipl-dbed-content\"></div>\n    </div>\n\n  </main>\n</div>\n\n<!-- TRIGGER SIDEBAR -->\n<div id=\"trigger-sidebar\">\n  <div id=\"trigger-sidebar-header\">\n    <h3>Trigger detail</h3>\n    <button id=\"trigger-close\" onclick=\"closeTriggerSidebar()\">✕</button>\n  </div>\n  <div class=\"tsb-body\" id=\"trigger-sidebar-body\">\n    <!-- ingevuld via JS -->\n  </div>\n</div>\n\n<script defer>\n// ══════════════════════════════════════════\n// DATA\n// ══════════════════════════════════════════\nconst TRIGGERS = {\n  a27: {\n    naam: 'Openstellingsrisico Tunnel A27 Noord',\n    klasse: 'rood',\n    oorzaak: 'GPO-openstelling schuift 9 maanden (Q2 2029 → Q1 2030). CIV-bouwblok LTS Bediening v1.3.1 is bij openstelling buiten geldige doelversie. VWM-opdracht VC Midden-NL raakt LCM-planning.',\n    oorzaakcat: 'GPO-project schuift',\n    impact: {\n      GPO: 'Openstellingsrisico en contractimpact',\n      CIV: 'Releaseplanning LTS Bediening herzien',\n      VWM: 'Opdrachtmoment CIV herzien',\n      PPO: 'Onderhoudsvenster controleren',\n      Regio: 'Hindercommunicatie aanpassen'\n    },\n    besluitopties: [\n      'Bouwblokrelease LTS Bediening versnellen naar v1.3.2',\n      'Projectscope aanpassen (deelfuncties uitstellen)',\n      'Tijdelijk maatwerk accepteren (vrijstelling LTS)',\n      'LCM VC Midden-NL naar voren halen',\n      'Testvenster herplannen (prioriteit A27 boven Heinenoord)',\n      'Openstelling herfaseren (gedeeltelijke openstelling)'\n    ],\n    deadline: '1 oktober 2027',\n    urgentie: 'ROOD',\n    diensten: ['GPO','CIV','VWM','PPO','Regio']\n  },\n  lcm: {\n    naam: 'LCM-conflict VC Midden-Nederland',\n    klasse: 'rood',\n    oorzaak: 'LCM-vervanging VC Midden-NL (Q3 2029–Q2 2030) overlapt de nieuwe openstellingsdatum Q1 2030. VC tijdelijk niet beschikbaar voor SIT en proefbedrijf.',\n    oorzaakcat: 'LCM-afhankelijkheid wijzigt',\n    impact: {\n      VWM: 'LCM-planning herzien of faseren',\n      CIV: 'Testcapaciteit VC Midden-NL in risico',\n      GPO: 'Proefbedrijf en openstelling in risico'\n    },\n    besluitopties: [\n      'LCM-planning VCMN faseren (deel lat  Een verschuiving hier heeft effect op alle voorgaande schakels én op de communicatie richting regio en weggebruiker.' },\n  regio: { titel: 'Regio', icon: '🗺️', tekst: 'De regio communiceert met bestuurlijke partners, omgeving en weggebruikers. Hindercommunicatie is gepland op de verwachte openstellingsdatum. Bij verschuiving moet dit tijdig worden bijgesteld.' },\n  wg: { titel: 'Weggebruiker', icon: '🚗', tekst: 'De weggebruiker ervaart het eindresultaat: een veilige, beschikbare tunnel. Hindercommunicatie, informatie en bereikbaarheid worden vanuit de regio gecoördineerd.' }\n};\n\n// ══════════════════════════════════════════\n// NAVIGATIE\n// ══════════════════════════════════════════\nfunction showScreen(id, linkEl) {\n  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n  document.querySelectorAll('#sidenav a').forEach(a => a.classList.remove('active'));\n  if (linkEl) linkEl.classList.add('active');\n  document.getElementById('main').scrollTop = 0;\n  if (id === 's11') setTimeout(()=>renderIPLDash(), 30);\n  if (id === 's15') setTimeout(()=>app_renderRestorePanel(), 30);\n  if (id === 's16') setTimeout(()=>{ if(IPL_MODEL) renderIPL(); }, 30);\n  if (id === 's17') setTimeout(()=>renderIPLConfig(), 30);\n  if (id === 's18') setTimeout(()=>renderDashConfig(), 30);\n  if (id === 's19') setTimeout(()=>renderDashboardsOverzicht(), 30);\n  if (id === 's20') setTimeout(()=>renderDashboardEditor(), 30);\n}\n\n// ══════════════════════════════════════════\n// ROL SELECTOR\n// ══════════════════════════════════════════\nfunction setRol(rol) {\n  document.getElementById('rol-select').value = rol;\n  // Update KPI bar accents based on role\n  updateRolView(rol);\n}\n\nfunction updateRolView(rol) {\n  // Per rol: specifieke KPI nadruk\n  // Simpele implementatie: highlight relevante KPI's\n  const rolMap = {\n    gpo: ['Openstellingsrisico','Testvenster-conflicten'],\n    civ: ['LCM-conflicten','Afhankelijkheden'],\n    vwm: ['VC-capaciteits-conflict','LCM-conflicten'],\n    ppo: ['Oranje triggers'],\n    regio: ['Oranje triggers'],\n    mt: ['Rode triggers','Openstellingsrisico'],\n    alle: []\n  };\n}\n\n// ══════════════════════════════════════════\n// TRIGGER SIDEBAR\n// ══════════════════════════════════════════\nfunction showTriggerSidebar(triggerId) {\n  const sb = document.getElementById('trigger-sidebar');\n  const body = document.getElementById('trigger-sidebar-body');\n\n  if (triggerId === 'all') {\n    var trigItems = Object.entries(TRIGGERS).map(function(entry) {\n      var k = entry[0], t = entry[1];\n      var klasse = t.klasse === 'oranje' ? 'oranje' : '';\n      var icon = t.urgentie === 'ROOD' ? '🔴' : '🟠';\n      return '<div class=\"trigger-item ' + klasse + '\" onclick=\"showTriggerSidebar(\\'' + k + '\\')\" style=\"cursor:pointer\">'\n        + '<div class=\"ti-content\">'\n        + '<div class=\"ti-naam\">' + icon + ' ' + t.naam + '</div>'\n        + '<div class=\"ti-oorzaak\">' + t.oorzaakcat + '</div>'\n        + '</div>'\n        + '<div><span class=\"badge badge-' + (t.klasse === 'rood' ? 'rood' : 'oranje') + '\">' + t.urgentie + '</span></div>'\n        + '</div>';\n    }).join('');\n    body.innerHTML = '<div class=\"tsb-section\"><h4>Alle actieve triggers (' + Object.keys(TRIGGERS).length + ')</h4>' + trigItems + '</div>';\n    sb.classList.add('open');\n    return;\n  }\n\n  const t = TRIGGERS[triggerId];\n  if (!t) return;\n\n  const kleurClass = t.klasse === 'rood' ? 'badge-rood' : 'badge-oranje';\n  var impactRows = Object.entries(t.impact).map(function(e) {\n    return '<div style=\"padding:8px;border-radius:4px;background:var(--grijs-licht);border:1px solid var(--border);margin-bottom:6px;font-size:12px;\"><strong>' + e[0] + ':</strong> ' + e[1] + '</div>';\n  }).join('');\n\n  var besluitRows = t.besluitopties.map(function(opt, i) {\n    return '<div class=\"besluit-optie\"><input type=\"radio\" name=\"besluit_' + triggerId + '\" value=\"' + i + '\"><span>' + opt + '</span></div>';\n  }).join('');\n\n  var diensten = (t.diensten||[]).map(function(d) {\n    return '<span class=\"arch-chip\">' + d + '</span>';\n  }).join('');\n\n  body.innerHTML = '<div class=\"tsb-section\">'\n    + '<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px;\">'\n    + '<span class=\"badge ' + kleurClass + '\">' + t.urgentie + '</span>'\n    + '<span style=\"font-size:11px;color:var(--text-sub);\">' + t.oorzaakcat + '</span>'\n    + '</div><h4>Oorzaak</h4>'\n    + '<p style=\"font-size:12px;color:var(--text-sub);line-height:1.6;\">' + t.oorzaak + '</p>'\n    + '</div><div class=\"divider\"></div>'\n    + '<div class=\"tsb-section\"><h4>Impact per dienst</h4>' + impactRows + '</div>'\n    + '<div class=\"divider\"></div>'\n    + '<div class=\"tsb-section\"><h4>Besluitopties</h4>' + besluitRows + '</div>'\n    + '<div class=\"divider\"></div>'\n    + '<div class=\"tsb-section\"><h4>Actiebetrokkenen</h4>'\n    + '<div style=\"display:flex;flex-wrap:wrap;gap:4px;\">' + diensten + '</div></div>'\n    + '<div style=\"margin-top:16px;padding:10px 12px;background:var(--rood-light);border-radius:4px;border:1px solid #f0bcc0;\">'\n    + '<div style=\"font-size:11px;color:var(--rood);font-weight:700;\">BESLUIT VEREIST VOOR</div>'\n    + '<div style=\"font-size:16px;font-weight:800;color:var(--rood);\">' + t.deadline + '</div>'\n    + '</div>'\n    + '<button class=\"btn btn-primary mt-12\" style=\"width:100%;\" onclick=\"alert(\\'Trigger geëscaleerd naar tactisch niveau.\\')\">Escaleren naar tactisch niveau</button>'\n    + '<button class=\"btn btn-secondary mt-8\" style=\"width:100%;\" onclick=\"closeTriggerSidebar()\">Sluiten</button>';\n\n  sb.classList.add('open');\n}\n\nfunction closeTriggerSidebar() {\n  document.getElementById('trigger-sidebar').classList.remove('open');\n}\n\n// ══════════════════════════════════════════\n// GANTT ENGINE — Dual side-by-side\n// Toont WANNEER je 0Ref:function(){return 2024.5+gShift/12;}, t1Ref:function(){return 2025.0+gShift/12;}, fte:2 },\n    { label:'VO-fase',          t0Ref:function(){return 2025.0+gShift/12;}, t1Ref:function(){return 2025.75+gShift/12;}, fte:3 },\n    { label:'DO-fase',          t0Ref:function(){return 2025.75+gShift/12;},t1Ref:function(){return 2026.5+gShift/12;},  fte:4 },\n    { label:'UO/Bestek',        t0Ref:function(){return 2026.5+gShift/12;}, t1Ref:function(){return 2027.5+gShift/12;},  fte:5 },\n  ]},\n  // ── A27 GPO realisatie + test ──────────────────────────\n  { rowId:'g1', dienst:'GPO', phases:[\n    { label:'Realisatie/bouw',  t0Ref:function(){return 2027.5+gShift/12;}, t1Ref:function(){return 2028.75+gShift/12;}, fte:6 },\n    { label:'IV&V',             t0Ref:function(){return 2028.75+gShift/12;},t1Ref:function(){return 2029.0+gShift/12;},  fte:5 },\n    { label:'FAT',              t0Ref:function(){return 2029.0+gShift/12;}, t1Ref:function(){return 2029.17+gShift/12;}, fte:4 },\n    { label:'SAT',              t0Ref:function(){return 2029.17+gShift/12;},t1Ref:function(){return 2029.33+gShift/12;}, fte:4 },\n    { label:'SIT',              t0Ref:function(){return 2029.33+gShift/12;},t1Ref:function(){return 2029.5+gShift/12;},  fte:3 },\n    { label:'Proefbedrijf',     t0Ref:function(){return 2029.5+gShift/12;}, t1Ref:function(){return 2029.75+gShift/12;}, fte:3 },\n  ]},\n  // ── VWM opdrachtfase ──────────────────────────────────\n  { rowId:'g3', dienst:'VWM', phases:[\n    { label:'Opdracht Audio',   t0Ref:function(){return 2026.25;}, t1Ref:function(){return 2026.75;}, fte:2 },\n    { label:'Opdracht Bediening',t0Ref:function(){return 2026.5;}, t1Ref:function(){return 2027.0;},  fte:2 },\n    { label:'LCM-vervanging',   t0Ref:function(){return 2029.5;},  t1Ref:function(){return 2030.5;},  fte:3 },\n  ]},\n  // ── CIV LTS Bediening ─────────────────────────────────\n  { rowId:'g2', dienst:'CIV', phases:[\n    { label:'Architectuur',     t0Ref:function(){return 2026.75
