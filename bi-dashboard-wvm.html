f(!r) continue;\n    var gew=NT_CONFIG.verdeel[pk][rid]!==undefined?NT_CONFIG.verdeel[pk][rid]:1;\n    var bedrag=bv.perRegel[rid]||0;\n    var jaarCells='';\n    for(var jy=0;jy<jaren.length;jy++){\n      var v=(bv.perRegelJaar[rid]&&bv.perRegelJaar[rid][jaren[jy]])||0;\n      jaarCells+='<td style=\"padding:4px 8px;text-align:right;font-size:10px;color:'+(v>0?'#3a4658':'#c0c6d0')+';\">'+(v>0?Math.round(v):'·')+'</td>';\n    }\n    sleutelRows+='<tr>'\n      +'<td style=\"padding:5px 10px;font-size:11px;\">'+r.label.replace(/^\\s+/,'')+'</td>'\n      +'<td style=\"padding:5px 8px;text-align:center;\"><input type=\"number\" value=\"'+gew+'\" step=\"0.5\" min=\"0\" onchange=\"nt_setVerdeel(\\''+pk+'\\',\\''+rid+'\\',this.value)\" style=\"width:56px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:center;\"></td>'\n      +'<td style=\"padding:5px 8px;text-align:right;font-size:11px;font-weight:700;color:'+proj.kleur+';\">'+Math.round(bedrag)+'k</td>'\n      +jaarCells+'</tr>';\n  }\n  var jaarHead=''; for(var jh=0;jh<jaren.length;jh++) jaarHead+='<th style=\"padding:6px 8px;text-align:right;font-size:9px;color:#6a7898;\">'+jaren[jh]+'</th>';\n  var jaarFoot=''; for(var jf=0;jf<jaren.length;jf++) jaarFoot+='<td style=\"padding:5px 8px;text-align:right;font-size:10px;font-weight:700;color:'+proj.kleur+';\">'+Math.round(bv.perJaar[jaren[jf]]||0)+'k</td>';\n\n  var verdeelBlok='<div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:14px;overflow-x:auto;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+proj.kleur+';margin-bottom:4px;\">Verdeelsleutel — budget per fase &amp; jaar (k€)</div>'\n    +'<div style=\"font-size:11px;color:var(--text-sub);margin-bottom:10px;\">Pas het gewicht per fase aan; het budget wordt naar rato verdeeld en vervolgens over de jaren gespreid op basis van de looptijd van elke taak.</div>'\n    +'<table style=\"width:100%;border-collapse:collapse;min-width:600px;\"><thead><tr style=\"background:#f4f6fb;\">'\n    +'<th style=\"padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#6a7898;\">Fase / taak</th>'\n    +'<th style=\"padding:6px 8px;text-align:center;font-size:9px;text-transform:uppercase;color:#6a7898;\">Gewicht</th>'\n    +'<th style=\"padding:6px 8px;text-align:right;font-size:9px;text-transform:uppercase;color:#6a7898;\">Budget</th>'\n    +jaarHead+'</tr></thead><tbody>'+sleutelRows+'</tbody>'\n    +'<tfoot><tr style=\"background:#f0f2f5;border-top:2px solid '+proj.kleur+';\"><td colspan=\"2\" style=\"padding:6px 10px;font-size:11px;font-weight:700;\">Totaal per jaar</td>'\n    +'<td style=\"padding:6px 8px;text-align:right;font-size:11px;font-weight:800;color:'+proj.kleur+';\">'+Math.round(bv.totaal)+'k</td>'+jaarFoot+'</tr></tfoot></table></div>';\n\n  // ── FTE per taak met rollen ──\n  var fteRows='';\n  for(var fi=0;fi<proj.regels.length;fi++){\n    var frid=proj.regels[fi]; var fr=nt_regelById(frid); if(!fr) continue;\n    var toew=NT_CONFIG.fte[frid]||[];\n    var assignHtml='';\n    for(var ai=0;ai<toew.length;ai++){\n      var a=toew[ai];\n      var rolOpts='';\n      var rollen=NT_ROLLEN[a.dienst]||NT_ROLLEN[dienst];\n      for(var ri2=0;ri2<rollen.length;ri2++){ rolOpts+='<option value=\"'+rollen[ri2]+'\"'+(rollen[ri2]===a.rol?' selected':'')+'>'+rollen[ri2]+'</option>'; }\n      var dienstOpts='';\n      ['GPO','CIV','VWM'].forEach(function(d){ dienstOpts+='<option value=\"'+d+'\"'+(d===a.dienst?' selected':'')+'>'+d+'</option>'; });\n      assignHtml+='<div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px;\">'\n        +'<select onchange=\"nt_setFteDienst(\\''+frid+'\\','+ai+',this.value)\" style=\"padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:10px;width:56px;\">'+dienstOpts+'</select>'\n        +'<select onchange=\"nt_setFteRol(\\''+frid+'\\','+ai+',this.value)\" style=\"padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:10px;flex:1;min-width:160px;\">'+rolOpts+'</select>'\n        +'<input type=\"number\" value=\"'+a.fte+'\" step=\"0.25\" min=\"0\" onchange=\"nt_setFteVal(\\''+frid+'\\','+ai+',this.value)\" style=\"width:54px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;text-align:center;\">'\n        +'<span style=\"font-size:9px;color:#6a7898;\">FTE</span>'\n        +'<button onclick=\"nt_delFte(\\''+frid+'\\','+ai+')\" style=\"border:none;background:#fde8ea;color:#c0121f;border-radius:3px;width:20px;height:20px;cursor:pointer;font-size:11px;\">×</button>'\n        +'</div>';\n    }\n    var totFte=nt_taakFte(fr);\n    fteRows+='<div style=\"border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin-bottom:8px;background:'+(fr.crit?'#fffbe6':'#fff')+';\">'\n      +'<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;\">'\n      +'<div style=\"font-size:12px;font-weight:700;color:#2a3445;\">'+fr.label.replace(/^\\s+/,'')+(fr.crit?' <span style=\"color:#c0121f;font-size:9px;\">KRITIEK</span>':'')+'</div>'\n      +'<div style=\"font-size:11px;font-weight:800;color:'+proj.kleur+';\">'+totFte.toFixed(2)+' FTE totaal</div>'\n      +'</div>'+assignHtml\n      +'<button onclick=\"nt_addFte(\\''+frid+'\\',\\''+dienst+'\\')\" style=\"margin-top:4px;border:1px dashed var(--border);background:#f4f6fb;color:#003082;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:10px;font-weight:600;\">+ rol toevoegen</button>'\n      +'</div>';\n  }\n  var fteBlok='<div style=\"background:var(--wit);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:14px;\">'\n    +'<div style=\"font-size:13px;font-weight:700;color:'+proj.kleur+';margin-bottom:4px;\">FTE-bezetting per taak</div>'\n    +'<div style=\"font-size:11px;color:var(--text-sub);margin-bottom:12px;\">Wijs per taak één of meer rollen toe met hun dienst en FTE. Rolnamen zijn uniform per dienst. De som per taak voedt de boeggolf- en capaciteitsgrafieken.</div>'\n    +fteRows+'</div>';\n\n  el.innerHTML=budgetBlok+verdeelBlok+fteBlok;\n}\n\nfunction nt_setBudget(pk,v){ NT_CONFIG.budget[pk]=parseFloat(v)||0; renderConfig(); }\nfunction nt_setVerdeel(pk,rid,v){ NT_CONFIG.verdeel[pk][rid]=parseFloat(v)||0; renderConfig(); }\nfunction nt_setFteDienst(rid,idx,v){\n  NT_CONFIG.fte[rid][idx].dienst=v;\n  // reset rol naar eerste van nieuwe dienst als huidige niet bestaat\n  if(NT_ROLLEN[v].indexOf(NT_CONFIG.fte[rid][idx].rol)<0) NT_CONFIG.fte[rid][idx].rol=NT_ROLLEN[v][0];\n  renderConfig(); nt_refreshIfActive();\n}\nfunction nt_setFteRol(rid,idx,v){ NT_CONFIG.fte[rid][idx].rol=v; }\nfunction nt_setFteVal(rid,idx,v){ NT_CONFIG.fte[rid][idx].fte=parseFloat(v)||0; renderConfig(); nt_refreshIfActive(); }\nfunction nt_addFte(rid,dienst){ NT_CONFIG.fte[rid].push({rol:NT_ROLLEN[dienst][0],dienst:dienst,fte:0.5}); renderConfig(); }\nfunction nt_delFte(rid,idx){ NT_CONFIG.fte[rid].splice(idx,1); renderConfig(); nt_refreshIfActive(); }\nfunction nt_refreshIfActive(){ // ververs de Noordtunnel-grafieken als dat scherm open is\n  if(document.getElementById('s4') && document.getElementById('s4').classList.contains('active')) renderNT();\n}\n\n// Gezamenlijke project-slider met vinkbox-selectie: de slider-waarde wordt\n// toegepast op elk AANGEVINKT GPO-project. Niet-aangevinkte projecten staan stil.\nfunction nt_projApply(){\n  var val = parseInt(document.getElementById('nt-proj-slider').value)||0;\n  var pickNT = document.getElementById('nt-pick-NT') && document.getElementById('nt-pick-NT').checked;\n  var pickZD = document.getElementById('nt-pick-ZD') && document.getElementById('nt-pick-ZD').checked;\n  NT_PROJSHIFT.GPO  = pickNT ? val : 0;\n  NT_PROJSHIFT.GPO2 = pickZD ? val : 0;\n  var lbl=document.getElementById('nt-proj-val');\n  if(lbl){\n    var n=(pickNT?1:0)+(pickZD?1:0);\n    lbl.textContent=(val>0?'+':'')+val+' mnd'+(n===0?' (geen project)':'');\n    lbl.style.color = val===0 ? '#003082' : (Math.abs(val)>=9 ? '#c0121f' : (val>0?'#e06b00':'#0a6ec0'));\n  }\n  renderNT();\n}\n\n// ── CAPACITEITSGRAFIEK 1: alle diensten over elkaar (lijnen) ──\nfunction renderNTCapAll(){\n  var canvas=document.getElementById('ntCapAll'); if(!canvas) return;\n  var bw=nt_computeBowWave();\n  var dpr=window.devicePixelRatio||1;\n  var cW=Math.max(700,canvas.parentElement.clientWidth-32), cH=220;\n  var PADL=44, PADR=14, PADT=14, PADB=28;\n  canvas.width=cW*dpr; canvas.height=cH*dpr; canvas.style.width=cW+'px'; canvas.style.height=cH+'px';\n  var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);\n  ctx.clearRect(0,0,cW,cH);\n  var t0=bw[0].t, t1=bw[bw.length-1].t;\n  var maxF=0; for(var i=0;i<bw.length;i++){ maxF=Math.max(maxF,bw[i].GPO,bw[i].CIV,bw[i].VWM); }\n  maxF=Math.max(maxF,8)*1.1;\n  function X(t){ return PADL+((t-t0)/(t1-t0))*(cW-PADL-PADR); }\n  function Y(f){ return cH-PADB-(f/maxF)*(cH-PADT-PADB); }\n  // assen + gridlijnen\n  ctx.strokeStyle='#e0e4ec'; ctx.lineWidth=1; ctx.fillStyle='#6a7898'; ctx.font='9px Segoe UI,Arial';\n  for(var f=0;f<=maxF;f+=2){ var y=Y(f); ctx.beginPath();ctx.moveTo(PADL,y);ctx.lineTo(cW-PADR,y);ctx.stroke();\n    ctx.textAlign='right'; ctx.fillText(f+' FTE',PADL-4,y+3); }\n  ctx.textAlign='center';\n  for(var yr=2026;yr<=2031;yr++){ var x=X(yr); ctx.strokeStyle='#eef0f5'; ctx.beginPath();ctx.moveTo(x,PADT);ctx.lineTo(x,cH-PADB);ctx.stroke();\n    ctx.fillStyle='#6a7898'; ctx.fillText(String(yr),x,cH-PADB+16); }\n  // lijnen per dienst\n  ['GPO','CIV','VWM'].forEach(function(d){\n    var col=NT_DIENST_CAP[d].kleur;\n    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath();\n    for(var i=0;i<bw.length;i++){ var x=X(bw[i].t), y=Y(bw[i][d]); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }\n    ctx.stroke();\n    // capaciteitslijn (gestippeld)\n    var cap=NT_DIENST_CAP[d].cap;\n    ctx.strokeStyle=nt_hexA(col,0.4); ctx.lineWidth=1; ctx.setLineDash([4,3]);\n    ctx.beginPath(); ctx.moveTo(PADL,Y(cap)); ctx.lineTo(cW-PADR,Y(cap)); ctx.stroke(); ctx.setLineDash([]);\n  });\n  // legenda\n  var lx=PADL+8, ly=PADT+6;\n  ['GPO','CIV','VWM'].forEach(function(d){\n    var col=NT_DIENST_CAP[d].kleur;\n    ctx.fillStyle=col; ctx.fillRect(lx,ly-7,14,3);\n    ctx.fillStyle='#3a4658'; ctx.font='9px Segoe UI,Arial'; ctx.textAlign='left';\n    ctx.fillText(d+' (cap '+NT_DIENST_CAP[d].cap+')',lx+18,ly-3);\n    lx+=__nt_textW(ctx,d+' (cap '+NT_DIENST_CAP[d].cap+')')+38;\n  });\n}\nfunction __nt_textW(ctx,s){ return ctx.measureText(s).width; }\n\n// ── CAPACITEITSGRAFIEK 2: per dienst, capaciteit vs boeggolf (kleine multiples) ──\nfunction renderNTCapPer(){\n  var canvas=document.getElementById('ntCapPer'); if(!canvas) return;\n  var bw=nt_computeBowWave();\n  var diensten=['GPO','CIV','VWM'];\n  var dpr=window.devicePixelRatio||1;\n  var cW=Math.max(700,canvas.parentElement.clientWidth-32);\n  var panelH=130, gap=14, cH=diensten.length*panelH+(diensten.length-1)*gap;\n  canvas.width=cW*dpr; canvas.height=cH*dpr; canvas.style.width=cW+'px'; canvas.style.height=cH+'px';\n  var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);\n  ctx.clearRect(0,0,cW,cH);\n  var t0=bw[0].t, t1=bw[bw.length-1].t;\n  var PADL=44, PADR=14, PADT=18, PADB=20;\n\n  diensten.forEach(function(d,di){\n    var oy=di*(panelH+gap);\n    var cap=NT_DIENST_CAP[d].cap, col=NT_DIENST_CAP[d].kleur;\n    var maxF=cap; for(var i=0;i<bw.length;i++) maxF=Math.max(maxF,bw[i][d]);\n    maxF=maxF*1.15+0.5;\n    function X(t){ return PADL+((t-t0)/(t1-t0))*(cW-PADL-PADR); }\n    function Y(f){ return oy+panelH-PADB-(f/maxF)*(panelH-PADT-PADB); }\n    // titel\n    ctx.fillStyle=col; ctx.font='bold 11px Segoe UI,Arial'; ctx.textAlign='left';\n    ctx.fillText(NT_DIENST_CAP[d].naam+' — capaciteit '+cap+' FTE',PADL,oy+12);\n    // gridlijnen\n    ctx.strokeStyle='#eef0f5'; ctx.lineWidth=1;\n    for(var yr=2026;yr<=2031;yr++){ var x=X(yr); ctx.beginPath();ctx.moveTo(x,oy+PADT);ctx.lineTo(x,oy+panelH-PADB);ctx.stroke();\n      if(di===diensten.length-1){ ctx.fillStyle='#6a7898'; ctx.font='9px Segoe UI,Arial'; ctx.textAlign='center'; ctx.fillText(String(yr),x,oy+panelH-PADB+14); } }\n    // boeggolf-vlak (onder cap groen, boven cap rood)\n    for(var i=0;i<bw.length-1;i++){\n      var x1=X(bw[i].t), x2=X(bw[i+1].t);\n      var v1=bw[i][d], v2=bw[i+1][d];\n      // gedeelte onder cap\n      var under1=Math.min(v1,cap), under2=Math.min(v2,cap);\n      ctx.fillStyle=nt_hexA(col,0.18);\n      ctx.beginPath();ctx.moveTo(x1,Y(0));ctx.lineTo(x1,Y(under1));ctx.lineTo(x2,Y(under2));ctx.lineTo(x2,Y(0));ctx.closePath();ctx.fill();\n      // gedeelte boven cap (boeggolf = rood)\n      if(v1>cap||v2>cap){\n        ctx.fillStyle='rgba(192,18,31,0.35)';\n        ctx.beginPath();ctx.moveTo(x1,Y(Math.min(v1,cap)));ctx.lineTo(x1,Y(v1));ctx.lineTo(x2,Y(v2));ctx.lineTo(x2,Y(Math.min(v2,cap)));ctx.closePath();ctx.fill();\n      }\n    }\n    // vraaglijn\n    ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.beginPath();\n    for(var i=0;i<bw.length;i++){ var x=X(bw[i].t),y=Y(bw[i][d]); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }\n    ctx.stroke();\n    // capaciteitslijn\n    ctx.strokeStyle='#c0121f'; ctx.lineWidth=1.4; ctx.setLineDash([5,3]);\n    ctx.beginPath();ctx.moveTo(PADL,Y(cap));ctx.lineTo(cW-PADR,Y(cap));ctx.stroke();ctx.setLineDash([]);\n    ctx.fillStyle='#c0121f'; ctx.font='8px Segoe UI,Arial'; ctx.textAlign='right'; ctx.fillText('cap '+cap,cW-PADR,Y(cap)-3);\n    // y-as labels\n    ctx.fillStyle='#6a7898'; ctx.font='8px Segoe UI,Arial'; ctx.textAlign='right';\n    ctx.fillText('0',PADL-4,Y(0)+3); ctx.fillText(Math.round(maxF)+'',PADL-4,Y(maxF)+8);\n    // kans/boeggolf-annotatie\n    var stats=nt_bowWaveStats().stats[d];\n    if(stats.overMonths>0){\n      ctx.fillStyle='#c0121f'; ctx.font='bold 9px Segoe UI,Arial'; ctx.textAlign='left';\n      ctx.fillText('▲ boeggolf: piek '+stats.peak.toFixed(1)+' FTE ('+stats.util+'%), '+stats.overMonths+' mnd boven cap', PADL+90, oy+12);\n    } else {\n      ctx.fillStyle='#1a8a4a'; ctx.font='bold 9px Segoe UI,Arial'; ctx.textAlign='left';\n      ctx.fillText('● binnen capaciteit — ruimte voor naar voren halen', PADL+90, oy+12);\n    }\n  });\n}\n\n// ── Impact-analyse: cascade + ketenrisico's (verlaten, vervroegen, gedeelde formatie) ──\nfunction renderNTImpact(){\n  var el=document.getElementById('nt-impact');\n  if(!el) return;\n\n  var anyShift = NT_SHIFT!==0 || Object.keys(NT_MSHIFT).some(function(k){return NT_MSHIFT[k]!==0;});\n\n  // geraakte regels (zowel later als vroeger)\n  var affected=[];\n  for(var i=0;i<NT_MODEL.regels.length;i++){\n    var r=NT_MODEL.regels[i]; var sh=NT_CASCADE[r.id]||0;\n    if(Math.abs(sh)>0.001) affected.push({r:r,sh:sh,manual:(NT_MSHIFT[r.id]||0)!==0});\n  }\n\n  if(!anyShift){\n    var cross=NT_MODEL.relaties.filter(function(x){return x.cross;});\n    var rows=cross.map(function(rl){\n      var f=nt_regelById(rl.from), t=nt_regelById(rl.to);\n      return '<tr><td style=\"padding:6px 10px;font-size:11px;\"><span style=\"background:'+nt_blokKleurBg(f.blok)+';border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;color:'+nt_blokKleur(f.blok)+';\">'+f.blok+'</span> '+f.label.replace(/^\\s+/,'')+'</td>'\n        +'<td style=\"padding:6px 6px;text-align:center;font-size:10px;color:#6a7898;\">'+rl.type+'</td>'\n        +'<td style=\"padding:6px 10px;font-size:11px;\"><span style=\"background:'+nt_blokKleurBg(t.blok)+';border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;color:'+nt_blokKleur(t.blok)+';\">'+t.blok+'</span> '+t.label.replace(/^\\s+/,'')+'</td></tr>';\n    }).join('');\n    el.innerHTML='<div style=\"background:#e8f0fb;border:1px solid #c0d0ec;border-radius:6px;padding:12px 16px;margin-bottom:12px;font-size:12px;color:#003082;\">'\n      +'<strong>Integrale ketenanalyse:</strong> sleep een balk <em>vooruit én achteruit</em>, of gebruik de tijdbalk (−12 t/m +12 mnd). '\n      +'Twee projecten (Noordtunnel + Zuidasdok) delen bij <strong>CIV (uitrol)</strong> en <strong>VWM (opleiding)</strong> dezelfde formatie. '\n      +'Verschuift een tunnel zó dat die gedeelde taken gaan overlappen, dan vraagt één team twee tunnels tegelijk → capaciteitsconflict. '\n      +'GPO heeft per project eigen capaciteit, dus daar ontstaat dat conflict niet. Vervroegen kan bovendien volgorde-schendingen geven.</div>'\n      +'<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;\">'\n      +'<div style=\"background:#003082;color:#fff;padding:10px 16px;font-size:13px;font-weight:700;\">Cross-dienst afhankelijkheden — waar de blokken elkaar raken ('+cross.length+')</div>'\n      +'<table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#f4f6fb;\">'\n      +'<th style=\"padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Voorganger</th>'\n      +'<th style=\"padding:7px 6px;text-align:center;font-size:10px;text-transform:uppercase;color:#6a7898;\">Type</th>'\n      +'<th style=\"padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:#6a7898;\">Opvolger</th>'\n      +'</tr></thead><tbody>'+rows+'</tbody></table></div>';\n    return;\n  }\n\n  var direct=affected.filter(function(a){return a.manual;});\n  var cascadeOnly=affected.filter(function(a){return !a.manual;});\n\n  // KPI's\n  var nAff=affected.length;\n  var blokkenHit={}; affected.forEach(function(a){blokkenHit[a.r.blok]=1;});\n  var maxShift=affected.length?Math.max.apply(null,affected.map(function(a){return Math.round(Math.abs(a.sh)*12);})):0;\n  var ntOpen=NT_CASCADE['g_open']||0, zdOpen=NT_CASCADE['z_open']||0;\n  var nResConf=NT_RESCONFLICTS.length, nViol=NT_VIOLATIONS.length;\n\n  var kpis='<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;\">'\n    +nt_kpi('#003082',nAff,'Regels geraakt')\n    +nt_kpi(nResConf>0?'#c0121f':'#1a8a4a',nResConf,'Formatie-conflicten')\n    +nt_kpi(nViol>0?'#c0121f':'#1a8a4a',nViol,'Volgorde-schendingen')\n    +nt_kpi((ntOpen!==0||zdOpen!==0)?'#e06b00':'#1a8a4a',(ntOpen!==0||zdOpen!==0)?'verschoven':'op schema','Openstellingen')\n    +'</div>';\n\n  // ── Waarschuwingen ──\n  var warns='';\n\n  // Gedeelde-formatie conflicten (de kern van deze opdracht)\n  for(var rc=0;rc<NT_RESCONFLICTS.length;rc++){\n    var cf=NT_RESCONFLICTS[rc]; var res=NT_RESOURCES[cf.res];\n    warns+='<div style=\"background:#fde8ea;border:1px solid #c0121f;border-left:4px solid #c0121f;border-radius:4px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#7a1020;\">'\n      +'<strong>⚠ Gedeelde-formatie conflict — '+res.naam+':</strong> de taken <em>'+cf.a.label+'</em> ('+cf.a.tunnel+') en <em>'+cf.b.label+'</em> ('+cf.b.tunnel+') overlappen '+cf.maanden+' maand'+(cf.maanden===1?'':'en')+'. '\n      +'Eén team kan niet gelijktijdig twee tunnels bedienen. Dit is precies het keten-effect: GPO kan parallel (eigen capaciteit), maar CIV en VWM delen hun formatie over beide tunnels.</div>';\n  }\n\n  // Volgorde-schendingen door vervroegen\n  for(var vi=0;vi<NT_VIOLATIONS.length;vi++){\n    var v=NT_VIOLATIONS[vi];\n    warns+='<div style=\"background:#fff0e0;border:1px solid #e06b00;border-left:4px solid #e06b00;border-radius:4px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#8a4500;\">'\n      +'<strong>⚠ Volgorde-schending'+(v.cross?' (cross-dienst)':'')+':</strong> <em>'+v.succLabel+'</em> valt nu '+v.maanden+' maand'+(v.maanden===1?'':'en')+' te vroeg t.o.v. <em>'+v.predLabel+'</em> ('+v.kind+', relatie '+v.type+'). Door het vervroegen klopt de afhankelijkheidsvolgorde niet meer — de opvolger start voordat de voorganger het toelaat.</div>';\n  }\n\n  // Audio BB marge (NT en ZD)\n  function margeCheck(rollId, istsiId, naam){\n    var ar=nt_eff(nt_regelById(rollId)).t1, is=nt_eff(nt_regelById(istsiId)).t0;\n    var m=(is-ar)*12;\n    if(m<0.05){ return '<div style=\"background:#fde8ea;border:1px solid #c0121f;border-left:4px solid #c0121f;border-radius:4px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#7a1020;\">'\n      +'<strong>⚠ Audio Bouwblok te laat voor ISTSI ('+naam+'):</strong> uitrol gereed '+nt_fmtD(ar)+', ISTSI start '+nt_fmtD(is)+'. Marge '+(m<=0?'verdwenen':'< 1 maand')+'.</div>'; }\n    return '';\n  }\n  warns+=margeCheck('c_roll','g_istsi','Noordtunnel');\n  warns+=margeCheck('c_roll2','z_istsi','Zuidasdok');\n\n  // Opleiding terugrekenen\n  if((NT_CASCADE['o_sit']||0)!==0){\n    var os=Math.round((NT_CASCADE['o_sit'])*12);\n    warns+='<div style=\"background:#fff0e0;border:1px solid #e06b00;border-left:4px solid #e06b00;border-radius:4px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#8a4500;\">'\n      +'<strong>⚠ Opleiding NT verschuift:</strong> de opleidingslijn beweegt '+(os>0?'+':'')+os+' maanden mee met de openstelling. '+(os<0?'Vervroegen betekent dat trainers en O-SIT eerder klaar moeten zijn — haalbaarheid checken.':'Start de opleiding niet mee, dan onvoldoende opgeleid personeel bij openstelling.')+'</div>';\n  }\n\n  // doorwerking-tabel per blok\n  var byBlok={};\n  cascadeOnly.forEach(function(a){ if(!byBlok[a.r.blok])byBlok[a.r.blok]=[]; byBlok[a.r.blok].push(a); });\n  var manualBlok={}; direct.forEach(function(a){manualBlok[a.r.blok]=1;});\n  var cascRows='';\n  Object.keys(byBlok).forEach(function(blok){\n    var isCross=!manualBlok[blok];\n    cascRows+='<tr style=\"background:'+(isCross?'#fff8f0':'#f9fafc')+';\"><td colspan=\"3\" style=\"padding:5px 10px;font-size:10px;font-weight:800;color:'+(isCross?'#c05000':'#6a7898')+';text-transform:uppercase;\">'\n      +(isCross?'⚠ Cross-dienst doorwerking: ':'')+nt_blokNaam(blok)+'</td></tr>';\n    cascRows+=byBlok[blok].map(function(a){\n      var sM=Math.round(a.sh*12);\n      return '<tr><td style=\"padding:5px 10px 5px 22px;font-size:11px;\">'+a.r.label.replace(/^\\s+/,'')+'</td>'\n        +'<td style=\"padding:5px 8px;font-size:10px;color:#e06b00;\">'+nt_fmtD(nt_eff(a.r).t0)+'</td>'\n        +'<td style=\"padding:5px 8px;text-align:center;font-size:12px;font-weight:700;color:'+(sM<0?'#0a6ec0':'#e06b00')+';\">'+(sM>0?'+':'')+sM+'m</td></tr>';\n    }).join('');\n  });\n\n  var directRows=direct.map(function(a){\n    var sM=Math.round(a.sh*12);\n    return '<tr><td style=\"padding:6px 10px;font-size:11px;font-weight:600;\"><span style=\"background:#fff0e0;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;color:#c05000;\">'+a.r.blok+'</span> '+a.r.label.replace(/^\\s+/,'')+'</td>'\n      +'<td style=\"padding:6px 8px;font-size:11px;color:#6a7898;\">'+nt_fmtD(a.r.t0)+'</td>'\n      +'<td style=\"padding:6px 8px;text-align:center;font-size:13px;font-weight:800;color:'+(sM<0?'#0a6ec0':'#c0121f')+';\">'+(sM>0?'+':'')+sM+'m</td></tr>';\n  }).join('');\n\n  el.innerHTML='<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">'\n    +'<div style=\"font-size:14px;font-weight:700;color:#003082;\">Integrale impactanalyse — verlaten, vervroegen &amp; gedeelde formatie</div>'\n    +'<button onclick=\"nt_reset()\" style=\"padding:6px 14px;border:1px solid #c0121f;background:#fff;color:#c0121f;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;\">↺ Reset alles</button></div>'\n    +kpis+warns\n    + (directRows ? '<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;margin-bottom:12px;\">'\n        +'<div style=\"background:#c05000;color:#fff;padding:8px 16px;font-size:12px;font-weight:700;\">Direct verschoven (gesleept)</div>'\n        +'<table style=\"width:100%;border-collapse:collapse;\"><tbody>'+directRows+'</tbody></table></div>' : '')\n    + (cascRows ? '<div style=\"background:#fff;border:1px solid #d0d6de;border-radius:6px;overflow:hidden;\">'\n        +'<div style=\"background:#e06b00;color:#fff;padding:8px 16px;font-size:12px;font-weight:700;\">Doorwerking via afhankelijkheden</div>'\n        +'<table style=\"width:100%;border-collapse:collapse;\"><tbody>'+cascRows+'</tbody></table></div>' : '');\n}\n\nfunction nt_kpi(col,val,lbl){\n  return '<div style=\"background:#fff;border:1px solid #d0d6de;border-top:3px solid '+col+';border-radius:6px;padding:10px 12px;\"><div style=\"font-size:20px;font-weight:800;color:'+col+';\">'+val+'</div><div style=\"font-size:10px;color:#6a7898;\">'+lbl+'</div></div>';\n}\nfunction nt_blokKleur(id){ var m={GPO:'#003082',CIV:'#5a2d82',VWMF:'#00823c',VWMO:'#00a050'}; return m[id]||'#003082'; }\nfunction nt_blokKleurBg(id){ var m={GPO:'#e8f0fb',CIV:'#f0e8f8',VWMF:'#e6f5ed',VWMO:'#e0f7ea'}; return m[id]||'#e8f0fb'; }\n\n\n\n// ===== VWM MEERJARENPLANNING + SAVE MODULE =====\n// ══════════════════════════════════════════════════════════\n// VWM MEERJARENPLANNING — gelaagd model (zoals Demo-casus)\n// Dienststromen GPO/CIV/VWM, filterbaar op verkeerscentrale.\n// VC's gekoppeld aan regio's. Logische relaties + cascade.\n// ══════════════════════════════════════════════════════════\n\n// Regio ↔ VC ↔ tunnels (regio is waar een tunnel in ligt)\nvar MJP_REGIOS = {\n  MN:  { naam:'Midden-Nederland',     vc:'VCMN',  tunnels:['Leidsche Rijntunnel'] },\n  NON: { naam:'Noord-Oost-Nederland', vc:'VCNON', tunnels:['Salland-Twentetunnels'] },\n  NWN: { naam:'Noord-West-Nederland', vc:'VCNWN', tunnels:['Coentunnel','Zeeburgertunnel','Schipholtunnel','Velsertunnel','Wijkertunnel','Gaasperdammertunnel'] },\n  ZN:  { naam:'Zuid-Nederland',       vc:'VCZN',  tunnels:['Swalmentunnel','Roertunnel','KoningWillemAlexandertunnel'] },\n  ZWN: { naam:'Zuid-West-Nederland',  vc:'VCZWN', tunnels:['Noordtunnel','Heinenoordtunnel','Benelux','Drechttunnel','Zuidasdok'] },\n};\nvar MJP_VCS = ['VCMN','VCNON','VCNWN','VCZN','VCZWN'];\nfunction mjp_vcRegio(vc){ for(var r in MJP_REGIOS){ if(MJP_REGIOS[r].vc===vc) return r; } return ''; }\nfunction mjp_vcRegioNaam(vc){ var r=mjp_vcRegio(vc); return r?MJP_REGIOS[r].naam:''; }\n\n// Dienststromen (blokken). filter op VC werkt via regel.vc tag.\nvar MJP_MODEL = {\n  blokken: [\n    { id:'GPO', naam:'GPO — Projecten & openstellingen', kleur:'#003082', dienst:'GPO',\n      sub:'Nieuwbouw/renovatie tunnels en aanleg, per verkeerscentrale-regio' },\n    { id:'CIV', naam:'CIV — Applicaties & bouwblokken', kleur:'#5a2d82', dienst:'CIV',\n      sub:'LTS-releases, Charm-uitrol, MKC — landelijke bouwblokken per VC uitgerold' },\n    { id:'VWM', naam:'VWM — Verkeerscentrales & onderhoud', kleur:'#00823c', dienst:'VWM',\n      sub:'LCM-vervangingen, onderhoud en opleidingen per verkeerscentrale' },\n  ],\n  // Regels: t0/t1 fractioneel jaar. vc = koppeling aan verkeerscentrale (voor filter).\n  regels: [\n    // ─────────── GPO: openstellingen per regio ───────────\n    { id:'g_mn_lr',   blok:'GPO', vc:'VCMN',  label:'Leidsche Rijntunnel — renovatie',     t0:2026.0, t1:2028.3, kind:'bar' },\n    { id:'g_mn_open', blok:'GPO', vc:'VCMN',  label:'Leidsche Rijntunnel — openstelling',  t0:2028.3, t1:2028.3, kind:'mile', crit:true,\n      ms:[{t:2028.3,lbl:'OPEN',tip:'Openstelling Leidsche Rijntunnel (VCMN, regio Midden-NL)'}] },\n    { id:'g_nwn_gd',  blok:'GPO', vc:'VCNWN', label:'Gaasperdammertunnel — afronding',     t0:2026.0, t1:2027.5, kind:'bar' },\n    { id:'g_nwn_open',blok:'GPO', vc:'VCNWN', label:'Gaasperdammertunnel — openstelling',  t0:2027.5, t1:2027.5, kind:'mile', crit:true,\n      ms:[{t:2027.5,lbl:'OPEN',tip:'Openstelling Gaasperdammertunnel (VCNWN, regio Noord-West-NL)'}] },\n    { id:'g_zwn_nt',  blok:'GPO', vc:'VCZWN', label:'Noordtunnel — renovatie',             t0:2026.0, t1:2028.99, kind:'bar' },\n    { id:'g_zwn_open',blok:'GPO', vc:'VCZWN', label:'Noordtunnel — openstelling',          t0:2028.99,t1:2028.99, kind:'mile', crit:true,\n      ms:[{t:2028.99,lbl:'OPEN',tip:'Openstelling Noordtunnel (VCZWN, regio Zuid-West-NL) — zie ook Demo-casus'}] },\n    { id:'g_zwn_za',  blok:'GPO', vc:'VCZWN', label:'Zuidasdok — realisatie',              t0:2027.0, t1:2030.5, kind:'bar' },\n    { id:'g_zwn_zaop',blok:'GPO', vc:'VCZWN', label:'Zuidasdok — op
